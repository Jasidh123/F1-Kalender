<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>F1 2026</title>

  background_color: "#0a0a0a",
  theme_color: "#E10600",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23E10600'/><text y='.9em' font-size='80' x='10'>рџЏЋпёЏ</text></svg>", sizes: "any", type: "image/svg+xml" }

});
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E10600;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #252525;
    --text: #f0f0f0;
    --muted: #777;
    --gold: #f5c518;
    --silver: #c0c0c0;
    --bronze: #cd7f32;

    /* iPhone safe areas */
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left, 0px);
    --safe-right:  env(safe-area-inset-right, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100%;
    /* Push content above bottom nav */
    padding-bottom: calc(60px + var(--safe-bottom));
    overscroll-behavior: none;
  }

  /* в”Ђв”Ђ HEADER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--red);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--red);
    line-height: 1;
  }
  .logo span { color: var(--text); }

  .season-badge {
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header-clock {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.4;
  }

  /* в”Ђв”Ђ BOTTOM NAV (iPhone style) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: calc(60px + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    z-index: 200;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: color 0.15s;
    padding: 8px 0;
    -webkit-user-select: none;
  }

  .nav-btn .nav-icon {
    font-size: 22px;
    line-height: 1;
    transition: transform 0.15s;
  }

  .nav-btn.active { color: var(--red); }
  .nav-btn.active .nav-icon { transform: scale(1.1); }

  /* в”Ђв”Ђ CONTAINER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .container {
    padding: 20px 12px 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .page-subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
    font-weight: 300;
  }

  /* в”Ђв”Ђ MONTH DIVIDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .month-divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .month-divider:first-child { padding-top: 0; }

  /* в”Ђв”Ђ RACE CARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .race-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
    cursor: pointer;
    /* Prevent iOS rubber-band inside card */
    -webkit-overflow-scrolling: touch;
  }

  .race-card.live {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red);
  }
  .race-card.upcoming { border-color: #252e25; }

  .race-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    user-select: none;
    /* minimum touch target */
    min-height: 64px;
  }

  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    color: var(--muted);
    min-width: 28px;
    letter-spacing: 1px;
  }

  .flag { font-size: 26px; flex-shrink: 0; }

  .race-info { flex: 1; min-width: 0; }

  .race-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
  }

  .race-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .race-status {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-live     { background: var(--red);  color: white; }
  .badge-done     { background: #1a331a; color: #5dbd5d; }
  .badge-upcoming { background: #1a2a1a; color: #4a8a4a; }
  .badge-sprint   { background: #2a1a00; color: #d4882a; }

  .chevron {
    color: var(--muted);
    font-size: 13px;
    transition: transform 0.22s;
    margin-left: 4px;
    flex-shrink: 0;
  }
  .race-card.open .chevron { transform: rotate(180deg); }

  /* в”Ђв”Ђ EXPANDED PANEL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .race-panel {
    display: none;
    border-top: 1px solid var(--border);
    animation: slideDown 0.18s ease;
  }
  .race-card.open .race-panel { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* в”Ђв”Ђ SESSION TABS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .tabs {
    display: flex;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    padding: 12px 16px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s, border-color 0.12s;
    min-height: 44px; /* iOS min touch */
  }
  .tab-btn:active { opacity: 0.7; }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

  /* в”Ђв”Ђ SESSION SCHEDULE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .session-schedule { padding: 16px 14px; }

  .session-row {
    display: flex;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    min-height: 44px;
  }
  .session-row:last-child { border-bottom: none; }

  .session-name {
    font-weight: 500;
    font-size: 13px;
    flex: 1;
    padding-right: 8px;
  }

  .session-time {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .session-date {
    font-size: 11px;
    color: var(--muted);
    margin-left: 10px;
    text-align: right;
  }

  .session-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 8px;
    font-weight: 700;
    white-space: nowrap;
  }
  .session-past      { background: #1a331a; color: #5dbd5d; }
  .session-live-now  { background: var(--red); color: white; animation: pulse 1.4s infinite; }
  .session-upcoming-s{ background: #222; color: #666; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

  /* в”Ђв”Ђ RESULTS TABLE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .results-wrapper { padding: 12px 14px 16px; }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .results-table th {
    text-align: left;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 0 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .results-table td {
    padding: 10px 6px;
    border-bottom: 1px solid #1c1c1c;
    vertical-align: middle;
  }
  .results-table tr:last-child td { border-bottom: none; }

  .pos-1 { color: var(--gold);   font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; }
  .pos-2 { color: var(--silver); font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; }
  .pos-3 { color: var(--bronze); font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; }
  .pos-other { color: var(--muted); font-family:'Bebas Neue',sans-serif; font-size:17px; }

  .driver-name { font-weight: 500; font-size: 13px; }
  .driver-abbr { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px; margin-right:5px; opacity:0.45; }

  .team-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; flex-shrink:0; }
  .time-col { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .points-col { text-align:right; font-weight:600; font-size:13px; }

  /* в”Ђв”Ђ LOADING / ERROR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .loading {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid #2a2a2a;
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error-msg {
    text-align: center;
    padding: 20px 16px;
    color: #c05050;
    font-size: 13px;
    line-height: 1.6;
  }

  /* в”Ђв”Ђ STANDINGS PAGE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .standings-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .std-tab {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    text-align: center;
  }
  .std-tab.active { background: var(--red); border-color: var(--red); color: white; }


  /* в”Ђв”Ђ STANDINGS CARDS (mobile-first) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
  .st-source {
    font-size: 11px;
    color: #555;
    text-align: right;
    margin-bottom: 12px;
  }

  .st-list { display: flex; flex-direction: column; gap: 8px; }

  .st-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .st-card--leader {
    border-color: #3a3a1a;
    background: #161610;
  }

  .st-pos {
    width: 28px;
    flex-shrink: 0;
    text-align: center;
  }

  .st-info {
    flex: 1;
    min-width: 0;
  }

  .st-name {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .st-flag { font-size: 16px; flex-shrink: 0; }

  .st-teambar {
    width: 3px;
    height: 18px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .st-driver {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .st-team {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .st-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  .st-bar-track {
    height: 3px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }

  .st-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .st-right {
    flex-shrink: 0;
    text-align: right;
    min-width: 52px;
  }

  .st-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }

  .st-gap {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* в”Ђв”Ђ UTILITIES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

    d.setHours(s.h, s.m, 0, 0);

  });
}

const WEEKDAYS_SV = ['SГ¶n','MГҐn','Tis','Ons','Tor','Fre','LГ¶r'];
const MONTHS_SV   = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
function fmtDate(dt) { return `${WEEKDAYS_SV[dt.getDay()]} ${dt.getDate()} ${MONTHS_SV[dt.getMonth()]}`; }
function fmtTime(dt) { return dt.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' }); }

function isLiveWeekend(race) {
  const now=new Date(), fri=new Date(race.dates[0]+'T00:00:00'), sun=new Date(race.dates[2]+'T23:59:59');
  return now>=fri && now<=sun;
}
function isPast(race) { return new Date(race.raceDate+'T23:59:59') < new Date(); }
function teamColor(name) {

  for (const [k,v] of Object.entries(TEAM_COLORS)) if (name.includes(k)) return v;
  return '#888';
}
function fmtSecs(s) {
  if (!s && s!==0) return 'вЂ”';
  const m=Math.floor(s/60), r=(s%60).toFixed(3);
  return m>0 ? `${m}:${r.padStart(6,'0')}` : `${Number(s).toFixed(3)}`;
}

// в”Ђв”Ђв”Ђ API FETCH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const CACHE = {};

// в”Ђв”Ђ RESULTS: Jolpica first, OpenF1 fallback в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function fetchJolpica(round, type) {
  const seg = {
    race:'results', quali:'qualifying',
    fp1:'practice/1', fp2:'practice/2', fp3:'practice/3',
    sprint:'sprint', sq:'qualifying'
  }[type] || 'results';

  for (const year of [2026, 2025]) {
    const rn = year === 2026 ? round : Math.min(round, 24);
    try {
      const res = await fetch(`https://api.jolpi.ca/ergast/f1/${year}/${rn}/${seg}/`,
        { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const json = await res.json();
      if (json?.MRData?.RaceTable?.Races?.length > 0)
        return { source:'jolpica', data: json, type };
    } catch(e) {}
  }
  return null;
}

const OF1_NAMES = {
  fp1:'Practice 1', fp2:'Practice 2', fp3:'Practice 3',
  quali:'Qualifying', sprint:'Sprint', sq:'Sprint Qualifying', race:'Race',
};

async function fetchOF1(round, type) {
  const name = OF1_NAMES[type] || 'Race';
  try {
    const sessRes = await fetch(
      `https://api.openf1.org/v1/sessions?year=2026&session_name=${encodeURIComponent(name)}`,
      { signal: AbortSignal.timeout(8000) });
    if (!sessRes.ok) return null;
    const sessions = await sessRes.json();
    if (!Array.isArray(sessions) || !sessions.length) return null;
    sessions.sort((a,b) => a.session_key - b.session_key);
    const sess = sessions[round - 1];
    if (!sess) return null;
    const sk = sess.session_key;

    const [posRes, drvRes] = await Promise.all([
      fetch(`https://api.openf1.org/v1/position?session_key=${sk}`, { signal: AbortSignal.timeout(10000) }),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sk}`, { signal: AbortSignal.timeout(8000) }),
    ]);
    if (!posRes.ok || !drvRes.ok) return null;
    const [positions, drivers] = await Promise.all([posRes.json(), drvRes.json()]);
    if (!positions?.length || !drivers?.length) return null;

    const driverMap = {};
    drivers.forEach(d => { driverMap[d.driver_number] = d; });

    const finalPos = {};
    for (const p of positions) {
      if (!finalPos[p.driver_number] || p.date > finalPos[p.driver_number].date)
        finalPos[p.driver_number] = p;
    }
    const rows = Object.values(finalPos).sort((a,b) => (a.position||99) - (b.position||99));
    if (!rows.length) return null;

    const lapMap = {};
    if (['quali','sq','fp1','fp2','fp3'].includes(type)) {
      try {
        const lapRes = await fetch(`https://api.openf1.org/v1/laps?session_key=${sk}`, { signal: AbortSignal.timeout(10000) });
        if (lapRes.ok) {
          const laps = await lapRes.json();
          for (const l of laps) {
            if (!l.lap_duration) continue;
            if (!lapMap[l.driver_number] || l.lap_duration < lapMap[l.driver_number])
              lapMap[l.driver_number] = l.lap_duration;
          }
        }
      } catch(e) {}
    }
    return { source:'openf1', rows, driverMap, lapMap, type, sk };
  } catch(e) { return null; }
}

async function fetchResults(round, type) {
  const ck = `res_${round}_${type}`;
  if (CACHE[ck]) return CACHE[ck];
  const result = await fetchJolpica(round, type) || await fetchOF1(round, type);
  if (result) CACHE[ck] = result;
  return result;
}

  'Japanese':'рџ‡Їрџ‡µ','Chinese':'рџ‡Ёрџ‡і','Danish':'рџ‡©рџ‡°','Thai':'рџ‡№рџ‡­','American':'рџ‡єрџ‡ё',

  'Argentine':'рџ‡¦рџ‡·','Swiss':'рџ‡Ёрџ‡­','Polish':'рџ‡µрџ‡±','Bahraini':'рџ‡§рџ‡­','Emirati':'рџ‡¦рџ‡Є',

function getFlag(nat) { return COUNTRY_FLAGS[nat] || 'рџЏЃ'; }

async function fetchStandings(type) {
  const ck = `std_${type}`;
  if (standingsCache[ck]) return standingsCache[ck];

  // Source 1: OpenF1 championship endpoints
  try {
    const sessRes = await fetch('https://api.openf1.org/v1/sessions?year=2026&session_name=Race',
      { signal: AbortSignal.timeout(8000) });
    if (sessRes.ok) {
      const sessions = await sessRes.json();
      if (sessions?.length) {
        sessions.sort((a,b) => b.session_key - a.session_key);
        const sk = sessions[0].session_key;
        const ep = type === 'drivers' ? 'championship_drivers' : 'championship_teams';
        const res = await fetch(`https://api.openf1.org/v1/${ep}?session_key=${sk}`,
          { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const data = await res.json();
          if (data?.length) {
            standingsCache[ck] = { source:'openf1', data, type };
            return standingsCache[ck];
          }
        }
      }
    }
  } catch(e) {}

  // Source 2: Jolpica
  const seg = type === 'drivers' ? 'driverstandings' : 'constructorstandings';
  for (const year of [2026, 2025]) {
    try {
      const res = await fetch(`https://api.jolpi.ca/ergast/f1/${year}/${seg}/`,
        { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const json = await res.json();
      const lists = json?.MRData?.StandingsTable?.StandingsLists;
      if (lists?.length) {
        standingsCache[ck] = { source:'jolpica', data: lists[0], year, type };
        return standingsCache[ck];
      }
    } catch(e) {}
  }
  return null;
}

// в”Ђв”Ђв”Ђ RENDERERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function posClass(n) { return n===1?'pos-1':n===2?'pos-2':n===3?'pos-3':'pos-other'; }

// OpenF1 results renderer (position-based)
function renderOF1(data) {
  const { rows, driverMap, lapMap, type } = data;
  const isQuali = ['quali','sq'].includes(type);
  const trs = rows.map(r => {
    const p = r.position || 'вЂ”', pn = parseInt(p);
    const d = driverMap[r.driver_number] || {};
    const col = d.team_colour ? `#${d.team_colour}` : teamColor(d.team_name||'');
    const best = lapMap[r.driver_number];
    const timeCell = `<td class="time-col">${isQuali ? fmtSecs(best) : 'вЂ”'}</td>`;
    return `<tr>
      <td><span class="${posClass(pn)}">${p}</span></td>
      <td><span class="driver-abbr">${d.name_acronym||''}</span><span class="driver-name">${d.full_name||'#'+r.driver_number}</span></td>
      <td><span class="team-dot" style="background:${col}"></span>${d.team_name||''}</td>
      ${timeCell}</tr>`;
  }).join('');
  const th = isQuali ? '<th>BГ¤sta tid</th>' : '<th>Gap</th>';
  return `<div style="font-size:11px;color:#3a7a3a;padding:4px 0 10px;text-align:right">вњ“ OpenF1 В· live positionsdata</div>
  <table class="results-table">
    <thead><tr><th>Plac</th><th>FГ¶rare</th><th>Stall</th>${th}</tr></thead>
    <tbody>${trs}</tbody></table>`;
}

// Jolpica race results
function renderJolpicaRace(d) {
  const res = d.MRData.RaceTable.Races[0].Results;
  if (!res?.length) return '<div class="error-msg">Inga resultat</div>';
  const trs = res.map(r => {
    const pn=parseInt(r.position), team=r.Constructor?.name||'';
    return `<tr>
      <td><span class="${posClass(pn)}">${r.position}</span></td>
      <td><span class="driver-abbr">${r.Driver?.code||''}</span><span class="driver-name">${r.Driver?.givenName} ${r.Driver?.familyName}</span></td>
      <td><span class="team-dot" style="background:${teamColor(team)}"></span>${team}</td>
      <td class="time-col">${r.Time?.time||r.status||'вЂ”'}</td>
      <td class="points-col">${r.points||'0'}</td></tr>`;
  }).join('');
  return `<div style="font-size:11px;color:#555;padding:4px 0 10px;text-align:right">Jolpica Ergast</div>
  <table class="results-table">
    <thead><tr><th>Plac</th><th>FГ¶rare</th><th>Stall</th><th>Tid/Status</th><th style="text-align:right">PoГ¤ng</th></tr></thead>
    <tbody>${trs}</tbody></table>`;
}

// Jolpica qualifying
function renderJolpicaQuali(d) {
  const res = d.MRData.RaceTable.Races[0].QualifyingResults;

}

// Jolpica practice/sprint
function renderJolpicaPractice(d) {
  const rd = d.MRData.RaceTable.Races[0];
  let res = rd.PracticeResults || rd.SprintResults;
  if (!res?.length) for (const k of Object.keys(rd)) { if (Array.isArray(rd[k])&&rd[k][0]?.Driver){res=rd[k];break;} }
  if (!res?.length) return '<div class="error-msg">Inga trГ¤ningsresultat tillgГ¤ngliga</div>';
  const trs = res.map(r => {
    const pn=parseInt(r.position), team=r.Constructor?.name||'';
    return `<tr>
      <td><span class="${posClass(pn)}">${r.position}</span></td>
      <td><span class="driver-abbr">${r.Driver?.code||''}</span><span class="driver-name">${r.Driver?.givenName} ${r.Driver?.familyName}</span></td>
      <td><span class="team-dot" style="background:${teamColor(team)}"></span>${team}</td>
      <td class="time-col">${r.Time?.time||r.status||'вЂ”'}</td></tr>`;

    <thead><tr><th>Plac</th><th>FГ¶rare</th><th>Stall</th><th>Tid</th></tr></thead>
    <tbody>${trs}</tbody></table>`;
}

function renderResults(data) {
  if (data.source === 'openf1') return renderOF1(data);
  const { data:d, type } = data;
  if (type==='race'||type==='sprint') return renderJolpicaRace(d);
  if (type==='quali'||type==='sq')    return renderJolpicaQuali(d);
  return renderJolpicaPractice(d);
}

// в”Ђв”Ђ Standings renderers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Shared card-based row вЂ” works perfectly on iPhone width
function stCard(pos, name, team, teamCol, flag, pts, leader, gap) {
  const pc = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-other';
  const barW = leader > 0 ? Math.round((pts / leader) * 100) : 0;
  const isLeader = pos === 1;
  return `
  <div class="st-card${isLeader?' st-card--leader':''}">
    <div class="st-pos"><span class="${pc}">${pos}</span></div>
    <div class="st-info">
      <div class="st-name">
        ${flag ? `<span class="st-flag">${flag}</span>` : `<span class="st-teambar" style="background:${teamCol}"></span>`}
        <span class="st-driver">${name}</span>
      </div>
      <div class="st-team">
        <span class="st-dot" style="background:${teamCol}"></span>
        ${team}
      </div>
      <div class="st-bar-track">
        <div class="st-bar-fill" style="width:${barW}%;background:${teamCol}"></div>
      </div>
    </div>
    <div class="st-right">
      <div class="st-pts">${pts}</div>
      <div class="st-gap">${gap}</div>
    </div>
  </div>`;
}

function renderDriverStandingsOF1(data) {
  const sorted = [...data].sort((a,b) => (a.position||99)-(b.position||99));
  if (!sorted.length) return '<div class="error-msg">Ingen data</div>';
  const leader = sorted[0].points || 0;
  const cards = sorted.map((s,i) => {
    const col = s.team_colour ? `#${s.team_colour}` : teamColor(s.team_name||'');
    const gap = i===0 ? 'Ledare' : `вЂ“${leader - s.points}`;
    return stCard(s.position||i+1, s.driver_name||'вЂ”', s.team_name||'', col, null, s.points||0, leader, gap);
  }).join('');
  return `<div class="st-source">вњ“ OpenF1 В· uppdateras direkt</div><div class="st-list">${cards}</div>`;
}

function renderConstructorStandingsOF1(data) {
  const sorted = [...data].sort((a,b) => (a.position||99)-(b.position||99));
  if (!sorted.length) return '<div class="error-msg">Ingen data</div>';
  const leader = sorted[0].points || 0;
  const cards = sorted.map((s,i) => {
    const col = s.team_colour ? `#${s.team_colour}` : teamColor(s.team_name||'');
    const gap = i===0 ? 'Ledare' : `вЂ“${leader - s.points}`;
    return stCard(s.position||i+1, s.team_name||'вЂ”', '', col, null, s.points||0, leader, gap);
  }).join('');
  return `<div class="st-source">вњ“ OpenF1 В· uppdateras direkt</div><div class="st-list">${cards}</div>`;
}

function renderDriverStandingsJolpica(data, year) {
  const standings = data.DriverStandings;
  if (!standings?.length) return '<div class="error-msg">Inga stГ¤llningar</div>';
  const leader = parseInt(standings[0].points);
  const cards = standings.map((s,i) => {
    const team = s.Constructors?.[0]?.name || '';
    const col  = teamColor(team);
    const pts  = parseInt(s.points);
    const gap  = i===0 ? 'Ledare' : `вЂ“${leader-pts}`;
    const flag = getFlag(s.Driver?.nationality);
    const name = `${s.Driver?.givenName} ${s.Driver?.familyName}`;
    return stCard(parseInt(s.position), name, team, col, flag, pts, leader, gap);
  }).join('');
  return `<div class="st-source">Jolpica Ergast В· ${year} В· omgГҐng ${data.round||'?'}</div><div class="st-list">${cards}</div>`;
}

function renderConstructorStandingsJolpica(data, year) {
  const standings = data.ConstructorStandings;
  if (!standings?.length) return '<div class="error-msg">Inga konstruktГ¶rsstГ¤llningar</div>';
  const leader = parseInt(standings[0].points);
  const cards = standings.map((s,i) => {
    const col = teamColor(s.Constructor?.name||'');
    const pts = parseInt(s.points);
    const gap = i===0 ? 'Ledare' : `вЂ“${leader-pts}`;
    return stCard(parseInt(s.position), s.Constructor?.name||'вЂ”', '', col, null, pts, leader, gap);
  }).join('');
  return `<div class="st-source">Jolpica Ergast В· ${year} В· omgГҐng ${data.round||'?'}</div><div class="st-list">${cards}</div>`;
}

// в”Ђв”Ђв”Ђ SCHEDULE VIEW в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderSchedule(race) {
  const now = new Date();
  const sessions = getSessions(race);
  return `<div class="session-schedule">
    ${sessions.map(s => {
      const past = s.dt < now;
      const liveNow = !past && Math.abs(s.dt - now) < 2*3600*1000;
      const badge = liveNow
        ? '<span class="session-badge session-live-now">LIVE NU</span>'
        : past
          ? '<span class="session-badge session-past">Avslutad</span>'
          : '<span class="session-badge session-upcoming-s">Kommande</span>';
      return `<div class="session-row" style="cursor:${past?'pointer':'default'}"
               onclick="${past?`loadTabFor(${race.round},'${s.key}')` : ''}">
        <div class="session-name">${s.label}</div>
        <div class="session-time">${fmtTime(s.dt)}</div>
        ${badge}
        <div class="session-date">${fmtDate(s.dt)}</div>
      </div>`;
    }).join('')}
    <p style="margin-top:16px;font-size:12px;color:var(--muted)">
      Tider i svensk lokal tid (CET/CEST). Klicka pГҐ avslutade sessioner fГ¶r resultat.
    </p>
  </div>`;
}

function loadTabFor(round, key) {
  const card = document.querySelector(`.race-card[data-round="${round}"]`);
  if (!card) return;
  if (!card.classList.contains('open')) card.querySelector('.race-header').click();
  setTimeout(() => { const tab = card.querySelector(`.tab-btn[data-tab="${key}"]`); if (tab) tab.click(); }, 150);
}

// в”Ђв”Ђв”Ђ TAB LOGIC в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function loadTab(card, race, tabKey) {
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabKey));
  const content = card.querySelector('.tab-content');
  const now = new Date();

  if (tabKey === 'schedule') { content.innerHTML = renderSchedule(race); return; }

  const sessions = getSessions(race);
  const sess = sessions.find(s => s.key === tabKey);
  const pastSession = sess ? sess.dt < now : new Date(race.raceDate+'T23:59:59') < now;

  if (!pastSession) {
    content.innerHTML = `<div class="session-schedule">
      <div class="session-row">
        <div class="session-name" style="font-size:15px">${sess?.label || tabKey}</div>
        <div class="session-time">${sess ? fmtTime(sess.dt) : 'вЂ”'}</div>
        <span class="session-badge session-upcoming-s">Kommande</span>
        <div class="session-date">${sess ? fmtDate(sess.dt) : ''}</div>
      </div>
      <p style="margin-top:16px;font-size:12px;color:var(--muted)">Resultat visas efter att sessionen Г¤r klar.</p>
    </div>`;
    return;
  }

  content.innerHTML = `<div class="loading"><div class="spinner"></div>HГ¤mtar resultat...</div>`;
  const data = await fetchResults(race.round, tabKey);

  if (!data) {
    content.innerHTML = `<div class="error-msg">вљ  Inga resultat hittades Г¤nnu.
      <br><span style="font-size:11px;color:#555;display:block;margin-top:6px">
        Jolpica &amp; OpenF1 kontaktades вЂ” fГ¶rsГ¶k igen om en stund
      </span></div>`;
    return;
  }
  content.innerHTML = `<div class="results-wrapper">${renderResults(data)}</div>`;
}

// в”Ђв”Ђв”Ђ BUILD RACE CARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildCard(race) {
  const now = new Date();
  const past = isPast(race), live = isLiveWeekend(race);

  const statusBadge = live
    ? '<span class="badge badge-live">рџ”ґ LIVE</span>'
    : past
      ? '<span class="badge badge-done">вњ“ Avslutat</span>'
      : '<span class="badge badge-upcoming">Kommande</span>';
  const sprintBadge = race.sprint ? '<span class="badge badge-sprint" style="margin-top:2px">Sprint</span>' : '';

  const fri = new Date(race.dates[0]+'T00:00:00');
  const sun = new Date(race.dates[2]+'T00:00:00');
  const dateRange = `${fri.getDate()} вЂ“ ${sun.getDate()} ${MONTHS_SV[sun.getMonth()].toUpperCase()} ${sun.getFullYear()}`;

  const sessions = getSessions(race);
  const tabsToShow = [{ key:'schedule', label:'Tider' }];

  if (past || live) {
    if (race.sprint) {
      [['fp1','FP1'],['sq','Sprint Kval'],['sprint','Sprint'],['quali','Kval'],['race','Race']].forEach(([k,l]) => {
        if (sessions.find(s=>s.key===k)?.dt < now) tabsToShow.push({key:k,label:l});
      });
    } else {
      [['fp1','FP1'],['fp2','FP2'],['fp3','FP3'],['quali','Kval'],['race','Race']].forEach(([k,l]) => {
        if (sessions.find(s=>s.key===k)?.dt < now) tabsToShow.push({key:k,label:l});
      });
    }
  }

  const defaultTab = tabsToShow[tabsToShow.length - 1].key;
  const card = document.createElement('div');
  card.className = `race-card${live?' live':''}${!past&&!live?' upcoming':''}`;
  card.dataset.round = race.round;

  card.innerHTML = `
    <div class="race-header">
      <div class="round-num">R${String(race.round).padStart(2,'0')}</div>
      <div class="flag">${race.flag}</div>
      <div class="race-info">
        <div class="race-name">${race.name}</div>
        <div class="race-meta">${race.circuit} В· ${dateRange}</div>
      </div>
      <div class="race-status">${statusBadge}${sprintBadge}</div>
      <div class="chevron">в–ј</div>
    </div>
    <div class="race-panel">
      <div class="tabs">
        ${tabsToShow.map(t=>`<button class="tab-btn${t.key===defaultTab?' active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div class="tab-content"></div>
    </div>`;

  card.querySelector('.race-header').addEventListener('click', () => {
    const wasOpen = card.classList.contains('open');
    card.classList.toggle('open', !wasOpen);
    if (!wasOpen) loadTab(card, race, card.querySelector('.tab-btn.active')?.dataset.tab || defaultTab);
  });
  card.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); loadTab(card, race, btn.dataset.tab); });
  });
  if (live) setTimeout(() => { card.classList.add('open'); loadTab(card, race, defaultTab); }, 300);
  return card;
}

// в”Ђв”Ђв”Ђ PAGE NAVIGATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function showPage(page) {
  document.getElementById('page-calendar').style.display  = page === 'calendar'  ? '' : 'none';
  document.getElementById('page-standings').style.display = page === 'standings' ? '' : 'none';
  document.getElementById('nav-calendar').classList.toggle('active',  page === 'calendar');
  document.getElementById('nav-standings').classList.toggle('active', page === 'standings');
  if (page === 'standings') showStandings(currentStandingsTab);
}

async function showStandings(type) {
  currentStandingsTab = type;
  document.getElementById('std-drivers').classList.toggle('active', type === 'drivers');
  document.getElementById('std-constructors').classList.toggle('active', type === 'constructors');
  const content = document.getElementById('standings-content');
  const ck = `std_${type}`;
  if (!standingsCache[ck]) {
    content.innerHTML = '<div class="loading"><div class="spinner"></div>HГ¤mtar stГ¤llningar...</div>';
  }
  const result = await fetchStandings(type);
  if (!result) {
    content.innerHTML = '<div class="error-msg">вљ  Kunde inte hГ¤mta stГ¤llningar<br><span style="font-size:11px;color:#555;display:block;margin-top:6px">Kontrollera nГ¤tverksanslutning вЂ“ API:erna Jolpica & OpenF1 kontaktades</span></div>';
    return;
  }
  let html = '';
  if (result.source === 'openf1') {
    html = type === 'drivers' ? renderDriverStandingsOF1(result.data) : renderConstructorStandingsOF1(result.data);
  } else {
    html = type === 'drivers'
      ? renderDriverStandingsJolpica(result.data, result.year)
      : renderConstructorStandingsJolpica(result.data, result.year);
  }
  content.innerHTML = `<div class="results-wrapper" style="padding:0">${html}</div>`;
}

function init() {
  const list = document.getElementById('races-list');
  let currentMonth = '';
  RACES_2026.forEach(race => {
    const month = getMonthSV(race.raceDate);
    if (month !== currentMonth) {
      currentMonth = month;
      const div = document.createElement('div');
      div.className = 'month-divider';
      div.textContent = month;
      list.appendChild(div);
    }
    list.appendChild(buildCard(race));
  });
}
init();
