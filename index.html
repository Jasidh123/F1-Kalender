function buildCard(race) {
  const now = new Date();
  const past = isPast(race), live = isLiveWeekend(race);
  const isNext = !live && !past && RACES_2026.filter(r => !isPast(r) && !isLiveWeekend(r)).indexOf(race) === 0;

  const statusBadge = live
    ? '<span class="badge badge-live">🔴 LIVE</span>'
    : past
      ? '<span class="badge badge-done">✓ Avslutat</span>'
      : isNext
        ? '<span class="badge badge-next">▶ Nästa</span>'
        : '<span class="badge badge-upcoming">Kommande</span>';
  const sprintBadge = race.sprint ? '<span class="badge badge-sprint" style="margin-top:2px">Sprint</span>' : '';

  const fri = new Date(race.dates[0]+'T00:00:00');
  const sun = new Date(race.dates[2]+'T00:00:00');
  const dateRange = `${fri.getDate()} – ${sun.getDate()} ${MONTHS_SV[sun.getMonth()].toUpperCase()} ${sun.getFullYear()}`;

  const sessions = getSessions(race);
  const tabsToShow = [{ key:'schedule', label:'Tider' }, { key:'historia', label:'📅 Förra året' }];

  // Add weather tab for upcoming races within forecast window
  const daysAway = (new Date(race.dates[0]+'T00:00:00') - new Date()) / 86400000;
  if (!past && daysAway <= WEATHER_MAX_DAYS) tabsToShow.splice(1, 0, { key:'vader', label:'🌤️ Väder' });

  // Add LIVE tab first if it's race weekend and currently live
  if (live) tabsToShow.push({ key:'live', label:'🔴 LIVE' });

  if (past || live) {
    if (race.sprint) {
      [['fp1','FP1'],['sq','Sprint Kval'],['sprint','Sprint'],['quali','Kval'],['race','Race']].forEach(([k,l]) => {
        if (sessions.find(s=>s.key===k)?.dt < now) tabsToShow.push({key:k,label:l});
      });
    } else {
      [['fp1','FP1'],['fp2','FP2'],['fp3','FP3'],['quali','Kval'],['race','Race']].forEach(([k,l]) => {
        if (sessions.find(s=>s.key===k)?.dt < now) tabsToShow.push({key:k,label:l});
      });
    }
  }

  const defaultTab = live ? 'live' : 'schedule';
  const card = document.createElement('div');

  card.className = `race-card${live?' live':''}${past?' past':''}${isNext?' next-race':''}${!past&&!live&&!isNext?' upcoming':''}`;
  card.dataset.round = race.round;

  card.innerHTML = `
    <div class="race-header">
      <div class="round-num">R${String(race.round).padStart(2,'0')}</div>
      <div class="flag">${race.flag}</div>
      <div class="race-info">
        <div class="race-name">${race.name}</div>
        <div class="race-meta">${race.circuit} · ${dateRange}</div>
      </div>
      <div class="race-right">${statusBadge}${sprintBadge}</div>
      <div class="chevron">›</div>
    </div>
    <div class="race-panel">
      <div class="tabs">
        ${tabsToShow.map(t=>`<button class="tab-btn${t.key===defaultTab?' active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div class="tab-content"></div>
    </div>`;

  card.querySelector('.race-header').addEventListener('click', () => {
    const wasOpen = card.classList.contains('open');
    card.classList.toggle('open', !wasOpen);
    if (!wasOpen) loadTab(card, race, card.querySelector('.tab-btn.active')?.dataset.tab || defaultTab);
    else if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  });
  card.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); loadTab(card, race, btn.dataset.tab); });
  });
  if (live) setTimeout(() => { card.classList.add('open'); loadTab(card, race, defaultTab); }, 300);
  return card;
}

let chartData    = null;   // { rounds, drivers: [{name,color,pts:[],total}] }
let chartActive  = new Set(); // which drivers are toggled on
const CHART_CACHE_KEY = 'chart_data';

// Jolpica driver colors fallback (team-based)
function driverColor(constructorId) {
  const map = {
    'red_bull':'#3671C6','ferrari':'#E8002D','mclaren':'#FF8000',
    'mercedes':'#00D2BE','aston_martin':'#358C75','alpine':'#FF87BC',
    'williams':'#64C4FF','rb':'#6692FF','haas':'#B6BABD',
    'audi':'#999999','cadillac':'#C4B696',
  };
  for (const [k,v] of Object.entries(map)) if (constructorId?.includes(k)) return v;
  return '#888888';
}

async function fetchChartData() {
  if (chartData) return chartData;
  try {
    // Fetch all 2026 race results round by round (up to last completed)
    const completed = RACES_2026.filter(r => isPast(r));
    if (!completed.length) { chartData = { rounds:[], drivers:[] }; return chartData; }

    const roundResults = await Promise.all(
      completed.map(r =>
        fetch(`https://api.jolpi.ca/ergast/f1/2026/${r.round}/results/?limit=25`, { signal: AbortSignal.timeout(10000) })
          .then(res => res.ok ? res.json() : null).catch(() => null)
      )
    );

    // Build per-driver cumulative points
    const driverMap = {}; // driverId → { name, color, conId, pts: [cumul per round] }

    for (let i = 0; i < roundResults.length; i++) {
      const race = roundResults[i]?.MRData?.RaceTable?.Races?.[0];
      if (!race) continue;
      const results = race.Results || [];

      // First pass: zero out this round for all known drivers
      for (const d of Object.values(driverMap)) d.thisRound = 0;

      for (const r of results) {
        const id   = r.Driver.driverId;
        const name = r.Driver.code || (r.Driver.givenName[0] + '. ' + r.Driver.familyName);
        const pts  = parseFloat(r.points) || 0;
        const conId = r.Constructor.constructorId;
        if (!driverMap[id]) {
          driverMap[id] = { name, color: driverColor(conId), conId, cumul: 0, pts: Array(i).fill(0) };
        }
        driverMap[id].thisRound = pts;
      }

      // Accumulate
      for (const d of Object.values(driverMap)) {
        d.cumul += (d.thisRound || 0);
        d.pts.push(d.cumul);
      }
    }

    const rounds = completed.map(r => r.name.replace(/ GP$/,'').replace('Australiens','AUS').replace('Kinas','CHN')
      .replace('Japans','JPN').replace('Bahrains','BHR').replace('Saudiarabiens','SAU')
      .replace('Miamis','MIA').replace('Kanadas','CAN').replace('Monacos','MON')
      .replace('Barcelonas','ESP').replace('Österrikes','AUT').replace('Storbritanniens','GBR')
      .replace('Belgiens','BEL').replace('Ungerns','HUN').replace('Hollands','NED')
      .replace('Italiens','ITA').replace('Madrids','MAD').replace('Azerbajdzjans','AZE')
      .replace('Singapores','SGP').replace("USA:s",'USA').replace('Mexikos','MEX')
      .replace('Brasiliens','BRA').replace('Las Vegas','LVG').replace('Qatars','QAT')
      .replace('Abu Dhabis','ABD'));

    const drivers = Object.values(driverMap)
      .filter(d => d.pts.length > 0)
      .sort((a,b) => b.cumul - a.cumul);

    chartData = { rounds, drivers };
    return chartData;
  } catch(e) { return { rounds:[], drivers:[] }; }
}

function drawChart() {
  const canvas = document.getElementById('pts-chart');
  if (!canvas || !chartData) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth;
  const H   = 280;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const active = chartData.drivers.filter(d => chartActive.has(d.name));
  if (!active.length) {
    ctx.fillStyle = '#333';
    ctx.font = '13px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Välj förare nedan', W/2, H/2);
    return;
  }

  const pad = { top:16, right:16, bottom:36, left:44 };
  const cW   = W - pad.left - pad.right;
  const cH   = H - pad.top  - pad.bottom;
  const n    = chartData.rounds.length;

  // Add projection rounds (remaining races)
  const remaining = RACES_2026.filter(r => !isPast(r));
  const projRounds = Math.min(remaining.length, 5);
  const totalCols  = n + projRounds;

  const allPts = active.flatMap(d => {
    const real = d.pts;
    // Projection: linear extrapolation from last 3 rounds avg
    const proj = [];
    if (projRounds > 0 && real.length >= 2) {
      const recent = real.slice(-Math.min(3, real.length));
      const avgGain = recent.length > 1
        ? (recent[recent.length-1] - recent[0]) / (recent.length-1)
        : 0;
      let last = real[real.length-1];
      for (let i=0; i<projRounds; i++) { last += avgGain; proj.push(Math.round(last)); }
    }
    return [...real, ...proj];
  });
  const maxPts = Math.max(...allPts, 1);
  const minPts = 0;

  const xStep = cW / Math.max(totalCols - 1, 1);
  const yScale = pt => pad.top + cH - ((pt - minPts) / (maxPts - minPts)) * cH;
  const xPos   = i  => pad.left + i * xStep;

  // Background grid
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 1;
  for (let g=0; g<=4; g++) {
    const y = pad.top + (cH / 4) * g;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    const label = Math.round(maxPts - (maxPts / 4) * g);
    ctx.fillStyle = '#444'; ctx.font = '10px DM Sans'; ctx.textAlign = 'right';
    ctx.fillText(label, pad.left - 6, y + 3);
  }

  // Vertical race lines
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  for (let i=0; i<n; i++) {
    const x = xPos(i);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + cH); ctx.stroke();
  }

  // Draw lines per driver
  for (const d of active) {
    const real = d.pts;
    // Projection
    const proj = [];
    if (projRounds > 0 && real.length >= 2) {
      const recent = real.slice(-Math.min(3, real.length));
      const avgGain = recent.length > 1
        ? (recent[recent.length-1] - recent[0]) / (recent.length-1)
        : 0;
      let last = real[real.length-1];
      for (let i=0; i<projRounds; i++) { last += avgGain; proj.push(Math.round(Math.max(0, last))); }
    }

    // Real line
    ctx.strokeStyle = d.color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    ctx.setLineDash([]);
    ctx.beginPath();
    real.forEach((pts, i) => {
      const x = xPos(i), y = yScale(pts);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Dots on real data
    real.forEach((pts, i) => {
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.arc(xPos(i), yScale(pts), 3, 0, Math.PI*2);
      ctx.fill();
    });

    // Projection dashed
    if (proj.length && real.length) {
      ctx.strokeStyle = d.color; ctx.lineWidth = 1.5;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(xPos(real.length-1), yScale(real[real.length-1]));
      proj.forEach((pts, i) => ctx.lineTo(xPos(real.length+i), yScale(pts)));
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Label at end of real line
    if (real.length) {
      const lx = xPos(real.length-1) + 5;
      const ly = yScale(real[real.length-1]);
      ctx.fillStyle = d.color;
      ctx.font = 'bold 10px DM Sans';
      ctx.textAlign = 'left';
      ctx.fillText(d.name, lx, ly + 4);
    }
  }

  // X axis labels (round abbreviations)
  ctx.fillStyle = '#444'; ctx.font = '9px DM Sans'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(n/8));
  chartData.rounds.forEach((label, i) => {
    if (i % step !== 0 && i !== n-1) return;
    ctx.fillText(label, xPos(i), pad.top + cH + 14);
  });

  // Projection label

const NOTIFY_KEY = 'f1_notify_enabled';
let swReg = null;

// Register service worker (inline via blob)
async function registerSW() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    const swCode = `
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.openWindow('/'));
});
self.addEventListener('push', e => {
  const d = e.data ? e.data.json() : {};
  e.waitUntil(self.registration.showNotification(d.title||'F1 2026', {
    body: d.body||'', icon: d.icon||'', badge: d.badge||'',
    tag: d.tag||'f1', renotify: true, vibrate:[200,100,200]
  }));
});
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    swReg = await navigator.serviceWorker.register(swUrl, { scope: '/' });
    return swReg;
  } catch(e) { return null; }
}

async function requestPermission() {
  if (!('Notification' in window)) return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  if (Notification.permission === 'denied')  return 'denied';
  return await Notification.requestPermission();
}

function scheduleNotifications() {
  // Clear any existing scheduled notifications (stored timeouts)
  if (window._notifTimeouts) window._notifTimeouts.forEach(clearTimeout);
  window._notifTimeouts = [];

  const now = Date.now();
  // Schedule a notification 30 min before each session
  for (const race of RACES_2026) {
    for (const sess of getSessions(race)) {
      const fireAt = sess.dt.getTime() - 30 * 60 * 1000; // 30 min before
      const delay  = fireAt - now;
      if (delay < 0 || delay > 7 * 24 * 3600 * 1000) continue; // only within 7 days

      const tid = setTimeout(() => {
        showNotification(
          `🏎️ ${race.name} – ${sess.label}`,
          `Startar om 30 minuter · ${fmtTime(sess.dt)}`,
          race.flag
        );
      }, delay);
      window._notifTimeouts.push(tid);
    }
  }
}

async function showNotification(title, body, icon='🏁') {
  if (Notification.permission !== 'granted') return;
  // Try SW notification first (works when app is in background)
  if (swReg) {
    try {
      await swReg.showNotification(title, {
        body, tag: 'f1-session', renotify: true,
        icon: `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E10600'/><text y='.85em' font-size='72' x='14'>${icon}</text></svg>`,
        vibrate: [200, 100, 200],
        badge:   `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E10600'/><text y='.85em' font-size='72' x='14'>🏎</text></svg>`
      });
      return;
    } catch(e) {}
  }
  // Fallback to regular Notification API
  new Notification(title, { body, tag: 'f1-session' });
}

async function handleNotifyBtn() {
  const perm = Notification.permission;

  if (perm === 'denied') {
    showToast('❌ Notiser blockerade – tillåt dem i Inställningar → Safari');
    return;
  }

  const enabled = localStorage.getItem(NOTIFY_KEY) === 'true';

  if (enabled) {
    // Turn off
    localStorage.setItem(NOTIFY_KEY, 'false');
    if (window._notifTimeouts) window._notifTimeouts.forEach(clearTimeout);
    window._notifTimeouts = [];
    updateNotifyBtn();
    showToast('🔕 Notiser avstängda');
    return;
  }

  // Turn on – request permission
  const result = await requestPermission();
  if (result === 'granted') {
    await registerSW();
    localStorage.setItem(NOTIFY_KEY, 'true');
    scheduleNotifications();
    updateNotifyBtn();
    showToast('🔔 Notiser aktiverade! 30 min före varje session.');
  } else if (result === 'denied') {
    showToast('❌ Tillåt notiser i Safari-inställningar');
  } else {
    showToast('ℹ️ Notiser stöds ej i denna browser');
  }
}

function updateNotifyBtn() {
  const enabled = localStorage.getItem(NOTIFY_KEY) === 'true'
                  && Notification.permission === 'granted';
  const icon  = document.getElementById('notify-icon');
  const label = document.getElementById('notify-label');
  const btn   = document.getElementById('nav-notify');
  if (!icon) return;
  if (enabled) {
    icon.textContent  = '🔔';
    label.textContent = 'På';
    btn.classList.add('active');
  } else {
    icon.textContent  = '🔕';
    label.textContent = 'Notiser';
    btn.classList.remove('active');
  }
}

// ── Points system ─────────────────────────────────────────────────────────────
// Exact position: 15p | ±1: 8p | ±2: 4p | ±3: 2p | Wrong: 0p
// Bonus: guessed P1 correctly = +10p extra
function calcPoints(picks, results) {
  // picks & results: arrays of driver names, index = position-1
  let total = 0;
  const detail = [];
  for (let i = 0; i < 10; i++) {
    const pick   = picks[i];
    const actual = results[i];
    if (!pick || pick === '') { detail.push({ pts:0, type:'miss' }); continue; }
    const actualPos = results.indexOf(pick);
    if (actualPos === -1) { detail.push({ pts:0, type:'miss' }); continue; }
    const diff = Math.abs(actualPos - i);
    let pts = diff === 0 ? 15 : diff === 1 ? 8 : diff === 2 ? 4 : diff === 3 ? 2 : 0;
    const type = diff === 0 ? 'exact' : diff <= 2 ? 'close' : 'miss';
    total += pts;
    detail.push({ pts, type, actualPos });
  }
  // P1 bonus
  if (picks[0] && picks[0] === results[0]) total += 10;
  return { total, detail };
}

// ── Auto-score completed races ────────────────────────────────────────────────
async function fxScoreAll() {
  if (!fxData) return;
  for (const race of RACES_2026) {
    if (!isPast(race)) continue;
    const rk = String(race.round);
    if (fxData.results?.[rk]) continue; // already have results
    // Fetch actual results from Jolpica
    try {
      const r = await fetch(`https://api.jolpi.ca/ergast/f1/2026/${race.round}/results/`,
        { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      const j = await r.json();
      const res = j?.MRData?.RaceTable?.Races?.[0]?.Results;
      if (!res?.length) continue;
      const top10 = res.slice(0,10).map(r =>
        r.Driver.givenName[0]+'. '+r.Driver.familyName
      );
      if (!fxData.results) fxData.results = {};
      fxData.results[rk] = top10;

      // Score all players who made picks for this race
      const racePicks = fxData.picks?.[rk] || {};
      for (const [nick, picks] of Object.entries(racePicks)) {
        if (fxData.players[nick]?.scored?.[rk]) continue;
        const { total } = calcPoints(picks, top10);
        if (!fxData.players[nick]) fxData.players[nick] = { totalPts:0, races:0 };
        fxData.players[nick].totalPts = (fxData.players[nick].totalPts||0) + total;
        fxData.players[nick].races    = (fxData.players[nick].races||0) + 1;
        if (!fxData.players[nick].scored) fxData.players[nick].scored = {};
        fxData.players[nick].scored[rk] = total;
      }
    } catch(e) {}
  }
  await fxUpdateBin(fxBinId, fxData);
}

function fxRenderStats(playerNick) {
  fxStatsPlayer = playerNick;
  const panel = document.getElementById('fx-stats-panel');
  if (!panel || !fxData) return;

  const players  = fxData.players  || {};
  const picks    = fxData.picks    || {};
  const results  = fxData.results  || {};
  const allNicks = Object.keys(players);

  if (!allNicks.length) {
    panel.innerHTML = '<div style="text-align:center;padding:40px 16px;color:var(--muted);font-size:13px">Inga spelare ännu</div>';
    return;
  }

  // Clamp to known player
  if (!players[playerNick]) playerNick = allNicks[0];

  // ── Per-race scores for this player ──────────────────────────────────────
  const completedRounds = Object.keys(results).map(Number).sort((a,b)=>a-b);
  const racePts = completedRounds.map(rk => {
    const scored = players[playerNick]?.scored?.[rk];
    const race   = RACES_2026.find(r => r.round === rk);
    return { round: rk, pts: scored ?? null, label: race ? race.name.replace(/ Grand Prix$/,'').replace(/ GP$/,'') : `R${rk}` };
  });

  // ── Summary stats ─────────────────────────────────────────────────────────
  const playedRaces  = racePts.filter(r => r.pts !== null);
  const totalPts     = playedRaces.reduce((s,r) => s + r.pts, 0);
  const avgPts       = playedRaces.length ? (totalPts / playedRaces.length).toFixed(1) : '—';
  const bestRace     = playedRaces.length ? playedRaces.reduce((a,b) => b.pts > a.pts ? b : a) : null;
  const bestPts      = bestRace?.pts ?? 0;

  // Streak: consecutive races with > 0 points (current streak)
  let streak = 0;
  for (let i = playedRaces.length - 1; i >= 0; i--) {
    if (playedRaces[i].pts > 0) streak++;
    else break;
  }

  // Exact hits (P1 exact = both pick + P1 bonus = 25 is special, but we count position exact)
  let exactHits = 0;
  let totalPicks = 0;
  completedRounds.forEach(rk => {
    const myPick = picks[rk]?.[playerNick];
    const res    = results[rk];
    if (!myPick || !res) return;
    for (let i=0; i<10; i++) {
      if (myPick[i]) {
        totalPicks++;
        if (myPick[i] === res[i]) exactHits++;
      }
    }
  });
  const hitRate = totalPicks ? Math.round(exactHits / totalPicks * 100) : 0;

  // Most-picked P1 driver (across all rounds for this player)
  const p1picks = {};
  completedRounds.forEach(rk => {
    const myPick = picks[rk]?.[playerNick];
    if (myPick?.[0]) { p1picks[myPick[0]] = (p1picks[myPick[0]] || 0) + 1; }
  });
  const favP1 = Object.entries(p1picks).sort((a,b)=>b[1]-a[1])[0];

  // Most-picked driver overall (positions 1–10)
  const allPickCounts = {};
  completedRounds.forEach(rk => {
    const myPick = picks[rk]?.[playerNick];
    if (!myPick) return;
    myPick.forEach(d => { if(d) allPickCounts[d] = (allPickCounts[d]||0)+1; });
  });
  const topPicked = Object.entries(allPickCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Best race across all players (for leaderboard context)
  const maxPts = Math.max(...racePts.map(r => r.pts ?? 0), 1);

  // ── Player selector ───────────────────────────────────────────────────────
  const playerBtns = allNicks.map(n => `
    <button class="fx-player-btn ${n===playerNick?'active':''}"
      onclick="fxRenderStats('${n.replace(/'/g,"\\'")}')">
      ${n === fxNick ? '👤 ' : ''}${n}
    </button>`).join('');

  // ── Bar chart ─────────────────────────────────────────────────────────────
  const barRows = racePts.length ? racePts.map(r => {
    const pts = r.pts ?? 0;
    const pct = Math.round((pts / maxPts) * 100);
    const isBest = bestRace && r.round === bestRace.round;
    const shortLabel = r.label.substring(0,4);
    return `
      <div class="fx-bar-row">
        <div class="fx-bar-label">${shortLabel}</div>
        <div class="fx-bar-track">
          ${pts > 0
            ? `<div class="fx-bar-fill ${isBest?'best':''}" style="width:${pct}%">
                <span class="fx-bar-pts">${pts}</span>
               </div>`
            : `<span class="fx-bar-zero">${r.pts === null ? '—' : '0'}</span>`
          }
        </div>
      </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:12px;padding:8px 0">Inga avklarade lopp ännu</div>';

  // ── Fav drivers table ─────────────────────────────────────────────────────
  const favRows = topPicked.length ? topPicked.map(([d, count], i) => `
    <div class="fx-fav-row">
      <div class="fx-fav-pos">${i+1}</div>
      <div class="fx-fav-name">${d}</div>
      <div style="text-align:right">
        <div class="fx-fav-count">${count}×</div>
        <div class="fx-fav-label">gissad</div>
      </div>
    </div>`).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:8px 0">Inga gissningar ännu</div>';

  panel.innerHTML = `
    <div class="fx-stats-wrap">

      ${allNicks.length > 1 ? `
        <div class="fx-stats-header">SPELARE</div>
        <div class="fx-player-selector">${playerBtns}</div>
      ` : ''}

      <div class="fx-stats-header">SAMMANFATTNING</div>
      <div class="fx-stat-grid">
        <div class="fx-stat-card">
          <div class="fx-stat-value ${totalPts > 0 ? 'good' : ''}">${totalPts}</div>
          <div class="fx-stat-label">Totala poäng</div>
        </div>
        <div class="fx-stat-card">
          <div class="fx-stat-value">${avgPts}</div>
          <div class="fx-stat-label">Snitt / lopp</div>
        </div>
        <div class="fx-stat-card">
          <div class="fx-stat-value ${bestPts >= 30 ? 'great' : bestPts > 0 ? 'good' : ''}">${bestPts}</div>
          <div class="fx-stat-label">Bästa lopp${bestRace ? ` · ${bestRace.label.substring(0,6)}` : ''}</div>
        </div>
        <div class="fx-stat-card">
          <div class="fx-stat-value ${streak >= 3 ? 'great' : streak > 0 ? 'good' : ''}">${streak}</div>
          <div class="fx-stat-label">Poängstreak 🔥</div>
        </div>
        <div class="fx-stat-card">
          <div class="fx-stat-value ${hitRate >= 20 ? 'great' : hitRate > 0 ? 'good' : ''}">${hitRate}%</div>
          <div class="fx-stat-label">Exakta träffar</div>
        </div>
        <div class="fx-stat-card">
          <div class="fx-stat-value ${favP1 ? 'good' : ''}">${favP1 ? favP1[0].split(' ').pop() : '—'}</div>
          <div class="fx-stat-label">Favvo P1${favP1 ? ` · ${favP1[1]}×` : ''}</div>
        </div>
      </div>

      <div class="fx-stats-header">POÄNG PER LOPP</div>
      <div class="fx-bar-chart">${barRows}</div>

      <div class="fx-stats-header">MEST GISSADE FÖRARE</div>
      <div>${favRows}</div>

    </div>`;
}



function fxRenderPickPanel() {
  const race   = fxNextRace();
  const rk     = String(race.round);
  const locked = fxIsLocked(race);
  const past   = isPast(race);
  const myPicks= fxData.picks?.[rk]?.[fxNick] || Array(10).fill('');
  const actual = fxData.results?.[rk] || null;
  const scored = fxData.players?.[fxNick]?.scored?.[rk];

  let statusHtml, statusClass;
  if (actual) {
    statusHtml  = `✅ Scored — ${scored ?? 0} poäng`;
    statusClass = 'scored';
  } else if (locked) {
    statusHtml  = '🔒 Inlämning stängd — väntar på race';
    statusClass = 'closed';
  } else {
    const fp1 = getSessions(race).find(s=>s.key==='fp1');
    const deadline = fp1 ? `Stänger ${fmtDate(fp1.dt)} ${fmtTime(fp1.dt)}` : '';
    statusHtml  = `🟢 Öppen · ${deadline}`;
    statusClass = 'open';
  }

  // Build driver slots
  let slotsHtml = '';
  for (let i=0; i<10; i++) {
    const posClass = i===0?'p1':i===1?'p2':i===2?'p3':'';
    const pick = myPicks[i] || '';

    // If scored, show result badge
    let badge = '', ptsBadge = '';
    if (actual) {
      const actualPos = actual.indexOf(pick);
      const diff = pick ? Math.abs(actualPos - i) : 99;
      const type = !pick ? 'miss' : diff===0?'exact':diff<=2?'close':'miss';
      const pts  = !pick ? 0 : diff===0?15:diff===1?8:diff===2?4:diff===3?2:0;
      const extra = i===0 && pick && actual[0]===pick ? 10 : 0;
      badge    = `<span class="fx-result-badge ${type}">${actual[i]||'—'}</span>`;
      ptsBadge = `<span class="fx-slot-pts ${type}">${pts+extra>0?'+':''}${pts+extra||'·'}</span>`;
    }

    // Dropdown or locked display
    let input;
    if (locked || actual) {
      input = `<div class="fx-driver-select" style="background:transparent;border-color:var(--border);color:${pick?'var(--text)':'var(--muted)'}">
        ${pick || '—'}</div>`;
    } else {
      const opts = FX_DRIVERS.map(d =>
        `<option value="${d}" ${d===pick?'selected':''}>${d}</option>`
      ).join('');
      input = `<select class="fx-driver-select" onchange="fxUpdatePick(${race.round},${i},this.value)">
        <option value="">— Välj förare —</option>${opts}</select>`;
    }

    slotsHtml += `
      <div class="fx-driver-slot">
        <div class="fx-slot-pos ${posClass}">${i+1}</div>
        ${input}
        ${badge}
        ${ptsBadge}
      </div>`;
  }

  // Total pts preview
  let totalPreview = '';
  if (!actual && !locked) {
    const validPicks = myPicks.filter(p=>p);
    totalPreview = `<div class="fx-my-pts">${validPicks.length}/10 valda</div>`;
  } else if (actual && scored !== undefined) {
    totalPreview = `<div class="fx-my-pts">Totalt: <span>${scored}</span> poäng</div>`;
  }

  document.getElementById('fx-pick-panel').innerHTML = `
    <div class="fx-pick-card">
      <div class="fx-pick-header">
        <div class="fx-pick-race">${race.flag} ${race.name}</div>
        <div class="fx-pick-meta">${race.circuit} · ${race.raceDate}</div>
        <div class="fx-pick-status ${statusClass}">${statusHtml}</div>
      </div>
      <div class="fx-driver-list">${slotsHtml}</div>
      <div class="fx-submit-row">
        ${totalPreview}
        ${!locked && !actual ? `<button class="fx-btn-secondary" onclick="fxSavePicks(${race.round})">💾 Spara gissningar</button>` : ''}
      </div>
    </div>`;
}

function fxRenderLeaderboard() {
  const players = fxData?.players || {};
  const sorted  = Object.entries(players)
    .sort((a,b) => (b[1].totalPts||0) - (a[1].totalPts||0));

  if (!sorted.length) {
    document.getElementById('fx-leaderboard').innerHTML =
      '<div class="fx-empty">Inga spelare ännu — dela länken! 🏎️</div>';
    return;
  }

  const rankClass = ['r1','r2','r3'];
  const rows = sorted.map(([nick, p], i) => {
    const isMe = nick === fxNick;
    return `
      <div class="fx-lb-row${isMe?' fx-lb-me':''}">
        <div class="fx-lb-rank ${rankClass[i]||''}">${i+1}</div>
        <div>
          <div class="fx-lb-name">${isMe?'👤 ':''} ${nick}</div>
          <div class="fx-lb-races">${p.races||0} lopp spelade</div>
        </div>
        <div style="text-align:right">
          <div class="fx-lb-pts">${p.totalPts||0}</div>
          <div class="fx-lb-pts-label">POÄNG</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('fx-leaderboard').innerHTML = `
    <div class="fx-lb-title">🏆 STÄLLNING</div>
    <div class="fx-lb-card">${rows}</div>`;
}

async function fxUpdatePick(round, pos, driver) {
  const rk = String(round);
  if (!fxData.picks)        fxData.picks = {};
  if (!fxData.picks[rk])    fxData.picks[rk] = {};
  if (!fxData.picks[rk][fxNick]) fxData.picks[rk][fxNick] = Array(10).fill('');
  fxData.picks[rk][fxNick][pos] = driver;
  // Update preview count
  const valid = fxData.picks[rk][fxNick].filter(p=>p).length;
  const el = document.querySelector('.fx-my-pts');
  if (el) el.textContent = `${valid}/10 valda`;
}

async function fxSavePicks(round) {
  const rk = String(round);
  const picks = fxData.picks?.[rk]?.[fxNick] || [];
  const valid = picks.filter(p=>p).length;
  if (valid < 5) { showToast('Välj minst 5 förare!'); return; }
  showToast('💾 Sparar...');
  const ok = await fxUpdateBin(fxBinId, fxData);
  showToast(ok ? '✅ Gissningar sparade!' : '⚠ Fel vid sparande');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
// ─── PULL TO REFRESH ─────────────────────────────────────────────────────────
(function() {
  const PTR_THRESHOLD   = 72;   // px drag needed to trigger refresh
  const PTR_MAX_PULL    = 100;  // max visual drag
  let startY = 0, currentY = 0, pulling = false, refreshing = false;

  const indicator = document.getElementById('ptr-indicator');

  function setPullLabel(dist) {
    const pct = Math.min(dist / PTR_THRESHOLD, 1);
    indicator.querySelector('.ptr-label').textContent =
      pct >= 1 ? 'Släpp för att uppdatera ↑' : 'Dra ner för att uppdatera';
    // Rotate spinner arc with pull distance
    indicator.querySelector('.ptr-spinner').style.transform =
      `rotate(${Math.round(pct * 360)}deg)`;
  }

  async function doRefresh() {
    if (refreshing) return;
    refreshing = true;
    indicator.classList.remove('ptr-pulling');
    indicator.classList.add('ptr-refreshing');
    indicator.querySelector('.ptr-label').textContent = 'Uppdaterar...';
    indicator.querySelector('.ptr-spinner').style.transform = '';

    try {
      if (currentPage === 'calendar') {
        // Clear open cards and rebuild
        const list = document.getElementById('races-list');
        list.innerHTML = '';
        let month = '';
        RACES_2026.forEach(race => {
          const m = getMonthSV(race.raceDate);
          if (m !== month) {
            month = m;
            const d = document.createElement('div');
            d.className = 'month-divider'; d.textContent = m;
            list.appendChild(d);
          }
          list.appendChild(buildCard(race));
        });
        // Refresh countdown
        updateClock();

      } else if (currentPage === 'standings') {
        // Clear cache and re-fetch
        standingsCache = {};
        chartData = null;
        chartActive.clear();
        await showStandings(currentStandingsTab);

      } else if (currentPage === 'fantasy') {
        // Re-fetch bin data
        if (fxBinId) {
          fxData = await fxGetBin(fxBinId);
          if (fxData) { await fxScoreAll(); fxRender(); }
        }
      }
    } catch(e) { /* silent fail */ }

    // Small delay so spinner is visible
    await new Promise(r => setTimeout(r, 600));
    indicator.classList.remove('ptr-refreshing');
    refreshing = false;
    showToast('✓ Uppdaterad');
  }

  document.addEventListener('touchstart', e => {
    if (refreshing) return;
    // Only trigger if scrolled to very top
    if (window.scrollY > 4) return;
    startY = e.touches[0].clientY;
    pulling = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (refreshing) return;
    if (window.scrollY > 4) return;
    currentY = e.touches[0].clientY;
    const dist = Math.min(currentY - startY, PTR_MAX_PULL);
    if (dist <= 0) return;
    pulling = true;
    indicator.classList.add('ptr-pulling');
    setPullLabel(dist);
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const dist = Math.min(currentY - startY, PTR_MAX_PULL);
    if (dist >= PTR_THRESHOLD) {
      doRefresh();
    } else {
      indicator.classList.remove('ptr-pulling');
    }
  });
})();


const THEME_KEY = 'f1_theme';

const THEMES = [
  { id:'default',      name:'F1 Standard', color:'#E10600', bg:'#080808' },
  { id:'ferrari',      name:'Ferrari',     color:'#E8002D', bg:'#080808' },
  { id:'red_bull',     name:'Red Bull',    color:'#3671C6', bg:'#060810' },
  { id:'mercedes',     name:'Mercedes',    color:'#00D2BE', bg:'#040c0b' },
  { id:'mclaren',      name:'McLaren',     color:'#FF8000', bg:'#080500' },
  { id:'aston_martin', name:'Aston Martin',color:'#358C75', bg:'#040a08' },
  { id:'alpine',       name:'Alpine',      color:'#FF87BC', bg:'#080508' },
  { id:'williams',     name:'Williams',    color:'#64C4FF', bg:'#040810' },
  { id:'rb',           name:'RB',          color:'#6692FF', bg:'#040610' },
  { id:'haas',         name:'Haas',     color:'#B6BABD', bg:'#080808' },
  { id:'sauber',       name:'Audi',     color:'#999999', bg:'#070707' },
  { id:'cadillac',     name:'Cadillac', color:'#C4B696', bg:'#080706' },
];

let currentTheme = localStorage.getItem(THEME_KEY) || 'default';

function applyTheme(id) {
  const t = THEMES.find(t => t.id === id) || THEMES[0];
  document.documentElement.setAttribute('data-theme', t.id);
  // Also update bg so it feels truly team-flavoured
  document.documentElement.style.setProperty('--bg',  t.bg);
  document.documentElement.style.setProperty('--bg2', adjustBg(t.bg, 7));
  // Update PWA theme-color meta
  let meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = t.color;
  currentTheme = id;
  localStorage.setItem(THEME_KEY, id);
}

function adjustBg(hex, amount) {
  // Lighten a hex colour by `amount` in each channel
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n>>16) + amount);
  const g = Math.min(255, ((n>>8)&0xff) + amount);
  const b = Math.min(255, (n&0xff) + amount);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  if (!grid) return;
  grid.innerHTML = THEMES.map(t => `
    <div class="theme-tile ${t.id === currentTheme ? 'active' : ''}"
         onclick="selectTheme('${t.id}')"
         data-theme-id="${t.id}">
      <div class="theme-swatch" style="background:${t.color}">
        <div class="theme-swatch-inner"></div>
      </div>
      <div class="theme-name">${t.name}</div>
    </div>`).join('');
}

function selectTheme(id) {
  applyTheme(id);
  // Update active tile
  document.querySelectorAll('.theme-tile').forEach(el => {
    el.classList.toggle('active', el.dataset.themeId === id);
  });
  // Close after short delay so user sees the tick
  setTimeout(closeThemePicker, 280);
}

function openThemePicker() {
  buildThemeGrid();
  document.getElementById('theme-overlay').classList.add('open');
  document.getElementById('theme-sheet').classList.add('open');
}

function closeThemePicker() {
  document.getElementById('theme-overlay').classList.remove('open');
  document.getElementById('theme-sheet').classList.remove('open');
}

// Apply saved theme on load
applyTheme(currentTheme);

function init() {
  const list = document.getElementById('races-list');
  let currentMonth = '';
  RACES_2026.forEach(race => {
    const month = getMonthSV(race.raceDate);
    if (month !== currentMonth) {
      currentMonth = month;
      const div = document.createElement('div');
      div.className = 'month-divider';
      div.textContent = month;
      list.appendChild(div);
    }
    list.appendChild(buildCard(race));
  });
  // Restore notifications if they were enabled
  updateNotifyBtn();
  if (localStorage.getItem(NOTIFY_KEY) === 'true' && Notification.permission === 'granted') {
    registerSW().then(() => scheduleNotifications());
  }
}
init();
