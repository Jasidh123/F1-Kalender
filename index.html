<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 2026">
<meta name="theme-color" content="#0a0a0a">
<title>F1 2026</title>

<!-- PWA manifest inline -->
<script>
const manifestData = {
  name: "F1 2026 Kalender",
  short_name: "F1 2026",
  start_url: "/",
  display: "standalone",
  background_color: "#0a0a0a",
  theme_color: "#E10600",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23E10600'/><text y='.9em' font-size='80' x='10'>🏎️</text></svg>", sizes: "any", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestUrl = URL.createObjectURL(blob);
document.addEventListener('DOMContentLoaded', () => {
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = manifestUrl;
  document.head.appendChild(link);
});
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E10600;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #252525;
    --text: #f0f0f0;
    --muted: #777;
    --gold: #f5c518;
    --silver: #c0c0c0;
    --bronze: #cd7f32;

    /* iPhone safe areas */
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left, 0px);
    --safe-right:  env(safe-area-inset-right, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100%;
    /* Push content above bottom nav */
    padding-bottom: calc(60px + var(--safe-bottom));
    overscroll-behavior: none;
  }

  /* ── HEADER ─────────────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--red);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--red);
    line-height: 1;
  }
  .logo span { color: var(--text); }

  .season-badge {
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header-clock {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.4;
  }

  /* ── BOTTOM NAV (iPhone style) ───────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: calc(60px + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    z-index: 200;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: color 0.15s;
    padding: 8px 0;
    -webkit-user-select: none;
  }

  .nav-btn .nav-icon {
    font-size: 22px;
    line-height: 1;
    transition: transform 0.15s;
  }

  .nav-btn.active { color: var(--red); }
  .nav-btn.active .nav-icon { transform: scale(1.1); }

  /* ── CONTAINER ───────────────────────────────────────────────────── */
  .container {
    padding: 20px 12px 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .page-subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
    font-weight: 300;
  }

  /* ── MONTH DIVIDER ───────────────────────────────────────────────── */
  .month-divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .month-divider:first-child { padding-top: 0; }

  /* ── RACE CARD ───────────────────────────────────────────────────── */
  .race-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
    cursor: pointer;
    /* Prevent iOS rubber-band inside card */
    -webkit-overflow-scrolling: touch;
  }

  .race-card.live {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red);
  }
  .race-card.upcoming { border-color: #252e25; }

  .race-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    user-select: none;
    /* minimum touch target */
    min-height: 64px;
  }

  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    color: var(--muted);
    min-width: 28px;
    letter-spacing: 1px;
  }

  .flag { font-size: 26px; flex-shrink: 0; }

  .race-info { flex: 1; min-width: 0; }

  .race-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
  }

  .race-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .race-status {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-live     { background: var(--red);  color: white; }
  .badge-done     { background: #1a331a; color: #5dbd5d; }
  .badge-upcoming { background: #1a2a1a; color: #4a8a4a; }
  .badge-sprint   { background: #2a1a00; color: #d4882a; }

  .chevron {
    color: var(--muted);
    font-size: 13px;
    transition: transform 0.22s;
    margin-left: 4px;
    flex-shrink: 0;
  }
  .race-card.open .chevron { transform: rotate(180deg); }

  /* ── EXPANDED PANEL ──────────────────────────────────────────────── */
  .race-panel {
    display: none;
    border-top: 1px solid var(--border);
    animation: slideDown 0.18s ease;
  }
  .race-card.open .race-panel { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SESSION TABS ────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    padding: 12px 16px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s, border-color 0.12s;
    min-height: 44px; /* iOS min touch */
  }
  .tab-btn:active { opacity: 0.7; }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

  /* ── SESSION SCHEDULE ────────────────────────────────────────────── */
  .session-schedule { padding: 16px 14px; }

  .session-row {
    display: flex;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    min-height: 44px;
  }
  .session-row:last-child { border-bottom: none; }

  .session-name {
    font-weight: 500;
    font-size: 13px;
    flex: 1;
    padding-right: 8px;
  }

  .session-time {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .session-date {
    font-size: 11px;
    color: var(--muted);
    margin-left: 10px;
    text-align: right;
  }

  .session-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 8px;
    font-weight: 700;
    white-space: nowrap;
  }
  .session-past      { background: #1a331a; color: #5dbd5d; }
  .session-live-now  { background: var(--red); color: white; animation: pulse 1.4s infinite; }
  .session-upcoming-s{ background: #222; color: #666; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

  /* ── RESULTS TABLE ───────────────────────────────────────────────── */
  .results-wrapper { padding: 12px 14px 16px; }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .results-table th {
    text-align: left;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 0 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .results-table td {
    padding: 10px 6px;
    border-bottom: 1px solid #1c1c1c;
    vertical-align: middle;
  }
  .results-table tr:last-child td { border-bottom: none; }

  .pos-1 { color: var(--gold);   font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; }
  .pos-2 { color: var(--silver); font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; }
  .pos-3 { color: var(--bronze); font-family:'Bebas Neue',sans-serif; font-size:17px; font-weight:700; }
  .pos-other { color: var(--muted); font-family:'Bebas Neue',sans-serif; font-size:17px; }

  .driver-name { font-weight: 500; font-size: 13px; }
  .driver-abbr { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px; margin-right:5px; opacity:0.45; }

  .team-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; flex-shrink:0; }
  .time-col { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .points-col { text-align:right; font-weight:600; font-size:13px; }

  /* ── LOADING / ERROR ─────────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid #2a2a2a;
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error-msg {
    text-align: center;
    padding: 20px 16px;
    color: #c05050;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── STANDINGS PAGE ──────────────────────────────────────────────── */
  .standings-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .std-tab {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    text-align: center;
  }
  .std-tab.active { background: var(--red); border-color: var(--red); color: white; }


  /* ── STANDINGS CARDS (mobile-first) ─────────────────────────────── */
  .st-source {
    font-size: 11px;
    color: #555;
    text-align: right;
    margin-bottom: 12px;
  }

  .st-list { display: flex; flex-direction: column; gap: 8px; }

  .st-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .st-card--leader {
    border-color: #3a3a1a;
    background: #161610;
  }

  .st-pos {
    width: 28px;
    flex-shrink: 0;
    text-align: center;
  }

  .st-info {
    flex: 1;
    min-width: 0;
  }

  .st-name {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .st-flag { font-size: 16px; flex-shrink: 0; }

  .st-teambar {
    width: 3px;
    height: 18px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .st-driver {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .st-team {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .st-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  .st-bar-track {
    height: 3px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }

  .st-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .st-right {
    flex-shrink: 0;
    text-align: right;
    min-width: 52px;
  }

  .st-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }

  .st-gap {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── LIVE TAB ────────────────────────────────────────────────────── */
  .live-wrap { padding: 12px 12px 16px; }

  .live-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--red);
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .live-lap {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .live-lap strong {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--text);
  }

  /* driver row — 3-col grid optimised for 390px iPhone */
  .live-row {
    display: grid;
    grid-template-columns: 26px minmax(0,1fr) 68px;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid #1c1c1c;
    /* nice big touch area */
    min-height: 52px;
  }
  .live-row:last-child { border-bottom: none; }

  .live-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    text-align: center;
    line-height: 1;
    flex-shrink: 0;
  }

  /* middle column: driver info — must not overflow */
  .live-driver-block {
    min-width: 0;
    overflow: hidden;
  }

  .live-name-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
    overflow: hidden;
  }
  .live-bar {
    width: 3px; height: 16px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  /* Show abbreviation only — full name hidden to save space */
  .live-abbr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .live-name {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .live-meta-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    overflow: hidden;
  }

  /* tyre chip */
  .tyre-chip {
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tyre-SOFT     { background:#c0392b; color:#fff; }
  .tyre-MEDIUM   { background:#d4ac0d; color:#000; }
  .tyre-HARD     { background:#d5d8dc; color:#000; }
  .tyre-INTER    { background:#27ae60; color:#fff; }
  .tyre-WET      { background:#2980b9; color:#fff; }
  .tyre-UNKNOWN  { background:#333;    color:#777; }

  .live-pits {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* right column: gap + laptime — fixed width, right-aligned */
  .live-right {
    text-align: right;
    min-width: 0;
  }
  .live-gap-val {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    white-space: nowrap;
  }
  .live-laptime {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .live-laptime.fastest { color: #c44dff; font-weight: 600; }

  .live-refresh-note {
    text-align: center;
    font-size: 11px;
    color: #3a3a3a;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid #1c1c1c;
  }

  /* ── UTILITIES ───────────────────────────────────────────────────── */
  /* Prevent iOS font size auto-adjust */
  * { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  /* Smooth scrolling */
  html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  /* Bigger touch areas for all buttons */
  button { touch-action: manipulation; }
</style>
</head>
<body>

<header>
  <div class="logo">F1<span> 26</span></div>
  <div class="season-badge">2026</div>
  <div class="header-clock" id="clock">Laddar...</div>
</header>

<!-- CALENDAR PAGE -->
<div class="container" id="page-calendar">
  <div class="page-title">KALENDER</div>
  <div class="page-subtitle">24 Grand Prix · Tryck på ett lopp</div>
  <div id="races-list"></div>
</div>

<!-- STANDINGS PAGE -->
<div class="container" id="page-standings" style="display:none">
  <div class="page-title">STÄLLNINGAR</div>
  <div class="page-subtitle">Uppdateras efter varje race</div>
  <div class="standings-tabs">
    <button class="std-tab active" id="std-drivers" onclick="showStandings('drivers')">🏆 Förare</button>
    <button class="std-tab" id="std-constructors" onclick="showStandings('constructors')">🔧 Konstruktörer</button>
  </div>
  <div id="standings-content">
    <div class="loading"><div class="spinner"></div>Hämtar ställningar...</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-calendar" onclick="showPage('calendar')">
    <span class="nav-icon">🗓️</span>
    Kalender
  </button>
  <button class="nav-btn" id="nav-standings" onclick="showPage('standings')">
    <span class="nav-icon">🏆</span>
    Ställningar
  </button>
</nav>

<script>
// ─── TEAM COLORS ─────────────────────────────────────────────────────────────
const TEAM_COLORS = {
  'Mercedes':'#00D2BE','Red Bull':'#3671C6','Ferrari':'#E8002D',
  'McLaren':'#FF8000','Aston Martin':'#358C75','Alpine':'#FF87BC',
  'Williams':'#64C4FF','Racing Bulls':'#6692FF','Haas':'#B6BABD',
  'Audi':'#999999','Cadillac':'#C4B696',
};

// ─── RACE CALENDAR 2026 ───────────────────────────────────────────────────────
const RACES_2026 = [

function getSessions(race) {
  const fri = new Date(race.dates[0] + 'T00:00:00');
  return (race.sprint ? SESSION_TEMPLATES.sprint : SESSION_TEMPLATES.normal).map(s => {
    const d = new Date(fri);
    d.setDate(d.getDate() + s.day);
    d.setHours(s.h, s.m, 0, 0);
    return { ...s, dt: d };
  });
}

const WEEKDAYS_SV = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
const MONTHS_SV   = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
function fmtDate(dt) { return `${WEEKDAYS_SV[dt.getDay()]} ${dt.getDate()} ${MONTHS_SV[dt.getMonth()]}`; }
function fmtTime(dt) { return dt.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' }); }
function getMonthSV(s) { const d=new Date(s); return MONTHS_SV[d.getMonth()].toUpperCase()+' '+d.getFullYear(); }
function isLiveWeekend(race) {
  const now=new Date(), fri=new Date(race.dates[0]+'T00:00:00'), sun=new Date(race.dates[2]+'T23:59:59');
  return now>=fri && now<=sun;
}
function isPast(race) { return new Date(race.raceDate+'T23:59:59') < new Date(); }
function teamColor(name) {
  if (!name) return '#888';
  for (const [k,v] of Object.entries(TEAM_COLORS)) if (name.includes(k)) return v;
  return '#888';
}
function fmtSecs(s) {
  if (!s && s!==0) return '—';
  const m=Math.floor(s/60), r=(s%60).toFixed(3);
  return m>0 ? `${m}:${r.padStart(6,'0')}` : `${Number(s).toFixed(3)}`;
}

const CACHE = {};

// ── RESULTS: Jolpica first, OpenF1 fallback ───────────────────────────────────
async function fetchJolpica(round, type) {
  const seg = {
    race:'results', quali:'qualifying',
    fp1:'practice/1', fp2:'practice/2', fp3:'practice/3',
    sprint:'sprint', sq:'qualifying'
  }[type] || 'results';

  for (const year of [2026, 2025]) {
    const rn = year === 2026 ? round : Math.min(round, 24);
    try {
      const res = await fetch(`https://api.jolpi.ca/ergast/f1/${year}/${rn}/${seg}/`,
        { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const json = await res.json();
      if (json?.MRData?.RaceTable?.Races?.length > 0)
        return { source:'jolpica', data: json, type };
    } catch(e) {}
  }
  return null;
}

const OF1_NAMES = {
  fp1:'Practice 1', fp2:'Practice 2', fp3:'Practice 3',
  quali:'Qualifying', sprint:'Sprint', sq:'Sprint Qualifying', race:'Race',
};

async function fetchOF1(round, type) {
  const name = OF1_NAMES[type] || 'Race';
  try {
    const sessRes = await fetch(
      `https://api.openf1.org/v1/sessions?year=2026&session_name=${encodeURIComponent(name)}`,
      { signal: AbortSignal.timeout(8000) });
    if (!sessRes.ok) return null;
    const sessions = await sessRes.json();
    if (!Array.isArray(sessions) || !sessions.length) return null;
    sessions.sort((a,b) => a.session_key - b.session_key);
    const sess = sessions[round - 1];
    if (!sess) return null;
    const sk = sess.session_key;

    const [posRes, drvRes] = await Promise.all([
      fetch(`https://api.openf1.org/v1/position?session_key=${sk}`, { signal: AbortSignal.timeout(10000) }),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sk}`, { signal: AbortSignal.timeout(8000) }),
    ]);
    if (!posRes.ok || !drvRes.ok) return null;
    const [positions, drivers] = await Promise.all([posRes.json(), drvRes.json()]);
    if (!positions?.length || !drivers?.length) return null;

    const driverMap = {};
    drivers.forEach(d => { driverMap[d.driver_number] = d; });

    const finalPos = {};
    for (const p of positions) {
      if (!finalPos[p.driver_number] || p.date > finalPos[p.driver_number].date)
        finalPos[p.driver_number] = p;
    }
    const rows = Object.values(finalPos).sort((a,b) => (a.position||99) - (b.position||99));
    if (!rows.length) return null;

    const lapMap = {};
    if (['quali','sq','fp1','fp2','fp3'].includes(type)) {
      try {
        const lapRes = await fetch(`https://api.openf1.org/v1/laps?session_key=${sk}`, { signal: AbortSignal.timeout(10000) });
        if (lapRes.ok) {
          const laps = await lapRes.json();
          for (const l of laps) {
            if (!l.lap_duration) continue;
            if (!lapMap[l.driver_number] || l.lap_duration < lapMap[l.driver_number])
              lapMap[l.driver_number] = l.lap_duration;
          }
        }
      } catch(e) {}
    }
    return { source:'openf1', rows, driverMap, lapMap, type, sk };
  } catch(e) { return null; }
}

async function fetchResults(round, type) {
  const ck = `res_${round}_${type}`;
  if (CACHE[ck]) return CACHE[ck];
  const result = await fetchJolpica(round, type) || await fetchOF1(round, type);
  if (result) CACHE[ck] = result;
  return result;
}

async function fetchStandings(type) {
  const ck = `std_${type}`;
  if (standingsCache[ck]) return standingsCache[ck];

  // Source 1: OpenF1 championship endpoints
  try {
    const sessRes = await fetch('https://api.openf1.org/v1/sessions?year=2026&session_name=Race',
      { signal: AbortSignal.timeout(8000) });
    if (sessRes.ok) {
      const sessions = await sessRes.json();
      if (sessions?.length) {
        sessions.sort((a,b) => b.session_key - a.session_key);
        const sk = sessions[0].session_key;
        const ep = type === 'drivers' ? 'championship_drivers' : 'championship_teams';
        const res = await fetch(`https://api.openf1.org/v1/${ep}?session_key=${sk}`,
          { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const data = await res.json();
          if (data?.length) {
            standingsCache[ck] = { source:'openf1', data, type };
            return standingsCache[ck];
          }
        }
      }
    }
  } catch(e) {}

  // Source 2: Jolpica
  const seg = type === 'drivers' ? 'driverstandings' : 'constructorstandings';
  for (const year of [2026, 2025]) {
    try {
      const res = await fetch(`https://api.jolpi.ca/ergast/f1/${year}/${seg}/`,
        { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const json = await res.json();
      const lists = json?.MRData?.StandingsTable?.StandingsLists;
      if (lists?.length) {
        standingsCache[ck] = { source:'jolpica', data: lists[0], year, type };
        return standingsCache[ck];
      }
    } catch(e) {}
  }
  return null;
}

function posClass(n) { return n===1?'pos-1':n===2?'pos-2':n===3?'pos-3':'pos-other'; }

// OpenF1 results renderer (position-based)
function renderOF1(data) {
  const { rows, driverMap, lapMap, type } = data;
  const isQuali = ['quali','sq'].includes(type);
  const trs = rows.map(r => {
    const p = r.position || '—', pn = parseInt(p);
    const d = driverMap[r.driver_number] || {};
    const col = d.team_colour ? `#${d.team_colour}` : teamColor(d.team_name||'');
    const best = lapMap[r.driver_number];
    const timeCell = `<td class="time-col">${isQuali ? fmtSecs(best) : '—'}</td>`;
    return `<tr>
      <td><span class="${posClass(pn)}">${p}</span></td>
      <td><span class="driver-abbr">${d.name_acronym||''}</span><span class="driver-name">${d.full_name||'#'+r.driver_number}</span></td>
      <td><span class="team-dot" style="background:${col}"></span>${d.team_name||''}</td>
      ${timeCell}</tr>`;
  }).join('');
  const th = isQuali ? '<th>Bästa tid</th>' : '<th>Gap</th>';
  return `<div style="font-size:11px;color:#3a7a3a;padding:4px 0 10px;text-align:right">✓ OpenF1 · live positionsdata</div>
  <table class="results-table">
    <thead><tr><th>Plac</th><th>Förare</th><th>Stall</th>${th}</tr></thead>
    <tbody>${trs}</tbody></table>`;
}

// Shared card-based row — works perfectly on iPhone width
function stCard(pos, name, team, teamCol, flag, pts, leader, gap) {
  const pc = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-other';
  const barW = leader > 0 ? Math.round((pts / leader) * 100) : 0;
  const isLeader = pos === 1;
  return `
  <div class="st-card${isLeader?' st-card--leader':''}">
    <div class="st-pos"><span class="${pc}">${pos}</span></div>
    <div class="st-info">
      <div class="st-name">
        ${flag ? `<span class="st-flag">${flag}</span>` : `<span class="st-teambar" style="background:${teamCol}"></span>`}
        <span class="st-driver">${name}</span>
      </div>
      <div class="st-team">
        <span class="st-dot" style="background:${teamCol}"></span>
        ${team}
      </div>
      <div class="st-bar-track">
        <div class="st-bar-fill" style="width:${barW}%;background:${teamCol}"></div>
      </div>
    </div>
    <div class="st-right">
      <div class="st-pts">${pts}</div>
      <div class="st-gap">${gap}</div>
    </div>
  </div>`;
}

function renderDriverStandingsOF1(data) {
  const sorted = [...data].sort((a,b) => (a.position||99)-(b.position||99));
  if (!sorted.length) return '<div class="error-msg">Ingen data</div>';
  const leader = sorted[0].points || 0;
  const cards = sorted.map((s,i) => {
    const col = s.team_colour ? `#${s.team_colour}` : teamColor(s.team_name||'');
    const gap = i===0 ? 'Ledare' : `–${leader - s.points}`;
    return stCard(s.position||i+1, s.driver_name||'—', s.team_name||'', col, null, s.points||0, leader, gap);
  }).join('');
  return `<div class="st-source">✓ OpenF1 · uppdateras direkt</div><div class="st-list">${cards}</div>`;
}

    return stCard(parseInt(s.position), name, team, col, flag, pts, leader, gap);
  }).join('');
  return `<div class="st-source">Jolpica Ergast · ${year} · omgång ${data.round||'?'}</div><div class="st-list">${cards}</div>`;
}

function renderConstructorStandingsJolpica(data, year) {
  const standings = data.ConstructorStandings;
  if (!standings?.length) return '<div class="error-msg">Inga konstruktörsställningar</div>';
  const leader = parseInt(standings[0].points);
  const cards = standings.map((s,i) => {
    const col = teamColor(s.Constructor?.name||'');
    const pts = parseInt(s.points);
    const gap = i===0 ? 'Ledare' : `–${leader-pts}`;
    return stCard(parseInt(s.position), s.Constructor?.name||'—', '', col, null, pts, leader, gap);
  }).join('');
  return `<div class="st-source">Jolpica Ergast · ${year} · omgång ${data.round||'?'}</div><div class="st-list">${cards}</div>`;
}

// ─── SCHEDULE VIEW ────────────────────────────────────────────────────────────
function renderSchedule(race) {
  const now = new Date();
  const sessions = getSessions(race);
  return `<div class="session-schedule">
    ${sessions.map(s => {
      const past = s.dt < now;
      const liveNow = !past && Math.abs(s.dt - now) < 2*3600*1000;
      const badge = liveNow
        ? '<span class="session-badge session-live-now">LIVE NU</span>'
        : past
          ? '<span class="session-badge session-past">Avslutad</span>'
          : '<span class="session-badge session-upcoming-s">Kommande</span>';
      return `<div class="session-row" style="cursor:${past?'pointer':'default'}"
               onclick="${past?`loadTabFor(${race.round},'${s.key}')` : ''}">
        <div class="session-name">${s.label}</div>
        <div class="session-time">${fmtTime(s.dt)}</div>
        ${badge}
        <div class="session-date">${fmtDate(s.dt)}</div>
      </div>`;
    }).join('')}
    <p style="margin-top:16px;font-size:12px;color:var(--muted)">
      Tider i svensk lokal tid (CET/CEST). Klicka på avslutade sessioner för resultat.
    </p>
  </div>`;
}

function loadTabFor(round, key) {
  const card = document.querySelector(`.race-card[data-round="${round}"]`);
  if (!card) return;
  if (!card.classList.contains('open')) card.querySelector('.race-header').click();
  setTimeout(() => { const tab = card.querySelector(`.tab-btn[data-tab="${key}"]`); if (tab) tab.click(); }, 150);
}

// ─── TAB LOGIC ────────────────────────────────────────────────────────────────
// ─── LIVE DATA ────────────────────────────────────────────────────────────────
let liveTimer = null;
let liveSessionKey = null;

const TYRE_SHORT = { SOFT:'S', MEDIUM:'M', HARD:'H', INTERMEDIATE:'I', WET:'W' };

async function getLiveSessionKey(round) {
  if (liveSessionKey) return liveSessionKey;
  try {
    const res = await fetch(
      `https://api.openf1.org/v1/sessions?year=2026&session_name=Race`,
      { signal: AbortSignal.timeout(6000) });
    if (!res.ok) return null;
    const sessions = await res.json();
    if (!Array.isArray(sessions) || !sessions.length) return null;
    sessions.sort((a,b) => a.session_key - b.session_key);
    const sess = sessions[round - 1];
    liveSessionKey = sess?.session_key || null;
    return liveSessionKey;
  } catch(e) { return null; }
}

async function fetchLiveData(round) {
  const sk = await getLiveSessionKey(round);
  if (!sk) return null;
  try {
    const [posRes, drvRes, tyrRes, pitRes, lapRes] = await Promise.all([
      fetch(`https://api.openf1.org/v1/position?session_key=${sk}`,          { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sk}`,           { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/stints?session_key=${sk}`,            { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/pit?session_key=${sk}`,               { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/laps?session_key=${sk}`,              { signal: AbortSignal.timeout(8000) }),
    ]);

    const [positions, drivers, stints, pits, laps] = await Promise.all([
      posRes.ok ? posRes.json() : [],
      drvRes.ok ? drvRes.json() : [],
      tyrRes.ok ? tyrRes.json() : [],
      pitRes.ok ? pitRes.json() : [],
      lapRes.ok ? lapRes.json() : [],
    ]);

    // Latest position per driver
    const posMap = {};
    for (const p of positions) {
      if (!posMap[p.driver_number] || p.date > posMap[p.driver_number].date)
        posMap[p.driver_number] = p;
    }

    // Driver info
    const drvMap = {};
    for (const d of drivers) drvMap[d.driver_number] = d;

    // Latest stint per driver (current tyre)
    const stintMap = {};
    for (const s of stints) {
      if (!stintMap[s.driver_number] || s.stint_number > stintMap[s.driver_number].stint_number)
        stintMap[s.driver_number] = s;
    }

    // Pit count per driver
    const pitCount = {};
    for (const p of pits) pitCount[p.driver_number] = (pitCount[p.driver_number]||0) + 1;

    // Best and last lap per driver
    const bestLap = {}, lastLap = {};
    for (const l of laps) {
      if (!l.lap_duration) continue;
      const dn = l.driver_number;
      if (!bestLap[dn] || l.lap_duration < bestLap[dn]) bestLap[dn] = l.lap_duration;
      if (!lastLap[dn] || l.lap_number > (lastLap[dn].lap_number||0)) lastLap[dn] = l;
    }

    // Current lap (max lap_number seen)
    const allLapNums = laps.map(l=>l.lap_number).filter(Boolean);
    const currentLap = allLapNums.length ? Math.max(...allLapNums) : '?';

    const rows = Object.values(posMap).sort((a,b) => (a.position||99)-(b.position||99));
    return { rows, drvMap, stintMap, pitCount, bestLap, lastLap, currentLap, sk };
  } catch(e) { return null; }
}

function renderLive(data, race) {
  if (!data) return `<div class="error-msg">⚠ Kunde inte hämta live-data<br>
    <span style="font-size:11px;color:#555;display:block;margin-top:6px">OpenF1 kontaktades – försök igen</span></div>`;

  const { rows, drvMap, stintMap, pitCount, bestLap, lastLap, currentLap } = data;
  if (!rows.length) return `<div class="error-msg">Ingen live-data ännu<br>
    <span style="font-size:11px;color:#555;display:block;margin-top:6px">Uppdateras när racet startar</span></div>`;

  // Find global fastest lap
  const allBest = Object.values(bestLap).filter(Boolean);
  const fastestTime = allBest.length ? Math.min(...allBest) : null;

  // Find leader's lap count for gap calculation
  const leader = rows[0];

  const driverRows = rows.map((r, i) => {
    const dn = r.driver_number;
    const d  = drvMap[dn] || {};
    const col = d.team_colour ? `#${d.team_colour}` : teamColor(d.team_name||'');
    const pos = r.position || i+1;
    const pc  = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-other';

    // Tyre
    const stint = stintMap[dn];
    const tyreCompound = stint?.compound || 'UNKNOWN';
    const tyreAge = stint ? (currentLap !== '?' ? (currentLap - (stint.lap_start||1) + 1) : '?') : '?';
    const tyreClass = `tyre-${tyreCompound.toUpperCase()}`;
    const tyreLabel = TYRE_SHORT[tyreCompound] || tyreCompound[0] || '?';

    // Pits
    const stops = pitCount[dn] || 0;

    // Gap
    let gap = '—';
    if (i === 0) gap = 'Ledare';
    else if (r.date && leader?.date) gap = '+' + ((new Date(r.date) - new Date(leader.date))/1000).toFixed(1) + 's';

    // Last lap time
    const ll = lastLap[dn];
    const llTime = ll?.lap_duration ? fmtSecs(ll.lap_duration) : '—';
    const isFastest = fastestTime && bestLap[dn] === fastestTime;

    return `<div class="live-row">
      <div class="live-pos"><span class="${pc}">${pos}</span></div>
      <div class="live-driver-block">
        <div class="live-name-row">
          <div class="live-bar" style="background:${col}"></div>
          <span class="live-abbr">${d.name_acronym||''}</span>
          <span class="live-name">${d.full_name || '#'+dn}</span>
        </div>
        <div class="live-meta-row">
          <span class="tyre-chip ${tyreClass}">${tyreLabel} +${tyreAge}v</span>
          ${stops > 0 ? `<span class="live-pits">🛞 ${stops} stopp</span>` : '<span class="live-pits">Ej pitat</span>'}
        </div>
      </div>
      <div class="live-right">
        <div class="live-gap-val">${gap}</div>
        <div class="live-laptime${isFastest?' fastest':''}">${llTime}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="live-wrap">
    <div class="live-header">
      <div class="live-indicator"><div class="live-dot"></div>LIVE</div>
      <div class="live-lap">Varv <strong>${currentLap}</strong></div>
    </div>
    ${driverRows}
    <div class="live-refresh-note">Uppdateras var 5:e sekund · OpenF1</div>
  </div>`;
}

async function startLiveTab(card, race) {
  // Stop any existing timer
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }

  const content = card.querySelector('.tab-content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar live-data...</div>`;

  const update = async () => {
    // Only update if tab is still active and card is open
    if (!card.classList.contains('open')) return;
    const activeTab = card.querySelector('.tab-btn.active')?.dataset.tab;
    if (activeTab !== 'live') { clearInterval(liveTimer); liveTimer = null; return; }
    const data = await fetchLiveData(race.round);
    content.innerHTML = renderLive(data, race);
  };

  await update();
  liveTimer = setInterval(update, 5000);
}

async function loadTab(card, race, tabKey) {
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabKey));
  const content = card.querySelector('.tab-content');
  const now = new Date();

  if (tabKey === 'schedule') { content.innerHTML = renderSchedule(race); return; }
  if (tabKey === 'live') { await startLiveTab(card, race); return; }

  const sessions = getSessions(race);
  const sess = sessions.find(s => s.key === tabKey);
  const pastSession = sess ? sess.dt < now : new Date(race.raceDate+'T23:59:59') < now;

  if (!pastSession) {
    content.innerHTML = `<div class="session-schedule">
      <div class="session-row">
        <div class="session-name" style="font-size:15px">${sess?.label || tabKey}</div>
        <div class="session-time">${sess ? fmtTime(sess.dt) : '—'}</div>
        <span class="session-badge session-upcoming-s">Kommande</span>
        <div class="session-date">${sess ? fmtDate(sess.dt) : ''}</div>
      </div>
      <p style="margin-top:16px;font-size:12px;color:var(--muted)">Resultat visas efter att sessionen är klar.</p>
    </div>`;
    return;
  }

  content.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar resultat...</div>`;
  const data = await fetchResults(race.round, tabKey);

  if (!data) {
    content.innerHTML = `<div class="error-msg">⚠ Inga resultat hittades ännu.
      <br><span style="font-size:11px;color:#555;display:block;margin-top:6px">
        Jolpica &amp; OpenF1 kontaktades — försök igen om en stund
      </span></div>`;
    return;
  }
  content.innerHTML = `<div class="results-wrapper">${renderResults(data)}</div>`;
}

// ─── BUILD RACE CARD ──────────────────────────────────────────────────────────
function buildCard(race) {
  const now = new Date();
  const past = isPast(race), live = isLiveWeekend(race);

  const statusBadge = live
    ? '<span class="badge badge-live">🔴 LIVE</span>'
    : past
      ? '<span class="badge badge-done">✓ Avslutat</span>'
      : '<span class="badge badge-upcoming">Kommande</span>';
  const sprintBadge = race.sprint ? '<span class="badge badge-sprint" style="margin-top:2px">Sprint</span>' : '';

  const fri = new Date(race.dates[0]+'T00:00:00');
  const sun = new Date(race.dates[2]+'T00:00:00');
  const dateRange = `${fri.getDate()} – ${sun.getDate()} ${MONTHS_SV[sun.getMonth()].toUpperCase()} ${sun.getFullYear()}`;

  const sessions = getSessions(race);
  const tabsToShow = [{ key:'schedule', label:'Tider' }];

  // Add LIVE tab first if it's race weekend and currently live
  if (live) tabsToShow.push({ key:'live', label:'🔴 LIVE' });

  if (past || live) {
    if (race.sprint) {
      [['fp1','FP1'],['sq','Sprint Kval'],['sprint','Sprint'],['quali','Kval'],['race','Race']].forEach(([k,l]) => {
        if (sessions.find(s=>s.key===k)?.dt < now) tabsToShow.push({key:k,label:l});
      });
    } else {
      [['fp1','FP1'],['fp2','FP2'],['fp3','FP3'],['quali','Kval'],['race','Race']].forEach(([k,l]) => {
        if (sessions.find(s=>s.key===k)?.dt < now) tabsToShow.push({key:k,label:l});
      });
    }
  }

  const defaultTab = live ? 'live' : tabsToShow[tabsToShow.length - 1].key;
  const card = document.createElement('div');
  card.className = `race-card${live?' live':''}${!past&&!live?' upcoming':''}`;
  card.dataset.round = race.round;

  card.innerHTML = `
    <div class="race-header">
      <div class="round-num">R${String(race.round).padStart(2,'0')}</div>
      <div class="flag">${race.flag}</div>
      <div class="race-info">
        <div class="race-name">${race.name}</div>
        <div class="race-meta">${race.circuit} · ${dateRange}</div>
      </div>
      <div class="race-status">${statusBadge}${sprintBadge}</div>
      <div class="chevron">▼</div>
    </div>
    <div class="race-panel">
      <div class="tabs">
        ${tabsToShow.map(t=>`<button class="tab-btn${t.key===defaultTab?' active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div class="tab-content"></div>
    </div>`;

  card.querySelector('.race-header').addEventListener('click', () => {
    const wasOpen = card.classList.contains('open');
    card.classList.toggle('open', !wasOpen);
    if (!wasOpen) loadTab(card, race, card.querySelector('.tab-btn.active')?.dataset.tab || defaultTab);
    else if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  });
  card.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); loadTab(card, race, btn.dataset.tab); });
  });
  if (live) setTimeout(() => { card.classList.add('open'); loadTab(card, race, defaultTab); }, 300);
  return card;
}

// ─── PAGE NAVIGATION ─────────────────────────────────────────────────────────
function showPage(page) {
  document.getElementById('page-calendar').style.display  = page === 'calendar'  ? '' : 'none';
  document.getElementById('page-standings').style.display = page === 'standings' ? '' : 'none';
  document.getElementById('nav-calendar').classList.toggle('active',  page === 'calendar');
  document.getElementById('nav-standings').classList.toggle('active', page === 'standings');
  if (page === 'standings') showStandings(currentStandingsTab);
}

async function showStandings(type) {
  currentStandingsTab = type;
  document.getElementById('std-drivers').classList.toggle('active', type === 'drivers');
  document.getElementById('std-constructors').classList.toggle('active', type === 'constructors');
  const content = document.getElementById('standings-content');
  const ck = `std_${type}`;
  if (!standingsCache[ck]) {
    content.innerHTML = '<div class="loading"><div class="spinner"></div>Hämtar ställningar...</div>';
  }
  const result = await fetchStandings(type);
  if (!result) {
    content.innerHTML = '<div class="error-msg">⚠ Kunde inte hämta ställningar<br><span style="font-size:11px;color:#555;display:block;margin-top:6px">Kontrollera nätverksanslutning – API:erna Jolpica & OpenF1 kontaktades</span></div>';
    return;
  }
  let html = '';
  if (result.source === 'openf1') {
    html = type === 'drivers' ? renderDriverStandingsOF1(result.data) : renderConstructorStandingsOF1(result.data);
  } else {
    html = type === 'drivers'
      ? renderDriverStandingsJolpica(result.data, result.year)
      : renderConstructorStandingsJolpica(result.data, result.year);
  }
  content.innerHTML = `<div class="results-wrapper" style="padding:0">${html}</div>`;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  const list = document.getElementById('races-list');
  let currentMonth = '';
  RACES_2026.forEach(race => {
    const month = getMonthSV(race.raceDate);
    if (month !== currentMonth) {
      currentMonth = month;
      const div = document.createElement('div');
      div.className = 'month-divider';
      div.textContent = month;
      list.appendChild(div);
    }
    list.appendChild(buildCard(race));
  });
}
init();
</script>
