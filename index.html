<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080808"/>
<title>F1 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"/>
<script>
// Prevent FOUC — apply saved theme immediately
(function(){
  const t = localStorage.getItem('f1_theme');
  if (t) try { const d = JSON.parse(t); Object.entries(d).forEach(([k,v])=>document.documentElement.style.setProperty(k,v)); } catch(e){}
})();
</script>
<style>
:root {
  --accent: #E10600;
  --accent2: #ff2a25;
  --accent-glow: rgba(225,6,0,0.25);
  --bg: #080808;
  --surface: #141414;
  --surface2: #1a1a1a;
  --border: #242424;
  --text: #f2f2f2;
  --muted: #666;
  --gold: #f5c518;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --green: #22c55e;
  --purple: #c44dff;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
*, input, button, select, textarea { -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100%;
  padding-bottom: calc(70px + var(--safe-bottom));
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
button { touch-action: manipulation; font-family: inherit; cursor: pointer; }

/* ── HEADER ───────────────────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; gap: 10px;
  padding: calc(10px + var(--safe-top)) 14px 10px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--text); flex-shrink: 0; }
.logo-f1 { color: var(--accent); }
.header-sep { flex: 1; }
.header-clock { font-size: 11px; color: var(--muted); white-space: nowrap; }
.notify-header-btn, .theme-btn {
  background: none; border: none; font-size: 20px; padding: 4px;
  line-height: 1; color: var(--text); transition: transform 0.15s;
}
.notify-header-btn:active { transform: scale(0.88); }
.theme-btn:active { transform: scale(0.88) rotate(20deg); }
.notify-header-btn.notify-active { filter: drop-shadow(0 0 6px gold); }

/* ── COUNTDOWN ────────────────────────────────────────────────────────────── */
.countdown-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 14px; font-size: 12px; color: var(--muted); min-height: 34px;
}
.countdown-bar strong { color: var(--text); }
.cd-label { color: var(--accent); font-weight: 700; margin-right: 6px; }
.cd-weather-row { margin-top: 4px; font-size: 11px; }

/* ── CONTAINER ────────────────────────────────────────────────────────────── */
.container { padding: 16px 12px calc(80px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }
.page-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
.page-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

/* ── MONTH DIVIDER ────────────────────────────────────────────────────────── */
.month-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0 10px;
}
.month-label {
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px;
  color: var(--accent); flex-shrink: 0;
}
.month-line { flex: 1; height: 1px; background: linear-gradient(to right, color-mix(in srgb, var(--accent) 40%, transparent), transparent); }

/* ── RACE CARD ────────────────────────────────────────────────────────────── */
.race-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-md); margin-bottom: 8px; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.race-card.past { opacity: 0.6; }
.race-card.next { border-left: 3px solid var(--accent); background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 6%, var(--surface)), var(--surface)); box-shadow: 0 0 20px var(--accent-glow); }
.race-card.upcoming { border-left: 2px solid color-mix(in srgb, var(--accent) 40%, transparent); }
.race-card.live { box-shadow: 0 0 24px color-mix(in srgb, var(--accent) 50%, transparent); border-color: var(--accent); }
.race-card.open { border-color: color-mix(in srgb, var(--accent) 60%, var(--border)); }
.race-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer; user-select: none;
}
.race-flag { font-size: 22px; flex-shrink: 0; }
.race-info { flex: 1; min-width: 0; }
.race-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.race-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.race-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
.badge-next { background: var(--accent); color: #fff; }
.badge-live { background: var(--accent); color: #fff; animation: pulse 1.2s infinite; }
.badge-past { background: var(--surface2); color: var(--muted); }
.badge-sprint { background: color-mix(in srgb, var(--purple) 20%, var(--surface2)); color: var(--purple); border: 1px solid color-mix(in srgb, var(--purple) 40%, transparent); }
.race-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
.race-card.open .race-chevron { transform: rotate(180deg); }

/* ── RACE BODY ────────────────────────────────────────────────────────────── */
.race-body { display: none; border-top: 1px solid var(--border); }
.race-card.open .race-body { display: block; }
.race-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
.race-tabs::-webkit-scrollbar { display: none; }
.race-tab { flex-shrink: 0; padding: 9px 14px; font-size: 12px; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.race-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.race-tab-panel { padding: 14px; display: none; }
.race-tab-panel.active { display: block; }

/* ── SESSION SCHEDULE ─────────────────────────────────────────────────────── */
.session-list { display: flex; flex-direction: column; gap: 6px; }
.session-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface2); border-radius: var(--r-sm); }
.session-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.session-label { flex: 1; font-size: 13px; color: var(--text); }
.session-time { font-size: 12px; color: var(--muted); white-space: nowrap; }
.session-live { color: var(--accent); font-weight: 700; animation: pulse 1.2s infinite; }

/* ── TRACK MAP ────────────────────────────────────────────────────────────── */
.track-map-wrap { margin-top: 12px; text-align: center; }
.track-map-img { max-width: 200px; max-height: 160px; object-fit: contain; display: block; margin: 0 auto; }

/* ── RESULTS TABLE ────────────────────────────────────────────────────────── */
.results-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.results-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 6px 4px; text-align: left; border-bottom: 1px solid var(--border); }
.results-table td { padding: 7px 4px; border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent); }
.results-table tr:last-child td { border-bottom: none; }
.pos-1 { color: var(--gold); font-weight: 700; }
.pos-2 { color: var(--silver); font-weight: 700; }
.pos-3 { color: var(--bronze); font-weight: 700; }
.driver-abbr { font-weight: 700; margin-right: 4px; }
.driver-name { color: var(--muted); }
.team-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
.st-source { font-size: 10px; color: var(--green); padding: 4px 0 8px; }
.st-list { display: flex; flex-direction: column; gap: 6px; }
.st-card { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: var(--r-sm); padding: 10px 12px; }
.st-pos { font-family: 'Bebas Neue', sans-serif; font-size: 24px; width: 28px; text-align: center; flex-shrink: 0; }
.st-info { flex: 1; min-width: 0; }
.st-name { font-size: 14px; font-weight: 600; color: var(--text); }
.st-team { font-size: 11px; color: var(--muted); margin-top: 1px; }
.st-pts { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); flex-shrink: 0; }
.st-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; }
.st-bar-fill { height: 100%; border-radius: 2px; }

/* ── WEATHER ──────────────────────────────────────────────────────────────── */
.weather-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 6px; margin-bottom: 10px; }
.weather-card { background: var(--surface2); border-radius: var(--r-sm); padding: 8px; text-align: center; }
.weather-session { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
.weather-icon { font-size: 22px; line-height: 1; margin: 4px 0; }
.weather-temp { font-size: 13px; font-weight: 700; color: var(--text); }
.weather-rain { font-size: 10px; color: #60a5fa; margin-top: 2px; }
.weather-summary { font-size: 11px; color: var(--muted); margin-top: 8px; padding: 8px; background: var(--surface2); border-radius: var(--r-sm); }
.weather-risk { background: color-mix(in srgb, #f59e0b 15%, var(--surface2)); border: 1px solid color-mix(in srgb, #f59e0b 40%, transparent); }

/* ── HISTORY ──────────────────────────────────────────────────────────────── */
.hist-section { margin-bottom: 14px; }
.hist-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.hist-podium { display: flex; gap: 8px; }
.hist-podium-card { flex: 1; background: var(--surface2); border-radius: var(--r-sm); padding: 10px 8px; text-align: center; }
.hist-pos { font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
.hist-driver { font-size: 12px; font-weight: 600; color: var(--text); margin: 4px 0 2px; }
.hist-podium-team { font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent); font-size: 12px; }
.hist-stat-row:last-child { border-bottom: none; }
.hist-stat-label { color: var(--muted); }
.hist-stat-val { font-weight: 600; color: var(--text); }

/* ── LIVE ─────────────────────────────────────────────────────────────────── */
.live-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; font-weight: 700; color: var(--accent); }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; }
.live-grid { display: flex; flex-direction: column; gap: 4px; }
.live-driver-block { background: var(--surface2); border-radius: var(--r-sm); padding: 8px 10px; }
.live-name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; overflow: hidden; }
.live-pos-badge { font-family: 'Bebas Neue', sans-serif; font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
.live-name { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.live-gap { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
.live-detail-row { display: flex; gap: 6px; flex-wrap: wrap; }
.live-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
.live-chip.tyre-s { border-color: #E8002D; color: #E8002D; background: rgba(232,0,45,0.1); }
.live-chip.tyre-m { border-color: #FFF200; color: #e6d800; background: rgba(255,242,0,0.08); }
.live-chip.tyre-h { border-color: #ddd; color: #ddd; background: rgba(255,255,255,0.05); }
.live-chip.tyre-i { border-color: #39B54A; color: #39B54A; background: rgba(57,181,74,0.1); }
.live-chip.tyre-w { border-color: #0067FF; color: #0067FF; background: rgba(0,103,255,0.1); }

/* ── STANDINGS PAGE ───────────────────────────────────────────────────────── */
.standings-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.standings-tab { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 4px; cursor: pointer; transition: all 0.15s; }
.standings-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 14px; }
.chart-driver-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chart-driver-btn { font-size: 11px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.chart-driver-btn.active { font-weight: 700; }

/* ── BOTTOM NAV ───────────────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(62px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; z-index: 300;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: none; border: none;
  color: var(--muted); font-size: 10px; font-weight: 500;
  letter-spacing: 0.2px; padding: 8px 0; transition: color 0.15s;
}
.nav-icon { font-size: 20px; line-height: 1; transition: transform 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active .nav-icon { transform: scale(1.1); }

/* ── MER PAGE TABS ────────────────────────────────────────────────────────── */
.more-page-tabs {
  display: flex; gap: 6px; margin-bottom: 16px;
}
.more-page-tab {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  padding: 10px 4px; cursor: pointer; transition: all 0.15s;
}
.more-page-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── FANTASY PAGE ─────────────────────────────────────────────────────────── */
.fx-page-tabs {
  display: flex; gap: 6px;
  position: sticky; top: 52px; z-index: 50;
  background: var(--bg); padding: 8px 0 6px; margin: 4px 0;
}
.fx-page-tab {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  padding: 9px 4px; cursor: pointer; transition: all 0.15s;
}
.fx-page-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.fx-setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 24px 20px; margin-top: 20px; text-align: center; }
.fx-setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 6px; }
.fx-setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.fx-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; }
.fx-input:focus { border-color: var(--accent); }
.fx-btn-primary { background: var(--accent); border: none; border-radius: var(--r-sm); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 12px 20px; width: 100%; margin-top: 10px; transition: opacity 0.15s; }
.fx-btn-primary:active { opacity: 0.8; }
.fx-btn-secondary { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 16px; transition: border-color 0.15s; }
.fx-btn-secondary:active { border-color: var(--accent); }
.fx-profile-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border)); border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 10px; }
.fx-profile-left { display: flex; align-items: center; gap: 12px; }
.fx-profile-avatar { font-size: 28px; line-height: 1; flex-shrink: 0; }
.fx-profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--text); line-height: 1.1; }
.fx-profile-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.fx-profile-edit-btn { background: none; border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--muted); font-size: 12px; font-weight: 500; padding: 6px 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
.fx-profile-edit-btn:active { border-color: var(--accent); color: var(--accent); }
.fx-profile-edit { background: var(--surface); border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border)); border-radius: var(--r-md); padding: 14px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
.fx-share-bar { display: flex; align-items: center; justify-content: space-between; background: color-mix(in srgb, var(--accent) 10%, var(--surface2)); border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border)); border-radius: var(--r-sm); padding: 10px 14px; margin-bottom: 12px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--accent); }
.fx-share-icon { font-size: 18px; }
.fx-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 28px 16px; }
.fx-pick-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; margin-bottom: 14px; }
.fx-pick-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.fx-pick-race { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
.fx-pick-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.fx-pick-status { font-size: 11px; font-weight: 600; margin-top: 6px; padding: 4px 8px; border-radius: 20px; display: inline-block; }
.fx-pick-status.open { background: color-mix(in srgb, var(--green) 15%, var(--surface2)); color: var(--green); }
.fx-pick-status.closed { background: color-mix(in srgb, var(--muted) 15%, var(--surface2)); color: var(--muted); }
.fx-pick-status.scored { background: color-mix(in srgb, var(--gold) 15%, var(--surface2)); color: var(--gold); }
.fx-driver-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.fx-driver-slot { display: flex; align-items: center; gap: 8px; }
.fx-slot-pos { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted); }
.fx-slot-pos.p1 { background: var(--gold); color: #000; }
.fx-slot-pos.p2 { background: var(--silver); color: #000; }
.fx-slot-pos.p3 { background: var(--bronze); color: #000; }
.fx-driver-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 8px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; appearance: none; -webkit-appearance: none; }
.fx-result-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.fx-result-badge.exact { background: color-mix(in srgb, var(--green) 20%, var(--surface2)); color: var(--green); }
.fx-result-badge.close { background: color-mix(in srgb, var(--gold) 20%, var(--surface2)); color: var(--gold); }
.fx-result-badge.miss  { background: var(--surface2); color: var(--muted); }
.fx-slot-pts { font-size: 11px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }
.fx-slot-pts.exact { color: var(--green); }
.fx-slot-pts.close { color: var(--gold); }
.fx-slot-pts.miss  { color: var(--muted); }
.fx-submit-row { padding: 10px 14px 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.fx-my-pts { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); }
.fx-my-pts span { color: var(--accent); }
.fx-ladder-list { display: flex; flex-direction: column; gap: 6px; }
.fx-ladder-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: var(--r-sm); padding: 10px 12px; }

const WEEKDAYS_SV = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
const MONTHS_SV   = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
function fmtDate(dt) { return `${WEEKDAYS_SV[dt.getDay()]} ${dt.getDate()} ${MONTHS_SV[dt.getMonth()]}`; }
function fmtTime(dt) { return dt.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}); }
function getMonthSV(s) { const d=new Date(s); return MONTHS_SV[d.getMonth()].toUpperCase()+' '+d.getFullYear(); }
function isPast(race) { return new Date(race.raceDate+'T23:59:59') < new Date(); }
function isLiveWeekend(race) { const now=new Date(),fri=new Date(race.dates[0]+'T00:00:00'),sun=new Date(race.dates[2]+'T23:59:59'); return now>=fri&&now<=sun; }
function teamColor(name) { if(!name) return '#888'; for(const [k,v] of Object.entries(TEAM_COLORS)) if(name.includes(k)) return v; return '#888'; }
function fmtSecs(s) { if(!s&&s!==0) return '—'; const m=Math.floor(s/60),r=(s%60).toFixed(3); return m>0?`${m}:${r.padStart(6,'0')}`:Number(s).toFixed(3); }

// ── CLOCK + COUNTDOWN ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleString('sv-SE',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  updateCountdown(now);
}
function updateCountdown(now) {
  // Find next session
  let closest = null, closestDiff = Infinity;
  for (const race of RACES_2026) {
    if (isPast(race)) continue;
    for (const s of getSessions(race)) {
      const diff = s.dt - now;
      if (diff > 0 && diff < closestDiff) { closestDiff = diff; closest = {race, s}; }
    }
  }
  const bar = document.getElementById('countdown-bar');
  if (!closest) { bar.textContent = 'Säsongen är slut'; return; }
  const { race, s } = closest;
  const totalSecs = Math.floor(closestDiff / 1000);
  const d = Math.floor(totalSecs/86400), h = Math.floor((totalSecs%86400)/3600), m = Math.floor((totalSecs%3600)/60), sc = totalSecs%60;
  const parts = d>0?`${d}d ${h}h ${m}m`:`${h}h ${m}m ${sc}s`;
  bar.innerHTML = `<span class="cd-label">${s.label.split('–')[0].trim()}</span><strong>${race.flag} ${race.name}</strong> <span style="color:var(--muted)">om</span> <strong>${parts}</strong>`;
}

// ── RACE CARD BUILDER ─────────────────────────────────────────────────────
const openCards = new Set();
const resultsCache = {};
const weatherCache = {};
const historyCache = {};

function buildCalendar() {
  const list = document.getElementById('race-list');
  const now = new Date();
  let lastMonth = '';
  let html = '';
  const nextRace = RACES_2026.find(r => !isPast(r));

  RACES_2026.forEach(race => {
    const month = getMonthSV(race.raceDate);
    if (month !== lastMonth) {
      html += `<div class="month-divider"><span class="month-label">${month}</span><div class="month-line"></div></div>`;
      lastMonth = month;
    }
    const past = isPast(race);
    const live = isLiveWeekend(race);
    const isNext = nextRace && race.round === nextRace.round;
    let cardClass = 'race-card';
    if (past) cardClass += ' past';
    else if (live) cardClass += ' live';
    else if (isNext) cardClass += ' next';
    else cardClass += ' upcoming';
    if (openCards.has(race.round)) cardClass += ' open';

    let badge = '';
    if (live) badge = '<span class="race-badge badge-live">● LIVE</span>';
    else if (isNext) badge = '<span class="race-badge badge-next">NÄSTA</span>';
    else if (past) badge = '<span class="race-badge badge-past">✓</span>';
    if (race.sprint) badge += '<span class="race-badge badge-sprint" style="margin-left:4px">SPRINT</span>';

    html += `
<div class="${cardClass}" id="rc-${race.round}">
  <div class="race-header" onclick="toggleCard(${race.round})">
    <div class="race-flag">${race.flag}</div>
    <div class="race-info">
      <div class="race-name">${race.name}</div>
      <div class="race-meta">${race.circuit} · ${race.raceDate}</div>
    </div>
    ${badge}
    <div class="race-chevron">▼</div>
  </div>
  <div class="race-body" id="rb-${race.round}"></div>
</div>`;
  });
  list.innerHTML = html;
}

function toggleCard(round) {
  const card = document.getElementById('rc-'+round);
  const body = document.getElementById('rb-'+round);
  const isOpen = openCards.has(round);
  if (isOpen) { openCards.delete(round); card.classList.remove('open'); return; }
  openCards.add(round);
  card.classList.add('open');
  if (!body.innerHTML) renderCardBody(round);
}

function renderCardBody(round) {
  const race = RACES_2026.find(r => r.round === round);
  const body = document.getElementById('rb-'+round);
  const past = isPast(race);
  const sessions = getSessions(race);
  const sessionTypes = race.sprint
    ? [['fp1','FP1'],['sq','Sprint Kval'],['sprint','Sprint'],['quali','Kval'],['race','Race']]
    : [['fp1','FP1'],['fp2','FP2'],['fp3','FP3'],['quali','Kval'],['race','Race']];

  // Build tabs
  let tabsHtml = '<button class="race-tab active" data-tab="times" onclick="switchTab('+round+',\'times\',this)">🕐 Tider</button>';
  const now = new Date();
  const weekStart = new Date(race.dates[0]+'T00:00:00');
  const weekEnd   = new Date(race.dates[2]+'T23:59:59');
  const inWeatherWindow = (weekStart - now) < 16*24*3600*1000 && now < weekEnd;
  if (inWeatherWindow) tabsHtml += '<button class="race-tab" data-tab="weather" onclick="switchTab('+round+',\'weather\',this)">🌤️ Väder</button>';
  tabsHtml += '<button class="race-tab" data-tab="history" onclick="switchTab('+round+',\'history\',this)">📅 Förra året</button>';
  if (past) {
    sessionTypes.forEach(([key,label]) => {
      tabsHtml += `<button class="race-tab" data-tab="${key}" onclick="switchTab(${round},'${key}',this)">${label}</button>`;
    });
  }
  if (isLiveWeekend(race)) tabsHtml += '<button class="race-tab" data-tab="live" onclick="switchTab('+round+',\'live\',this)">🔴 LIVE</button>';

  // Track map
  const imgFile = TRACK_IMAGES[race.circuitId];
  const mapHtml = imgFile ? `<div class="track-map-wrap"><img class="track-map-img" loading="lazy" src="https://commons.wikimedia.org/wiki/Special:FilePath/${imgFile}?width=400" onerror="this.parentElement.style.display='none'" alt="${race.circuit}"/></div>` : '';

  // Sessions schedule
  let schedHtml = '<div class="session-list">';
  sessions.forEach(s => {
    const isLive = Math.abs(s.dt - now) < 2*3600*1000 && !isPast(race);
    const dotColor = s.dt < now ? '#333' : 'var(--accent)';
    schedHtml += `<div class="session-row"><div class="session-dot" style="background:${dotColor}"></div><div class="session-label">${s.label}</div><div class="session-time${isLive?' session-live':''}">${isLive?'● LIVE':fmtDate(s.dt)+' '+fmtTime(s.dt)}</div></div>`;
  });
  schedHtml += '</div>';

  body.innerHTML = `
<div class="race-tabs">${tabsHtml}</div>
<div class="race-tab-panel active" id="tp-${round}-times">${schedHtml}${mapHtml}</div>
<div class="race-tab-panel" id="tp-${round}-weather"><div class="loading"><div class="spinner"></div>Hämtar väder...</div></div>
<div class="race-tab-panel" id="tp-${round}-history"><div class="loading"><div class="spinner"></div>Hämtar historik...</div></div>
${past ? sessionTypes.map(([k])=>`<div class="race-tab-panel" id="tp-${round}-${k}"><div class="loading"><div class="spinner"></div>Hämtar resultat...</div></div>`).join('') : ''}
${isLiveWeekend(race) ? `<div class="race-tab-panel" id="tp-${round}-live"><div class="loading"><div class="spinner"></div>Hämtar live...</div></div>` : ''}`;
}

function switchTab(round, tab, btn) {
  const body = document.getElementById('rb-'+round);
  body.querySelectorAll('.race-tab').forEach(b => b.classList.remove('active'));
  body.querySelectorAll('.race-tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(`tp-${round}-${tab}`);
  if (panel) panel.classList.add('active');
  // Lazy load content
  if (tab === 'weather') loadWeather(round);
  else if (tab === 'history') loadHistory(round);
  else if (tab === 'live') loadLive(round);
  else if (['fp1','fp2','fp3','quali','race','sprint','sq'].includes(tab)) loadResults(round, tab);
}

// ── RESULTS ───────────────────────────────────────────────────────────────
const SESSION_TYPE_MAP = { race:'results', quali:'qualifying', fp1:'practice/1', fp2:'practice/2', fp3:'practice/3', sprint:'sprint', sq:'qualifying' };
const SESSION_LABELS   = { race:'Race', quali:'Qualifying', fp1:'FP1', fp2:'FP2', fp3:'FP3', sprint:'Sprint', sq:'Sprint Qualifying' };

async function loadResults(round, type) {
  const ck = `${round}-${type}`;
  const panel = document.getElementById(`tp-${round}-${type}`);
  if (!panel) return;
  if (resultsCache[ck]) { panel.innerHTML = resultsCache[ck]; return; }

  try {
    const ep = SESSION_TYPE_MAP[type];
    const url = `https://api.jolpi.ca/ergast/f1/2026/${round}/${ep}/`;
    const r = await fetch(url, {signal:AbortSignal.timeout(10000)});
    const j = await r.json();
    const races = j?.MRData?.RaceTable?.Races;
    if (!races?.length) throw new Error('no data');
    const race = races[0];
    let html = '';
    if (type==='quali'||type==='sq') html = renderJolpicaQuali(race);
    else html = renderJolpicaRace(race, type);
    html += `<div class="st-source">✓ Jolpica · ${SESSION_LABELS[type]}</div>`;
    resultsCache[ck] = html;
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = '<div class="error-msg">Inga resultat tillgängliga</div>';
  }
}

function renderJolpicaRace(race, type) {
  const results = type==='sprint' ? race.SprintResults : race.Results;
  if (!results?.length) return '<div class="error-msg">Inga resultat</div>';
  let html = '<table class="results-table"><thead><tr><th>Pos</th><th>Förare</th><th>Team</th><th>Tid / Status</th></tr></thead><tbody>';
  results.slice(0,20).forEach(r => {
    const pos = parseInt(r.position);
    const posClass = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'';
    const name = `${r.Driver?.givenName?.charAt(0)}. ${r.Driver?.familyName||''}`;
    const team = r.Constructor?.name||'';
    const col = teamColor(team);
    const time = r.Time?.time || r.status || '—';
    const fastestMark = r.FastestLap?.rank==='1' ? ' <span style="color:var(--purple)">⚡</span>' : '';
    html += `<tr><td class="${posClass}">${pos}</td><td><span class="driver-abbr" style="color:${col}">${r.Driver?.code||''}</span><span class="driver-name">${name}</span>${fastestMark}</td><td><span class="team-dot" style="background:${col}"></span><span style="font-size:10px;color:var(--muted)">${team}</span></td><td style="color:var(--muted)">${time}</td></tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function renderJolpicaQuali(race) {
  const results = race.QualifyingResults;
  if (!results?.length) return '<div class="error-msg">Inga kval-resultat</div>';
  let html = '<table class="results-table"><thead><tr><th>Pos</th><th>Förare</th><th>Q1</th><th>Q2</th><th>Q3</th></tr></thead><tbody>';
  results.forEach(r => {
    const pos = parseInt(r.position);
    const posClass = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'';
    const col = teamColor(r.Constructor?.name||'');
    const name = `${r.Driver?.givenName?.charAt(0)}. ${r.Driver?.familyName||''}`;
    html += `<tr><td class="${posClass}">${pos}</td><td><span class="driver-abbr" style="color:${col}">${r.Driver?.code||''}</span><span class="driver-name">${name}</span></td><td style="color:var(--muted);font-size:11px">${r.Q1||'—'}</td><td style="color:var(--muted);font-size:11px">${r.Q2||'—'}</td><td style="color:var(--text);font-size:11px">${r.Q3||'—'}</td></tr>`;
  });
  html += '</tbody></table>';
  return html;
}

// ── WEATHER ───────────────────────────────────────────────────────────────
const WEATHER_CODES = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌧️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
async function loadWeather(round) {
  const race = RACES_2026.find(r => r.round===round);
  const panel = document.getElementById(`tp-${round}-weather`);
  if (!panel || weatherCache[round]) { if(weatherCache[round]) panel.innerHTML=weatherCache[round]; return; }
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${race.lat}&longitude=${race.lon}&hourly=temperature_2m,precipitation_probability,weathercode&timezone=auto&forecast_days=16`;
    const r = await fetch(url,{signal:AbortSignal.timeout(8000)});
    const data = await r.json();
    const sessions = getSessions(race);
    let html = '<div class="weather-grid">';
    sessions.forEach(s => {
      const dateStr = s.dt.toISOString().slice(0,13)+':00';
      const idx = data.hourly.time.indexOf(dateStr);
      if (idx<0) return;
      const icon = WEATHER_CODES[data.hourly.weathercode[idx]]||'🌡️';
      const temp = Math.round(data.hourly.temperature_2m[idx]);
      const rain = data.hourly.precipitation_probability[idx];
      html += `<div class="weather-card"><div class="weather-session">${s.label.split('–')[0].trim()}</div><div class="weather-icon">${icon}</div><div class="weather-temp">${temp}°C</div><div class="weather-rain">💧${rain}%</div></div>`;
    });
    html += '</div>';
    weatherCache[round] = html;
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = '<div class="error-msg">Väderdata ej tillgänglig</div>';
  }
}

// ── HISTORY ───────────────────────────────────────────────────────────────
async function loadHistory(round) {
  const race = RACES_2026.find(r => r.round===round);
  const panel = document.getElementById(`tp-${round}-history`);
  if (!panel) return;
  if (historyCache[round]) { panel.innerHTML = historyCache[round]; return; }
  try {
    const [res2025, quali2025, allResults] = await Promise.all([
      fetch(`https://api.jolpi.ca/ergast/f1/2025/circuits/${race.circuitId}/results/?limit=1`,{signal:AbortSignal.timeout(10000)}).then(r=>r.ok?r.json():null),
      fetch(`https://api.jolpi.ca/ergast/f1/2025/circuits/${race.circuitId}/qualifying/`,{signal:AbortSignal.timeout(10000)}).then(r=>r.ok?r.json():null),
      fetch(`https://api.jolpi.ca/ergast/f1/circuits/${race.circuitId}/results/?limit=200`,{signal:AbortSignal.timeout(10000)}).then(r=>r.ok?r.json():null),
    ]);

    let html = '';
    const race2025 = res2025?.MRData?.RaceTable?.Races?.[0];
    if (race2025) {
      const podium = (race2025.Results||[]).slice(0,3);
      html += '<div class="hist-section"><div class="hist-label">Podium 2025</div><div class="hist-podium">';
      const podColors = ['var(--gold)','var(--silver)','var(--bronze)'];
      podium.forEach((r,i) => {
        const col = teamColor(r.Constructor?.name||'');
        html += `<div class="hist-podium-card"><div class="hist-pos" style="color:${podColors[i]}">${i===0?'🥇':i===1?'🥈':'🥉'}</div><div class="hist-driver" style="color:${col}">${r.Driver?.code||''}</div><div class="hist-podium-team" style="color:${col}">${r.Constructor?.name||''}</div></div>`;
      });
      html += '</div></div>';
      const fastest = (race2025.Results||[]).find(r=>r.FastestLap?.rank==='1');
      const qualiP1 = quali2025?.MRData?.RaceTable?.Races?.[0]?.QualifyingResults?.[0];
      html += '<div class="hist-section"><div class="hist-label">Statistik 2025</div>';
      if (qualiP1) html += `<div class="hist-stat-row"><span class="hist-stat-label">Pole</span><span class="hist-stat-val">${qualiP1.Driver?.code||''} – ${qualiP1.Q3||qualiP1.Q1||'—'}</span></div>`;
      if (fastest) html += `<div class="hist-stat-row"><span class="hist-stat-label">Snabbaste varv</span><span class="hist-stat-val" style="color:var(--purple)">⚡ ${fastest.Driver?.code||''} ${fastest.FastestLap?.Time?.time||''}</span></div>`;
      html += '</div>';
    }
    // All-time wins
    if (allResults) {
      const winMap = {};
      (allResults.MRData?.RaceTable?.Races||[]).forEach(r => {
        const winner = r.Results?.[0];
        if (winner) { const n=winner.Driver?.familyName||''; winMap[n]=(winMap[n]||0)+1; }
      });
      const sorted = Object.entries(winMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
      if (sorted.length) {
        html += '<div class="hist-section"><div class="hist-label">Flest vinster all-time</div>';
        sorted.forEach(([name,wins]) => html += `<div class="hist-stat-row"><span class="hist-stat-label">${name}</span><span class="hist-stat-val">${wins} 🏆</span></div>`);
        html += '</div>';
      }
    }
    if (!html) html = '<div style="color:var(--muted);font-size:13px;padding:12px 0">Ingen historikdata hittad</div>';
    historyCache[round] = html;
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = '<div class="error-msg">Historikdata ej tillgänglig</div>';
  }
}

// ── LIVE ──────────────────────────────────────────────────────────────────
let liveIntervals = {};
async function loadLive(round) {
  const panel = document.getElementById(`tp-${round}-live`);
  if (!panel) return;
  if (liveIntervals[round]) clearInterval(liveIntervals[round]);
  fetchLiveData(round);
  liveIntervals[round] = setInterval(() => fetchLiveData(round), 5000);
}
async function fetchLiveData(round) {
  const panel = document.getElementById(`tp-${round}-live`);
  if (!panel) return;
  try {
    const sessRes = await fetch('https://api.openf1.org/v1/sessions?year=2026&session_name=Race',{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]);
    if (!sessRes.length) { panel.innerHTML='<div class="error-msg">Inga live-sessioner</div>'; return; }
    const sk = sessRes.sort((a,b)=>b.session_key-a.session_key)[0].session_key;
    const [posRaw, driversRaw, stintsRaw, lapsRaw] = await Promise.all([
      fetch(`https://api.openf1.org/v1/position?session_key=${sk}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sk}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]),
      fetch(`https://api.openf1.org/v1/stints?session_key=${sk}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]),
      fetch(`https://api.openf1.org/v1/laps?session_key=${sk}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]),
    ]);
    const driverMap = {}; driversRaw.forEach(d=>{ driverMap[d.driver_number]=d; });
    const finalPos = {}; posRaw.forEach(p=>{ if(!finalPos[p.driver_number]||p.date>finalPos[p.driver_number].date) finalPos[p.driver_number]=p; });
    const stintMap = {}; stintsRaw.forEach(s=>{ if(!stintMap[s.driver_number]||s.stint_number>stintMap[s.driver_number].stint_number) stintMap[s.driver_number]=s; });
    const lapMap = {}; lapsRaw.forEach(l=>{ if(!lapMap[l.driver_number]||l.lap_number>lapMap[l.driver_number].lap_number) lapMap[l.driver_number]=l; });
    const sorted = Object.values(finalPos).sort((a,b)=>a.position-b.position);
    let html = '<div class="live-header"><div class="live-dot"></div>LIVE · Auto-uppdateras</div><div class="live-grid">';
    sorted.forEach(p => {
      const d = driverMap[p.driver_number]||{};
      const col = d.team_colour?`#${d.team_colour}`:teamColor(d.team_name||'');
      const stint = stintMap[p.driver_number]||{};
      const lap = lapMap[p.driver_number]||{};
      const cmp = (stint.compound||'').charAt(0);
      const tyreClass = {S:'tyre-s',M:'tyre-m',H:'tyre-h',I:'tyre-i',W:'tyre-w'}[cmp]||'';
      html += `<div class="live-driver-block"><div class="live-name-row"><div class="live-pos-badge" style="color:${col}">${p.position}</div><div class="live-name">${d.full_name||'#'+p.driver_number}</div><div class="live-gap">${p.gap_to_leader||''}</div></div><div class="live-detail-row"><span class="live-chip ${tyreClass}">${stint.compound||'?'} L${stint.lap_start||'?'}</span><span class="live-chip">Pit: ${stint.stint_number>1?stint.stint_number-1:0}</span>${lap.lap_duration?`<span class="live-chip">${fmtSecs(lap.lap_duration)}</span>`:''}</div></div>`;
    });
    html += '</div>';
    panel.innerHTML = html;
  } catch(e) { panel.innerHTML = '<div class="error-msg">Live-data ej tillgänglig</div>'; }
}

// ── STANDINGS ─────────────────────────────────────────────────────────────
let currentStandingsTab = 'drivers';
let standingsCache = {};
let chartData = null, chartActive = new Set();
const CHART_CACHE_KEY = 'chart_data';

function driverColor(constructorId) {
  const map = {'red_bull':'#3671C6','ferrari':'#E8002D','mclaren':'#FF8000','mercedes':'#00D2BE','aston_martin':'#358C75','alpine':'#FF87BC','williams':'#64C4FF','rb':'#6692FF','haas':'#B6BABD','kick_sauber':'#999','sauber':'#999','audi':'#999','cadillac':'#C4B696'};
  return map[constructorId] || '#888';
}

async function showStandings(tab) {
  currentStandingsTab = tab;
  document.getElementById('stab-drivers').classList.toggle('active', tab==='drivers');
  document.getElementById('stab-teams').classList.toggle('active', tab==='teams');
  document.getElementById('stab-chart').classList.toggle('active', tab==='chart');
  const content = document.getElementById('standings-content');
  if (tab==='chart') { showChart(); return; }
  const ck = tab;
  if (standingsCache[ck]) { content.innerHTML = standingsCache[ck]; return; }
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Hämtar ställningar...</div>';
  try {
    const ep = tab==='drivers'?'championship_drivers':'championship_teams';
    const r = await fetch(`https://api.openf1.org/v1/${ep}`,{signal:AbortSignal.timeout(10000)});
    if (!r.ok) throw new Error();
    const data = await r.json();
    let html = `<div class="st-source">✓ OpenF1</div><div class="st-list">`;
    const items = tab==='drivers' ? data : data;
    items.slice(0,20).forEach(item => {
      const pos = item.position||item.rank||'?';
      const name = item.driver_name || item.team_name || '?';
      const pts = item.points || 0;
      const team = item.team_name || '';
      const col = teamColor(team) || driverColor(item.constructor_id||'');
      const maxPts = items[0]?.points||1;
      html += `<div class="st-card"><div class="st-pos" style="color:${pos<=3?['var(--gold)','var(--silver)','var(--bronze)'][pos-1]:'var(--muted)'}">${pos}</div><div class="st-info"><div class="st-name">${name}</div>${team?`<div class="st-team"><span class="team-dot" style="background:${col}"></span>${team}</div>`:''}<div class="st-bar"><div class="st-bar-fill" style="width:${(pts/maxPts*100).toFixed(1)}%;background:${col}"></div></div></div><div class="st-pts">${pts}</div></div>`;
    });
    html += '</div>';
    standingsCache[ck] = html;
    content.innerHTML = html;
  } catch(e) {
    // Jolpica fallback
    try {
      const ep = tab==='drivers'?'driverStandings':'constructorStandings';
      const r2 = await fetch(`https://api.jolpi.ca/ergast/f1/2026/${ep}/`,{signal:AbortSignal.timeout(10000)});
      const j = await r2.json();
      const list = tab==='drivers' ? j?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings : j?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings;
      if (!list?.length) throw new Error();
      const maxPts = parseFloat(list[0]?.points||1);
      let html = '<div class="st-source">✓ Jolpica</div><div class="st-list">';
      list.forEach(item => {
        const pos = parseInt(item.position);
        const name = tab==='drivers'?`${item.Driver?.givenName?.charAt(0)}. ${item.Driver?.familyName||''}`:item.Constructor?.name||'';
        const team = item.Constructors?.[0]?.name || item.Constructor?.name || '';
        const col = teamColor(team);
        const pts = parseFloat(item.points||0);
        html += `<div class="st-card"><div class="st-pos" style="color:${pos<=3?['var(--gold)','var(--silver)','var(--bronze)'][pos-1]:'var(--muted)'}">${pos}</div><div class="st-info"><div class="st-name">${name}</div>${team?`<div class="st-team"><span class="team-dot" style="background:${col}"></span>${team}</div>`:''}<div class="st-bar"><div class="st-bar-fill" style="width:${(pts/maxPts*100).toFixed(1)}%;background:${col}"></div></div></div><div class="st-pts">${pts}</div></div>`;
      });
      html += '</div>';
      standingsCache[ck] = html;
      content.innerHTML = html;
    } catch(e2) {
      try {
        const POINTS_MAP = {1:25,2:18,3:15,4:12,5:10,6:8,7:6,8:4,9:2,10:1};
        const pastRaces = RACES_2026.filter(r => isPast(r));
        if (!pastRaces.length) throw new Error('no races');
        const driverPts = {}, driverTeam = {}, teamPts = {};
        for (const race of pastRaces) {
          const r3 = await fetch(`https://api.jolpi.ca/ergast/f1/2026/${race.round}/results/?limit=25`,{signal:AbortSignal.timeout(8000)});
          const j3 = await r3.json();
          const results = j3?.MRData?.RaceTable?.Races?.[0]?.Results || [];
          results.forEach(res => {
            const d = `${res.Driver?.givenName||''} ${res.Driver?.familyName||''}`.trim();
            const t = res.Constructor?.name||'';
            const p = parseInt(res.position);
            const pts = POINTS_MAP[p]||0;
            const fl = res.FastestLap?.rank==='1' && p<=10 ? 1 : 0;
            driverPts[d] = (driverPts[d]||0) + pts + fl;
            teamPts[t] = (teamPts[t]||0) + pts + fl;
            driverTeam[d] = t;
          });
        }
        let html = '<div class="st-source">✓ Resultat från lopp</div><div class="st-list">';
        if (tab==='drivers') {
          const sorted = Object.entries(driverPts).sort((a,b)=>b[1]-a[1]);
          const maxP = sorted[0]?.[1]||1;
          sorted.forEach(([name,pts],i) => {
            const pos = i+1;
            const team = driverTeam[name]||'';
            const col = teamColor(team)||'#888';
            html += `<div class="st-card"><div class="st-pos" style="color:${pos<=3?['var(--gold)','var(--silver)','var(--bronze)'][pos-1]:'var(--muted)'}">${pos}</div><div class="st-info"><div class="st-name">${name}</div>${team?`<div class="st-team"><span class="team-dot" style="background:${col}"></span>${team}</div>`:''}<div class="st-bar"><div class="st-bar-fill" style="width:${(pts/maxP*100).toFixed(1)}%;background:${col}"></div></div></div><div class="st-pts">${pts}</div></div>`;
          });
        } else {
          const sorted = Object.entries(teamPts).sort((a,b)=>b[1]-a[1]);
          const maxP = sorted[0]?.[1]||1;
          sorted.forEach(([team,pts],i) => {
            const pos = i+1;
            const col = teamColor(team)||'#888';
            html += `<div class="st-card"><div class="st-pos" style="color:${pos<=3?['var(--gold)','var(--silver)','var(--bronze)'][pos-1]:'var(--muted)'}">${pos}</div><div class="st-info"><div class="st-name">${team}</div><div class="st-bar"><div class="st-bar-fill" style="width:${(pts/maxP*100).toFixed(1)}%;background:${col}"></div></div></div><div class="st-pts">${pts}</div></div>`;
          });
        }
        html += '</div>';
        standingsCache[ck] = html;
        content.innerHTML = html;
      } catch(e3) { content.innerHTML = '<div class="error-msg">Inga ställningsdata tillgängliga än</div>'; }
    }
  }
}

async function showChart() {
  const content = document.getElementById('standings-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Hämtar data...</div>';
  if (!chartData) {
    const cached = sessionStorage.getItem(CHART_CACHE_KEY);
    if (cached) try { chartData = JSON.parse(cached); } catch(e){}
  }
  if (!chartData) await fetchChartData();
  if (!chartData) { content.innerHTML='<div class="error-msg">Kunde inte hämta grafdata</div>'; return; }
  const drivers = chartData.drivers;
  if (!chartActive.size) drivers.slice(0,5).forEach(d => chartActive.add(d.name));
  let html = '<div class="chart-container"><canvas id="pts-chart" style="width:100%"></canvas></div>';
  html += '<div class="chart-driver-picker">';
  drivers.forEach(d => {
    const isActive = chartActive.has(d.name);
    html += `<button class="chart-driver-btn${isActive?' active':''}" style="${isActive?`background:${d.color};border-color:${d.color};color:#fff`:''}" onclick="toggleChartDriver('${d.name}')">${d.name}</button>`;
  });
  html += '</div>';
  content.innerHTML = html;
  requestAnimationFrame(drawChart);
}

async function fetchChartData() {
  const completedRaces = RACES_2026.filter(r => isPast(r));
  if (!completedRaces.length) { chartData={rounds:[],drivers:[]}; return; }
  try {
    const results = await Promise.all(completedRaces.map(r =>
      fetch(`https://api.jolpi.ca/ergast/f1/2026/${r.round}/results/?limit=25`,{signal:AbortSignal.timeout(10000)}).then(res=>res.ok?res.json():null).catch(()=>null)
    ));
    const POINTS_MAP = {1:25,2:18,3:15,4:12,5:10,6:8,7:6,8:4,9:2,10:1};
    const driverPts = {};
    const driverColors = {};
    results.forEach(j => {
      const race = j?.MRData?.RaceTable?.Races?.[0];
      if (!race) return;
      (race.Results||[]).forEach(r => {
        const code = r.Driver?.code||r.Driver?.familyName||'?';
        const pts = POINTS_MAP[parseInt(r.position)]||0;
        if (!driverPts[code]) driverPts[code] = Array(completedRaces.length).fill(0);
        const idx = completedRaces.findIndex(cr=>cr.round===parseInt(j.MRData.RaceTable.round));
        if (idx>=0) driverPts[code][idx] = pts;
        driverColors[code] = teamColor(r.Constructor?.name||'');
      });
    });
    const drivers = Object.entries(driverPts).map(([name, pts]) => {
      const cumPts = []; let sum=0;
      pts.forEach(p=>{ sum+=p; cumPts.push(sum); });
      return { name, pts: cumPts, total: cumPts[cumPts.length-1]||0, color: driverColors[name]||'#888' };
    }).sort((a,b)=>b.total-a.total);
    chartData = { rounds: completedRaces.map(r=>r.round), drivers };
    sessionStorage.setItem(CHART_CACHE_KEY, JSON.stringify(chartData));
  } catch(e) { chartData = null; }
}

function toggleChartDriver(name) {
  if (chartActive.has(name)) chartActive.delete(name);
  else { if (chartActive.size>=6) { showToast('Max 6 förare'); return; } chartActive.add(name); }
  showChart();
}

function drawChart() {
  const canvas = document.getElementById('pts-chart');
  if (!canvas || !chartData) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const W = canvas.offsetWidth;
  const H = 260;
  canvas.width = W*dpr; canvas.height = H*dpr; canvas.style.height = H+'px';
  ctx.scale(dpr,dpr);
  const active = chartData.drivers.filter(d=>chartActive.has(d.name));
  if (!active.length) { ctx.fillStyle='#333'; ctx.font='13px DM Sans, sans-serif'; ctx.textAlign='center'; ctx.fillText('Välj förare nedan',W/2,H/2); return; }
  const pad = {top:16,right:16,bottom:32,left:40};
  const cW = W-pad.left-pad.right, cH = H-pad.top-pad.bottom;
  const n = chartData.rounds.length; if (!n) return;
  const allPts = active.flatMap(d=>d.pts);
  const maxPts = Math.max(...allPts,1);
  function xPos(i){ return pad.left+(i/(n-1||1))*cW; }
  function yPos(v){ return pad.top+(1-v/maxPts)*cH; }
  // Grid
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){ const y=pad.top+(i/4)*cH; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke(); ctx.fillStyle='#444'; ctx.font='10px DM Sans, sans-serif'; ctx.textAlign='right'; ctx.fillText(Math.round(maxPts*(1-i/4)),pad.left-4,y+4); }
  // Lines
  active.forEach(d => {
    ctx.strokeStyle = d.color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    d.pts.forEach((v,i) => { const x=xPos(i),y=yPos(v); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke();
    // Dots
    ctx.fillStyle = d.color;
    d.pts.forEach((v,i) => { ctx.beginPath(); ctx.arc(xPos(i),yPos(v),3,0,Math.PI*2); ctx.fill(); });
  });
  // X labels
  chartData.rounds.forEach((rnd,i) => { ctx.fillStyle='#555'; ctx.font='9px DM Sans, sans-serif'; ctx.textAlign='center'; ctx.fillText('R'+rnd,xPos(i),H-pad.bottom+12); });
  // Legend
  let lx=pad.left+cW, ly=pad.top+8;
  active.forEach(d => { ctx.fillStyle=d.color; ctx.fillRect(lx-70,ly-6,10,3); ctx.fillStyle='#bbb'; ctx.font='bold 9px DM Sans, sans-serif'; ctx.textAlign='left'; ctx.fillText(d.name,lx-56,ly); ly+=14; });
}

}

function fxRenderPickPanel() {
  const race=fxNextRace(), rk=String(race.round);
  const locked=fxIsLocked(race), past=isPast(race);
  const myPicks=fxData.picks?.[rk]?.[fxNick]||Array(10).fill('');
  const actual=fxData.results?.[rk]||null;
  const scored=fxData.players?.[fxNick]?.scored?.[rk];
  let statusHtml, statusClass;
  if (actual) { statusHtml=`✅ Scored — ${scored??0} poäng`; statusClass='scored'; }
  else if (locked&&fxEditMode) { statusHtml='✏️ Redigerar picks'; statusClass='open'; }
  else if (locked) { statusHtml='🔒 Inlämning stängd'; statusClass='closed'; }
  else { const q=fxQualiTime(race); const deadline=q?`Stänger ${fmtDate(q.dt)} ${fmtTime(q.dt)}`:''; statusHtml=`🟢 Öppen · ${deadline}`; statusClass='open'; }
  let slotsHtml='';
  for(let i=0;i<10;i++){
    const posClass=i===0?'p1':i===1?'p2':i===2?'p3':'';
    const pick=myPicks[i]||'';
    let badge='',ptsBadge='';
    if(actual){
      const actualPos=actual.indexOf(pick), diff=pick?Math.abs(actualPos-i):99;
      const type=!pick?'miss':diff===0?'exact':diff<=2?'close':'miss';
      const pts=!pick?0:diff===0?15:diff===1?8:diff===2?4:diff===3?2:0;
      const extra=i===0&&pick&&actual[0]===pick?10:0;
      badge=`<span class="fx-result-badge ${type}">${actual[i]||'—'}</span>`;
      ptsBadge=`<span class="fx-slot-pts ${type}">${pts+extra>0?'+':''}${pts+extra||'·'}</span>`;
    }
    let input;
    if((locked&&!fxEditMode)||actual){
      input=`<div class="fx-driver-select" style="background:transparent;border-color:var(--border);color:${pick?'var(--text)':'var(--muted)'}">${pick||'—'}</div>`;
    } else {
      const opts=FX_DRIVERS.map(d=>`<option value="${d}" ${d===pick?'selected':''}>${d}</option>`).join('');
      input=`<select class="fx-driver-select" onchange="fxUpdatePick(${race.round},${i},this.value)"><option value="">— Välj förare —</option>${opts}</select>`;
    }
    slotsHtml+=`<div class="fx-driver-slot"><div class="fx-slot-pos ${posClass}">${i+1}</div>${input}${badge}${ptsBadge}</div>`;
  }
  const validPicks=myPicks.filter(p=>p);
  const totalPreview=actual&&scored!==undefined?`<div class="fx-my-pts">Totalt: <span>${scored}</span> poäng</div>`:`<div class="fx-my-pts">${validPicks.length}/10 valda</div>`;
  const submitBtns=fxEditMode?`<button class="fx-btn-primary" style="flex:1" onclick="fxConfirmEdit(${race.round})">💾 Spara ändringar</button><button class="fx-btn-secondary" style="flex:1" onclick="fxCancelEdit()">Avbryt</button>`:!locked&&!actual?`<button class="fx-btn-secondary" onclick="fxSavePicks(${race.round})">💾 Spara gissningar</button>`:locked&&!actual&&myPicks.some(p=>p)?`<button class="fx-profile-edit-btn" onclick="fxStartEdit()">✏️ Redigera picks</button>`:'';
  document.getElementById('fx-pick-panel').innerHTML=`<div class="fx-pick-card"><div class="fx-pick-header"><div class="fx-pick-race">${race.flag} ${race.name}</div><div class="fx-pick-meta">${race.circuit} · ${race.raceDate}</div><div class="fx-pick-status ${statusClass}">${statusHtml}</div></div><div class="fx-driver-list">${slotsHtml}</div><div class="fx-submit-row">${totalPreview}<div style="display:flex;gap:8px">${submitBtns}</div></div></div>`;
}

function fxRenderLeaderboard() {
  const players=fxData?.players||{};
  const sorted=Object.entries(players).sort((a,b)=>(b[1].totalPts||0)-(a[1].totalPts||0));
  if(!sorted.length){document.getElementById('fx-leaderboard').innerHTML='<div class="fx-empty">Inga spelare ännu 🏎️</div>';return;}
  let html='<div class="fx-ladder-list">';
  sorted.forEach(([name,info],i)=>{
    const isMe=name===fxNick;
    html+=`<div class="fx-ladder-row"><div class="fx-ladder-pos${isMe?' fx-ladder-me':''}">${i+1}</div><div class="fx-ladder-name">${name}${isMe?' 👈':''}</div><div class="fx-ladder-pts">${info.totalPts||0}</div></div>`;
  });
  html+='</div>';
  document.getElementById('fx-leaderboard').innerHTML=html;
}

function calcPoints(picks,results){
  let total=0;const detail=[];
  for(let i=0;i<10;i++){const pick=picks[i],actual=results[i];if(!pick||pick===''){detail.push({pts:0,type:'miss'});continue;}const actualPos=results.indexOf(pick);if(actualPos===-1){detail.push({pts:0,type:'miss'});continue;}const diff=Math.abs(actualPos-i);let pts=diff===0?15:diff===1?8:diff===2?4:diff===3?2:0;const type=diff===0?'exact':diff<=2?'close':'miss';total+=pts;detail.push({pts,type,actualPos});}
  if(picks[0]&&picks[0]===results[0])total+=10;
  return{total,detail};
}


async function fantasyShare(){

async function fxGetBin(id){try{const r=await fetch(`${JSONBIN_BASE}/b/${id}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY},signal:AbortSignal.timeout(8000)});if(!r.ok)return null;return(await r.json()).record;}catch(e){return null;}}
async function fxCreateBin(){try{const r=await fetch(`${JSONBIN_BASE}/b`,{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'F1Fantasy'},body:JSON.stringify({picks:{},results:{},players:{}})});if(!r.ok)return null;return(await r.json()).metadata?.id;}catch(e){return null;}}
async function fxUpdateBin(id,data){try{const r=await fetch(`${JSONBIN_BASE}/b/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify(data),signal:AbortSignal.timeout(8000)});return r.ok;}catch(e){return false;}}

// ── TELEMETRY ─────────────────────────────────────────────────────────────
const DRIVER_TEAM = {'VER':'Red Bull','HAD':'Red Bull','LEC':'Ferrari','HAM':'Ferrari','NOR':'McLaren','PIA':'McLaren','RUS':'Mercedes','ANT':'Mercedes','ALO':'Aston Martin','STR':'Aston Martin','GAS':'Alpine','COL':'Alpine','ALB':'Williams','SAI':'Williams','LAW':'Racing Bulls','LIN':'Racing Bulls','BEA':'Haas','OCO':'Haas','HUL':'Audi','BOR':'Audi','BOT':'Cadillac','PER':'Cadillac'};
function driverTeamColor(abbr){ const team=DRIVER_TEAM[abbr]; return team?(TEAM_COLORS[team]||'#888'):'#888'; }
let tmRaceKey=null, tmSelectedDrivers=[], tmCurrentMetric='laptime', tmLapData=null, tmLoading=false;
const TM_CACHE={};

function tmInit(){
  const sel=document.getElementById('tm-race-sel');
  if(sel.options.length>1)return;
  RACES_2026.forEach(r=>{
    if(!isPast(r))return;
    const opt=document.createElement('option');
    opt.value=r.round; opt.textContent=`${r.flag} ${r.name}`;
    sel.appendChild(opt);
  });
  if(sel.options.length===1) sel.options[0].textContent='— Inga avklarade lopp ännu —';
}

async function tmSelectRace(){
  const round=parseInt(document.getElementById('tm-race-sel').value);
  if(!round)return;
  tmRaceKey=round; tmSelectedDrivers=[]; tmLapData=null;
  tmShowStatus('loading');
  document.getElementById('tm-driver-section').style.display='none';
  document.getElementById('tm-metric-tabs').style.display='none';
  document.getElementById('tm-chart-wrap').style.display='none';
  document.getElementById('tm-stints-view').style.display='none';
  document.getElementById('tm-stats-table').style.display='none';
  const race=RACES_2026.find(r=>r.round===round);
  if(race) await tmFetchLapData(race);
}

async function tmFetchLapData(race){
  if(TM_CACHE[race.round]){tmLapData=TM_CACHE[race.round];tmShowDriverPicker();return;}
  try{
    const sessAll=await fetch('https://api.openf1.org/v1/sessions?year=2026&session_name=Race',{signal:AbortSignal.timeout(10000)}).then(r=>r.ok?r.json():[]).catch(()=>[]);
    const raceSessions=sessAll.filter(s=>s.session_name==='Race').sort((a,b)=>a.session_key-b.session_key);
    let sessionKey=raceSessions[race.round-1]?.session_key||raceSessions[raceSessions.length-1]?.session_key;
    if(!sessionKey){tmShowStatus('Ingen data tillgänglig för detta lopp ännu');return;}
    const[lapsRaw,driversRaw,stintsRaw]=await Promise.all([
      fetch(`https://api.openf1.org/v1/laps?session_key=${sessionKey}`,{signal:AbortSignal.timeout(15000)}).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sessionKey}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch(`https://api.openf1.org/v1/stints?session_key=${sessionKey}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():[]).catch(()=>[]),
    ]);
    if(!lapsRaw.length){tmShowStatus('Inga varvtidsdata tillgängliga');return;}
    const driverMap={};
    driversRaw.forEach(d=>{driverMap[d.driver_number]={abbr:d.name_acronym||String(d.driver_number),full:d.full_name||'',color:d.team_colour?'#'+d.team_colour:driverTeamColor(d.name_acronym||''),team:d.team_name||''};});
    const stintMap={};
    stintsRaw.forEach(s=>{if(!stintMap[s.driver_number])stintMap[s.driver_number]=[];stintMap[s.driver_number].push(s);});
    const lapsByDriver={};
    lapsRaw.forEach(l=>{if(!l.lap_duration||l.lap_duration<=0)return;if(!lapsByDriver[l.driver_number])lapsByDriver[l.driver_number]=[];const stints=stintMap[l.driver_number]||[];const stint=stints.find(s=>l.lap_number>=s.lap_start&&l.lap_number<=(s.lap_end||9999));lapsByDriver[l.driver_number].push({lap:l.lap_number,time:l.lap_duration,compound:stint?.compound||'?',stintNum:stint?.stint_number||1,isPit:l.is_pit_out_lap||false});});
    Object.keys(lapsByDriver).forEach(num=>{const times=lapsByDriver[num].map(l=>l.time).sort((a,b)=>a-b);const med=times[Math.floor(times.length/2)]||999;lapsByDriver[num]=lapsByDriver[num].filter(l=>l.time<=med*1.10);});
    tmLapData={driverMap,lapsByDriver,stintMap,sessionKey};
    TM_CACHE[race.round]=tmLapData;
    tmShowDriverPicker();
  }catch(e){tmShowStatus('Fel: '+e.message);}
}

function tmShowDriverPicker(){
  const{driverMap}=tmLapData;
  const grid=document.getElementById('tm-driver-grid');
  grid.innerHTML='';
  Object.entries(driverMap).sort((a,b)=>(a[1].abbr||'').localeCompare(b[1].abbr||'')).forEach(([num,info])=>{
    const chip=document.createElement('div');
    chip.className='tm-driver-chip'; chip.style.setProperty('--chip-color',info.color);
    chip.dataset.abbr=info.abbr; chip.dataset.num=num;
    chip.innerHTML=`<div class="tm-driver-dot"></div><span>${info.abbr}</span>`;
    chip.onclick=()=>tmToggleDriver(chip,info.abbr);
    grid.appendChild(chip);
  });
  document.getElementById('tm-driver-section').style.display='';
  document.getElementById('tm-metric-tabs').style.display='none';
  document.getElementById('tm-chart-wrap').style.display='none';
  document.getElementById('tm-stints-view').style.display='none';
  document.getElementById('tm-stats-table').style.display='none';
  tmShowStatus('Välj förare för att visa graf');
}

function tmToggleDriver(chip,abbr){
  const idx=tmSelectedDrivers.indexOf(abbr);
  if(idx>=0){tmSelectedDrivers.splice(idx,1);chip.classList.remove('selected');}
  else{if(tmSelectedDrivers.length>=5){showToast('Max 5 förare åt gången');return;}tmSelectedDrivers.push(abbr);chip.classList.add('selected');}
  if(!tmSelectedDrivers.length){document.getElementById('tm-metric-tabs').style.display='none';document.getElementById('tm-chart-wrap').style.display='none';document.getElementById('tm-stints-view').style.display='none';document.getElementById('tm-stats-table').style.display='none';tmShowStatus('Välj förare för att visa graf');return;}
  document.getElementById('tm-metric-tabs').style.display='';tmShowStatus('');tmRender();
}

function tmShowMetric(metric){
  tmCurrentMetric=metric;
  ['laptime','pace','stints'].forEach(m=>document.getElementById('tmtab-'+m).classList.toggle('active',m===metric));
  tmRender();
}

function tmRender(){
  if(tmCurrentMetric==='stints'){
    document.getElementById('tm-chart-wrap').style.display='none';
    document.getElementById('tm-stats-table').style.display='none';
    document.getElementById('tm-stints-view').style.display='';
    tmRenderStints();
  }else{
    document.getElementById('tm-stints-view').style.display='none';
    document.getElementById('tm-chart-wrap').style.display='';
    document.getElementById('tm-stats-table').style.display='';
    tmRenderChart();
    tmRenderStats();
  }
}

function tmRenderChart(){
  const{driverMap,lapsByDriver}=tmLapData;
  const selNums=tmSelectedDrivers.map(abbr=>Object.entries(driverMap).find(([,d])=>d.abbr===abbr)?.[0]).filter(Boolean);
  const canvas=document.getElementById('tm-canvas');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||canvas.parentElement.offsetWidth||320;
  const H=Math.round(W*0.6);
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const pad={top:16,right:16,bottom:36,left:52};
  const cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;
  const allLapNums=selNums.flatMap(num=>(lapsByDriver[num]||[]).map(l=>l.lap));
  const maxLap=allLapNums.length?Math.max(...allLapNums):60;
  function getDriverData(num){
    const laps=lapsByDriver[num]||[];const lapMap={};laps.forEach(l=>lapMap[l.lap]=l.time);
    return Array.from({length:maxLap},(_,i)=>{
      const lap=i+1;
      if(tmCurrentMetric==='pace'){const w=[lap-2,lap-1,lap,lap+1,lap+2].filter(l=>l>=1&&l<=maxLap);const vals=w.map(l=>lapMap[l]).filter(Boolean);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;}
      return lapMap[lap]||null;
    });
  }
  const datasets=selNums.map(num=>({info:driverMap[num],data:getDriverData(num)}));
  const allVals=datasets.flatMap(d=>d.data).filter(Boolean);
  if(!allVals.length){ctx.fillStyle='#444';ctx.font='13px DM Sans, sans-serif';ctx.textAlign='center';ctx.fillText('Ingen data',W/2,H/2);return;}
  const yMin=Math.min(...allVals)*0.998, yMax=Math.max(...allVals)*1.002, yRange=yMax-yMin||1;
  function xPos(lap){return pad.left+((lap-1)/(maxLap-1||1))*cW;}
  function yPos(val){return pad.top+(1-(val-yMin)/yRange)*cH;}
  for(let i=0;i<=5;i++){const v=yMin+(yRange*i/5);const y=yPos(v);ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cW,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='10px DM Sans, sans-serif';ctx.textAlign='right';ctx.fillText(fmtSecs(v),pad.left-4,y+4);}
  for(let lap=10;lap<=maxLap;lap+=10){const x=xPos(lap);ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,pad.top+cH);ctx.stroke();ctx.fillStyle='#555';ctx.font='10px DM Sans, sans-serif';ctx.textAlign='center';ctx.fillText(lap,x,H-pad.bottom+14);}
  ctx.fillStyle='#555';ctx.font='10px DM Sans, sans-serif';ctx.textAlign='center';ctx.fillText('Varv',W/2,H-4);
  datasets.forEach(({info,data})=>{
    ctx.strokeStyle=info.color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();let started=false;
    data.forEach((val,i)=>{if(val===null){started=false;return;}const x=xPos(i+1),y=yPos(val);if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);});ctx.stroke();
    ctx.fillStyle=info.color;
    data.forEach((val,i)=>{if(val===null)return;ctx.beginPath();ctx.arc(xPos(i+1),yPos(val),2,0,Math.PI*2);ctx.fill();});
  });
  let lx=pad.left+cW,ly=pad.top+10;
  datasets.forEach(({info})=>{ctx.fillStyle=info.color;ctx.fillRect(lx-80,ly-6,12,3);ctx.fillStyle='#ccc';ctx.font='bold 10px DM Sans, sans-serif';ctx.textAlign='left';ctx.fillText(info.abbr,lx-64,ly);ly+=16;});
}

function tmRenderStats(){
  const{driverMap,lapsByDriver}=tmLapData;
  const selNums=tmSelectedDrivers.map(abbr=>Object.entries(driverMap).find(([,d])=>d.abbr===abbr)?.[0]).filter(Boolean);
  let globalFastest=Infinity;
  selNums.forEach(num=>(lapsByDriver[num]||[]).forEach(l=>{if(l.time<globalFastest)globalFastest=l.time;}));
  const cards=selNums.map(num=>{
    const info=driverMap[num];
    const laps=(lapsByDriver[num]||[]).map(l=>l.time).filter(Boolean);
    if(!laps.length)return '';
    const best=Math.min(...laps),avg=laps.reduce((a,b)=>a+b,0)/laps.length,isFastest=best===globalFastest;
    return `<div class="tm-stat-card${isFastest?' tm-fastest':''}"><div class="tm-stat-driver" style="color:${info.color}">${info.abbr} · ${info.team||''}</div><div class="tm-stat-val">${fmtSecs(best)}</div><div class="tm-stat-label">Bästa varv · Snitt: ${fmtSecs(avg)} · ${laps.length} varv</div></div>`;
  }).join('');
  document.getElementById('tm-stats-table').innerHTML=`<div class="tm-stats-grid">${cards}</div>`;
}

const COMPOUND_COLORS={'SOFT':'#E8002D','HARD':'#f0f0f0','MEDIUM':'#FFF200','INTERMEDIATE':'#39B54A','WET':'#0067FF','?':'#444'};
function tmRenderStints(){
  const{driverMap,stintMap,lapsByDriver}=tmLapData;
  const selNums=tmSelectedDrivers.map(abbr=>Object.entries(driverMap).find(([,d])=>d.abbr===abbr)?.[0]).filter(Boolean);
  if(!selNums.length){document.getElementById('tm-stints-view').innerHTML='<div class="tm-no-data">Välj förare</div>';return;}
  const allLaps=selNums.flatMap(num=>(lapsByDriver[num]||[]).map(l=>l.lap));
  const maxLap=allLaps.length?Math.max(...allLaps):60;
  const rows=selNums.map(num=>{
    const info=driverMap[num];
    const stints=(stintMap[num]||[]).sort((a,b)=>a.stint_number-b.stint_number);
    if(!stints.length)return '';
    const segs=stints.map(s=>{const lapEnd=s.lap_end||maxLap,lapCount=lapEnd-s.lap_start+1,pct=(lapCount/maxLap*100).toFixed(1),compound=s.compound||'?',col=COMPOUND_COLORS[compound]||'#666',textCol=['HARD','MEDIUM'].includes(compound)?'#000':'#fff';return `<div class="tm-stint-seg" style="width:${pct}%;background:${col};color:${textCol}" title="${compound}: Varv ${s.lap_start}–${lapEnd} (${lapCount} varv)"><span>${compound[0]}</span></div>`;}).join('');
    return `<div class="tm-stint-row"><div class="tm-stint-name" style="color:${info.color}">${info.abbr}</div><div class="tm-stint-bar-track">${segs}</div></div>`;
  }).join('');
  const legend=['SOFT','MEDIUM','HARD','INTERMEDIATE','WET'].map(c=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:10px;color:#aaa"><span style="width:10px;height:10px;border-radius:2px;background:${COMPOUND_COLORS[c]};display:inline-block"></span>${c[0]+c.slice(1).toLowerCase()}</span>`).join('');
  document.getElementById('tm-stints-view').innerHTML=`<div class="tm-stints-wrap">${rows}</div><div style="padding:0 0 8px;opacity:0.7">${legend}</div>`;
}

function tmShowStatus(msg){
  const el=document.getElementById('tm-status');
  if(msg==='loading'){el.innerHTML='<div class="loading"><div class="spinner"></div>Hämtar telemetri...</div>';el.style.display='';}
  else if(msg){el.textContent=msg;el.style.display='';}
  else el.style.display='none';
}

function openThemePicker(){
  const grid=document.getElementById('theme-grid');

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────
const NOTIFY_KEY='f1_notify';
async function handleNotifyBtn(){
  const enabled=localStorage.getItem(NOTIFY_KEY)==='true';
  if(enabled){localStorage.setItem(NOTIFY_KEY,'false');updateNotifyBtn();showToast('🔕 Notiser avstängda');return;}
  if(!('Notification' in window)){showToast('Notiser stöds ej');return;}
  const perm=await Notification.requestPermission();
  if(perm!=='granted'){showToast('Notiser nekades');return;}
  localStorage.setItem(NOTIFY_KEY,'true');
  updateNotifyBtn(); showToast('🔔 Notiser aktiverade!');
  scheduleNotifications();
}
function updateNotifyBtn(){
  const enabled=localStorage.getItem(NOTIFY_KEY)==='true'&&Notification.permission==='granted';
  const icon=document.getElementById('notify-icon');
  const moreIcon=document.getElementById('more-notify-icon');
  const btn=document.getElementById('notify-header-btn');
  if(icon) icon.textContent=enabled?'🔔':'🔕';
  if(moreIcon) moreIcon.textContent=enabled?'🔔':'🔕';
  if(btn) btn.classList.toggle('notify-active',enabled);
}
function scheduleNotifications(){
  RACES_2026.forEach(race=>{
    getSessions(race).forEach(s=>{
      const notifyTime=new Date(s.dt.getTime()-30*60*1000);
      const delay=notifyTime-new Date();
      if(delay>0&&delay<7*24*3600*1000){
        setTimeout(()=>{
          if(Notification.permission==='granted'&&localStorage.getItem(NOTIFY_KEY)==='true'){
            new Notification(`F1 2026 – Om 30 min`,{body:`${race.flag} ${race.name}: ${s.label}`,icon:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/64px-F1.svg.png'});
          }
        },delay);
      }
    });
  });
}

// ── PULL TO REFRESH ───────────────────────────────────────────────────────
let ptStart=0, ptCurrent=0, ptActive=false;
document.addEventListener('touchstart',e=>{if(window.scrollY<=0&&e.touches.length===1){ptStart=e.touches[0].clientY;ptActive=true;}},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!ptActive)return;
  ptCurrent=e.touches[0].clientY;
  const pull=ptCurrent-ptStart;
  const ind=document.getElementById('pull-indicator');
  if(pull>0&&pull<120){ind.textContent=pull>72?'↑ Släpp för att uppdatera':'↓ Dra ner för att uppdatera';}
},{passive:true});
document.addEventListener('touchend',()=>{
  if(!ptActive)return; ptActive=false;
  const pull=ptCurrent-ptStart;
  const ind=document.getElementById('pull-indicator');
  ind.textContent='';
  if(pull>72){
    if(currentPage==='calendar'){standingsCache={};buildCalendar();showToast('✓ Uppdaterad');}
    else if(currentPage==='standings'){standingsCache={};showStandings(currentStandingsTab);}
    else if(currentPage==='fantasy'&&fxBinId){fxGetBin(fxBinId).then(d=>{if(d){fxData=d;fxRender();showToast('✓ Uppdaterad');}});}
  }
  ptStart=0; ptCurrent=0;
});

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────
function init(){
  buildCalendar();
  setInterval(updateClock,1000);
  updateClock();
  updateNotifyBtn();
  if(localStorage.getItem(NOTIFY_KEY)==='true'&&Notification.permission==='granted') scheduleNotifications();
  // Scroll to next race
  requestAnimationFrame(()=>{
    const next=RACES_2026.find(r=>!isPast(r));
    if(next){const el=document.getElementById('rc-'+next.round);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
  });
}
init();
