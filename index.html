<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 2026">
<meta name="theme-color" content="#080808">
<title>F1 2026</title>

<script>
const manifestData = {
  name:"F1 2026 Kalender", short_name:"F1 2026", start_url:"/",
  display:"standalone", background_color:"#080808", theme_color:"#E10600",
  orientation:"portrait",
  icons:[{ src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E10600'/><text y='.85em' font-size='72' x='14'>🏎</text></svg>", sizes:"any", type:"image/svg+xml" }]
};
const blob = new Blob([JSON.stringify(manifestData)],{type:'application/json'});
document.addEventListener('DOMContentLoaded',()=>{
  const l=document.createElement('link'); l.rel='manifest';
  l.href=URL.createObjectURL(blob); document.head.appendChild(l);
});
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  --red:     #E10600;
  --red2:    #ff2a25;
  --bg:      #080808;
  --bg2:     #0f0f0f;
  --surface: #141414;
  --surface2:#1a1a1a;
  --surface3:#222;
  --border:  #242424;
  --border2: #2e2e2e;
  --text:    #f2f2f2;
  --text2:   #b0b0b0;
  --muted:   #666;
  --gold:    #f5c518;
  --silver:  #c0c0c0;
  --bronze:  #cd7f32;
  --green:   #22c55e;
  --purple:  #c44dff;

  --r-sm:  8px;
  --r-md: 12px;
  --r-lg: 16px;

  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);

  /* Theme accent (overridden per team) */
  --accent:       #E10600;
  --accent2:      #ff2a25;
  --accent-glow:  rgba(var(--accent-rgb,225,6,0),0.25);
}

/* ── THEME VARIATIONS ────────────────────────────────────────────────────── */
/* Each team overrides --accent, --accent2, --accent-glow */
[data-theme="ferrari"]       { --accent:#E8002D; --accent2:#ff1a3d; --accent-glow:rgba(232,0,45,0.25); }
[data-theme="red_bull"]      { --accent:#3671C6; --accent2:#5590e0; --accent-glow:rgba(54,113,198,0.25); }
[data-theme="mercedes"]      { --accent:#00D2BE; --accent2:#00f0d8; --accent-glow:rgba(0,210,190,0.25); }
[data-theme="mclaren"]       { --accent:#FF8000; --accent2:#ff9a30; --accent-glow:rgba(255,128,0,0.25); }
[data-theme="aston_martin"]  { --accent:#358C75; --accent2:#40a98d; --accent-glow:rgba(53,140,117,0.25); }
[data-theme="alpine"]        { --accent:#FF87BC; --accent2:#ffa0cc; --accent-glow:rgba(255,135,188,0.25); }
[data-theme="williams"]      { --accent:#64C4FF; --accent2:#80d4ff; --accent-glow:rgba(100,196,255,0.25); }
[data-theme="rb"]            { --accent:#6692FF; --accent2:#80aaff; --accent-glow:rgba(102,146,255,0.25); }
[data-theme="haas"]          { --accent:#B6BABD; --accent2:#d0d4d8; --accent-glow:rgba(182,186,189,0.2); }
[data-theme="sauber"]        { --accent:#999999; --accent2:#b0b0b0; --accent-glow:rgba(153,153,153,0.2); }
[data-theme="cadillac"]      { --accent:#C4B696; --accent2:#d4c8a8; --accent-glow:rgba(196,182,150,0.25); }
[data-theme="default"]       { --accent:#E10600; --accent2:#ff2a25; --accent-glow:rgba(var(--accent-rgb,225,6,0),0.25); }

/* ── RESET ───────────────────────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
html {
  height: 100%;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100%;
  padding-bottom: calc(62px + var(--safe-bottom));
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
button { touch-action: manipulation; font-family: inherit; cursor: pointer; }

/* ── HEADER ──────────────────────────────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 3px;
  line-height: 1;
  color: var(--text);
}
.logo-f1 { color: var(--accent); }

/* ── THEME BUTTON ────────────────────────────────────────────────────────── */
.theme-btn {
  margin-left: auto;
  background: none; border: none;
  font-size: 20px; line-height: 1;
  padding: 4px 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.theme-btn:active { transform: scale(0.88) rotate(20deg); }

/* ── THEME SHEET ─────────────────────────────────────────────────────────── */
.theme-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.theme-overlay.open { display: block; }

.theme-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 10px 20px calc(20px + var(--safe-bottom));
  z-index: 501;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
.theme-sheet.open { transform: translateY(0); }

.theme-sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.theme-sheet-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 2px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 16px;
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.theme-tile {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  padding: 12px 6px 10px;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.theme-tile:active { transform: scale(0.94); }
.theme-tile.active {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 12%, var(--surface2));
}
.theme-tile.active::after {
  content: '✓';
  position: absolute; top: 5px; right: 7px;
  font-size: 11px; font-weight: 700;
  color: var(--accent);
}
.theme-swatch {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.theme-swatch-inner {
  position: absolute; inset: 4px;
  border-radius: 50%;
  background: var(--bg);
}
.theme-name {
  font-size: 10px; font-weight: 600;
  color: var(--text2);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 0.3px;
}

.header-sep {
  width: 1px; height: 20px;
  background: var(--border2);
  flex-shrink: 0;
}

.header-clock {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  flex: 1;
}

/* ── COUNTDOWN BANNER ────────────────────────────────────────────────────── */
.countdown-banner {
  margin: 12px 12px 0;
  background: linear-gradient(135deg, #1a0a00 0%, #1a0000 100%);
  border: 1px solid #3a1a00;
  border-radius: var(--r-lg);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  overflow: hidden;
  position: relative;
}
.countdown-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
  border-radius: 99px 0 0 99px;
}
.countdown-race-flag { font-size: 28px; flex-shrink: 0; }
.countdown-info { flex: 1; min-width: 0; }
.countdown-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2px;
}
.countdown-race-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.countdown-session {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.countdown-timer {
  flex-shrink: 0;
  text-align: center;
}
.countdown-digits {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 1px;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.countdown-unit {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 1px;
}

/* live banner variant */
.countdown-banner.is-live {
  background: linear-gradient(135deg, #1a0000 0%, #2a0500 100%);
  border-color: var(--accent);
  animation: liveBorderPulse 2s ease-in-out infinite;
}
@keyframes liveBorderPulse {
  0%,100% { border-color: var(--accent); }
  50%      { border-color: #ff6b6b; }
}
.live-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--accent);
  color: white;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 99px;
}
.live-pill-dot {
  width: 6px; height: 6px;
  background: white;
  border-radius: 50%;
  animation: pulse 1s infinite;
}

/* ── PAGE CONTAINER ──────────────────────────────────────────────────────── */
.container { padding: 16px 12px; max-width: 600px; margin: 0 auto; }

.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 2px;
}
.page-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
  font-weight: 400;
}

/* ── MONTH DIVIDER ───────────────────────────────────────────────────────── */
.month-divider {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2.5px;
  padding: 18px 4px 8px;
  text-transform: uppercase;
  border-bottom: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.month-divider::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 12px;
  background: var(--accent);
  border-radius: 2px;
  flex-shrink: 0;
  opacity: 0.7;
}
.month-divider:first-child { padding-top: 4px; }

/* Öppet kort — starkare kant */
.race-card.open:not(.past) {
  border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
  box-shadow: 0 2px 16px color-mix(in srgb, var(--accent) 10%, transparent);
}

/* ── RACE CARD ───────────────────────────────────────────────────────────── */
.race-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
}

/* Avklarade lopp — mörkare, nedtonade */
.race-card.past {
  background: #0e0e0e;
  border-color: #1e1e1e;
  opacity: 0.6;
}
.race-card.past .race-name { color: var(--muted); }
.race-card.past .flag      { filter: grayscale(0.5); }

/* Nästa kommande lopp — accentfärgad vänsterkant + glöd */
.race-card.next-race {
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 6%, #0d0d0d), #0d0d0d);
  border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
  border-left: 3px solid var(--accent);
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 15%, transparent),
              0 4px 20px color-mix(in srgb, var(--accent) 15%, transparent),
              inset 3px 0 12px color-mix(in srgb, var(--accent) 6%, transparent);
}
.race-card.next-race .race-name { color: #fff; }

/* Övriga kommande lopp — svag accenttonad kant */
.race-card.upcoming {
  background: #111318;
  border-color: color-mix(in srgb, var(--accent) 18%, var(--border));
  border-left: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
}

/* Live — starkt glöd */
.race-card.live {
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, #0d0d0d), #0d0d0d);
  border-color: var(--accent);
  border-left: 3px solid var(--accent);
  box-shadow: 0 0 0 1px var(--accent),
              0 4px 24px color-mix(in srgb, var(--accent) 25%, transparent);
}

.race-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
  min-height: 62px;
  user-select: none;
}

.round-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  min-width: 24px;
  flex-shrink: 0;
}

.flag {
  font-size: 30px;
  flex-shrink: 0;
  line-height: 1;
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
}

.race-info { flex: 1; min-width: 0; }
.race-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.1;
}
.race-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.race-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

/* badges */
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 99px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge-live     { background: var(--accent);    color: #fff; }
.badge-done     { background: #1a2e1a;       color: var(--green); }
.badge-next     { background: #0d2e0d;       color: var(--green); border: 1px solid #2a5a2a; }
.badge-upcoming { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
.badge-sprint   { background: #241500;        color: #f59e0b; }

.chevron {
  color: var(--muted);
  font-size: 12px;
  transition: transform 0.22s;
  margin-left: 2px;
  flex-shrink: 0;
  opacity: 0.6;
}
.race-card.open .chevron { transform: rotate(180deg); }

/* ── EXPANDED PANEL ──────────────────────────────────────────────────────── */
.race-panel {
  display: none;
  border-top: 1px solid var(--border);
  animation: slideDown 0.18s ease;
}
.race-card.open .race-panel { display: block; }
@keyframes slideDown {
  from { opacity:0; transform:translateY(-4px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── SESSION TABS ────────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  background: none;
  border: none;
  padding: 11px 15px;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.12s, border-color 0.12s;
  min-height: 44px;
  letter-spacing: 0.2px;
}
.tab-btn:active  { opacity: 0.65; }
.tab-btn.active  { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn.live-tab { color: var(--accent); }

/* ── SESSION SCHEDULE ────────────────────────────────────────────────────── */
.session-schedule { padding: 14px 14px 16px; }
.session-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  min-height: 44px;
}
.session-row:last-of-type { border-bottom: none; }
.session-name { font-weight: 500; font-size: 13px; flex: 1; }
.session-time { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
.session-date { font-size: 11px; color: var(--muted); text-align: right; }
.session-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
}
.session-past       { background:#1a2e1a; color:var(--green); }
.session-live-now   { background:var(--accent); color:#fff; animation:pulse 1.2s infinite; }
.session-upcoming-s { background:var(--surface2); color:var(--muted); border:1px solid var(--border2); }

/* ── RESULTS TABLE ───────────────────────────────────────────────────────── */
.results-wrapper { padding: 12px 14px 16px; }
.results-table { width:100%; border-collapse:collapse; font-size:13px; }
.results-table th {
  text-align:left; color:var(--muted); font-size:10px; font-weight:700;
  letter-spacing:0.5px; text-transform:uppercase;
  padding:0 6px 10px; border-bottom:1px solid var(--border);
}
.results-table td {
  padding:9px 6px; border-bottom:1px solid #191919; vertical-align:middle;
}
.results-table tr:last-child td { border-bottom:none; }

.pos-1 { color:var(--gold);   font-family:'Bebas Neue',sans-serif; font-size:17px; }
.pos-2 { color:var(--silver); font-family:'Bebas Neue',sans-serif; font-size:17px; }
.pos-3 { color:var(--bronze); font-family:'Bebas Neue',sans-serif; font-size:17px; }
.pos-other { color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:17px; }

.driver-name { font-weight:500; font-size:13px; }
.driver-abbr { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px; margin-right:4px; opacity:0.4; }
.team-dot    { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
.time-col    { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
.points-col  { text-align:right; font-weight:600; font-size:13px; }

/* ── BANNER WEATHER ROW ──────────────────────────────────────────────────── */
.banner-weather-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 5px;
  flex-wrap: wrap;
  min-height: 16px;
}
.bw-icon   { font-size: 14px; line-height: 1; }
.bw-temp   { font-family:'Bebas Neue',sans-serif; font-size:16px; line-height:1; }
.bw-sep    { color: var(--border); font-size: 10px; }
.bw-wind, .bw-rain { font-size: 11px; color: var(--muted); }
.bw-label  { font-size: 10px; color: #444; margin-left: 2px; }

/* ── WEATHER TAB ─────────────────────────────────────────────────────────── */
.wx-wrap { padding: 14px 14px 8px; }

.wx-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--muted);
  margin: 16px 0 8px;
}
.wx-section-title:first-child { margin-top: 0; }

/* Session rows */
.wx-sessions { display: flex; flex-direction: column; gap: 6px; }
.wx-sess-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  gap: 10px;
}
.wx-sess-left  { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.wx-sess-icon  { font-size: 22px; flex-shrink:0; }
.wx-sess-name  { font-size: 13px; font-weight: 600; color: var(--text); }
.wx-sess-time  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.wx-sess-right { text-align: right; flex-shrink: 0; }
.wx-sess-temp  { font-family:'Bebas Neue',sans-serif; font-size: 20px; line-height: 1; }
.wx-sess-details { display:flex; gap:8px; font-size:11px; color:var(--muted); margin-top:3px; justify-content:flex-end; }

/* 3-day cards */
.wx-days {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 4px;
}
.wx-day-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 8px;
  text-align: center;
}
.wx-day-card.wx-day-wet {
  background: #0d1a2e;
  border-color: #1e3050;
}
.wx-day-label { font-size: 10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:6px; }
.wx-day-icon  { font-size: 24px; line-height:1; margin-bottom:4px; }
.wx-day-desc  { font-size: 10px; color: #555; margin-bottom: 6px; min-height: 14px; }
.wx-day-temps { font-family:'Bebas Neue',sans-serif; font-size:16px; display:flex; gap:4px; justify-content:center; align-items:baseline; }
.wx-day-tmin  { font-size:13px; color:var(--muted); }
.wx-day-rain  { font-size: 11px; margin-top: 4px; }
.wx-day-wind  { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Risk summary bar */
.wx-risk-bar {
  margin-top: 12px;
  padding: 10px 14px;
  border: 1px solid;
  border-radius: var(--r-sm);
  background: rgba(255,255,255,0.03);
  font-size: 12px;
  font-weight: 600;
  text-align: center;
}

/* Too far out message */
.wx-too-far {
  padding: 32px 16px;
  text-align: center;
}
.wx-too-far-icon  { font-size: 36px; margin-bottom: 10px; }
.wx-too-far-title { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--text); letter-spacing:1px; }
.wx-too-far-sub   { font-size:12px; color:var(--muted); margin-top:4px; }

.hist-podium-time { font-size:11px; color:var(--muted); margin-top:3px; }

.hist-stats { display:flex; flex-direction:column; gap:8px; }
.hist-stat-card {
  display:flex; align-items:center; gap:12px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:12px 14px;
}
.hist-stat-icon  { font-size:22px; flex-shrink:0; }
.hist-stat-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); }
.hist-stat-value { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1.1; color:var(--text); }
.hist-stat-driver{ font-size:11px; margin-top:2px; }

.hist-most-wins {
  display:flex; align-items:center; gap:12px;
  background:linear-gradient(135deg,#1a1400,#1a1000);
  border:1px solid #3a2e00; border-radius:var(--r-sm);
  padding:14px 16px;
}
.hist-wins-name  { flex:1; font-size:15px; font-weight:700; color:var(--text); }
.hist-wins-count { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--gold); line-height:1; }
.hist-wins-label { font-size:11px; color:var(--muted); min-width:36px; }

/* ── TRACK MAP ───────────────────────────────────────────────────────────── */
.track-map-wrap {
  padding: 16px 16px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.track-map-img {
  width: 100%;
  max-width: 280px;
  max-height: 200px;
  object-fit: contain;
  filter: invert(1) sepia(1) saturate(3) hue-rotate(var(--track-hue, 320deg)) brightness(0.85);
  opacity: 0.9;
}
.race-card.past .track-map-img {
  filter: invert(1) brightness(0.3);
  opacity: 0.5;
}
.race-card.next-race .track-map-img {
  --track-hue: 100deg;
}
.track-map-caption {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  margin: 8px 0 12px;
  text-transform: uppercase;
}

.track-map-wrap {
  position: relative;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.track-svg {
  width: 100%;
  max-width: 260px;
  height: auto;
  color: var(--accent);
  filter: drop-shadow(0 0 6px rgba(var(--accent-rgb,225,6,0),0.35));
}
.race-card.past .track-svg      { color: #444; filter: none; }
.race-card.next-race .track-svg { color: var(--green); filter: drop-shadow(0 0 6px rgba(34,197,94,0.3)); }
.track-map-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
}

/* ── HISTORIA ────────────────────────────────────────────────────────────── */
.hist-wrap { padding: 14px 14px 4px; }
.hist-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--muted);
  margin: 16px 0 8px;
}
.hist-section-title:first-child { margin-top: 0; }
.hist-records {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.hist-record-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
}
.hist-record-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--text);
  line-height: 1;
}
.hist-record-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 3px;
}
.hist-record-sub { font-size: 11px; color: #555; margin-top: 2px; }
.hist-podium {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.hist-podium-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 8px;
  text-align: center;
}
.hist-podium-medal  { font-size: 18px; line-height: 1; }
.hist-podium-name   { font-family:'Bebas Neue',sans-serif; font-size:15px; margin-top:4px; }
.hist-podium-team   { font-size:10px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hist-winner-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.hist-winner-row:last-child { border-bottom: none; padding-bottom: 6px; }
.hist-winner-year { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--muted); min-width:38px; }
.hist-winner-bar  { flex:1; padding-left:10px; }
.hist-winner-name { font-size:13px; font-weight:600; color:var(--text); }
.hist-winner-team { font-size:11px; margin-top:1px; }
.hist-winner-time { font-size:11px; color:var(--muted); min-width:60px; text-align:right; }

/* ── LIVE TAB ────────────────────────────────────────────────────────────── */
.live-wrap { padding: 12px 12px 16px; }
.live-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.live-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px;
}
.live-dot {
  width:8px; height:8px; background:var(--accent);
  border-radius:50%; animation:pulse 1.1s infinite;
}
.live-lap { font-size:12px; color:var(--muted); text-align:right; }
.live-lap strong { font-family:'Bebas Neue',sans-serif; font-size:17px; color:var(--text); }

.live-row {
  display: grid;
  grid-template-columns: 26px minmax(0,1fr) 70px;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #191919;
  min-height: 52px;
}
.live-row:last-child { border-bottom:none; }
.live-pos { font-family:'Bebas Neue',sans-serif; font-size:18px; text-align:center; line-height:1; }
.live-driver-block { min-width:0; overflow:hidden; }
.live-name-row { display:flex; align-items:center; gap:5px; margin-bottom:5px; overflow:hidden; }
.live-bar { width:3px; height:16px; border-radius:2px; flex-shrink:0; }
.live-abbr { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--text); letter-spacing:1px; flex-shrink:0; }
.live-name { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.live-meta-row { display:flex; align-items:center; gap:6px; overflow:hidden; }
.tyre-chip { font-size:11px; font-weight:800; padding:2px 7px; border-radius:4px; white-space:nowrap; flex-shrink:0; }
.tyre-SOFT   { background:#c0392b; color:#fff; }
.tyre-MEDIUM { background:#d4ac0d; color:#000; }
.tyre-HARD   { background:#d5d8dc; color:#000; }
.tyre-INTER  { background:#27ae60; color:#fff; }
.tyre-WET    { background:#2471a3; color:#fff; }
.tyre-UNKNOWN{ background:#2a2a2a; color:#666; }
.live-pits   { font-size:11px; color:var(--muted); white-space:nowrap; }
.live-right  { text-align:right; }
.live-gap-val { font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--text); white-space:nowrap; }
.live-laptime { font-size:11px; color:var(--muted); margin-top:3px; font-variant-numeric:tabular-nums; white-space:nowrap; }
.live-laptime.fastest { color:var(--purple); font-weight:600; }
.live-refresh-note { text-align:center; font-size:11px; color:#333; margin-top:14px; padding-top:10px; border-top:1px solid var(--border); }

/* ── LOADING / ERROR ─────────────────────────────────────────────────────── */
.loading { text-align:center; padding:32px 16px; color:var(--muted); font-size:13px; }
.spinner {
  width:20px; height:20px;
  border:2px solid var(--surface3); border-top-color:var(--accent);
  border-radius:50%; animation:spin 0.6s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.error-msg { text-align:center; padding:20px 16px; color:#b04040; font-size:13px; line-height:1.6; }

/* ── STANDINGS ───────────────────────────────────────────────────────────── */
.standings-tabs { display:flex; gap:8px; margin-bottom:16px; }
.std-tab {
  flex:1; font-size:13px; font-weight:600; color:var(--muted);
  background:var(--surface); border:1px solid var(--border);
  padding:12px 8px; border-radius:var(--r-md);
  min-height:44px; text-align:center;
  transition: all 0.15s;
}
.std-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

.st-source { font-size:11px; color:var(--muted); text-align:right; margin-bottom:12px; }
.st-list   { display:flex; flex-direction:column; gap:6px; }
.st-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:11px 12px;
  display:flex; align-items:center; gap:10px;
}
.st-card--leader { border-color:#2e2a00; background:#111000; }
.st-pos { width:26px; flex-shrink:0; text-align:center; }
.st-info { flex:1; min-width:0; }
.st-name { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.st-flag { font-size:15px; flex-shrink:0; }
.st-teambar { width:3px; height:16px; border-radius:2px; flex-shrink:0; }
.st-driver { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.st-team {
  font-size:11px; color:var(--muted);
  display:flex; align-items:center; gap:4px;
  margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.st-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; display:inline-block; }
.st-bar-track { height:2px; background:var(--surface3); border-radius:2px; overflow:hidden; }
.st-bar-fill  { height:100%; border-radius:2px; transition:width 0.5s ease; }
.st-right     { flex-shrink:0; text-align:right; min-width:50px; }
.st-pts { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--text); line-height:1; }
.st-gap { font-size:11px; color:var(--muted); margin-top:2px; }

/* ── CHART ───────────────────────────────────────────────────────────────── */
.chart-wrap { padding: 0 0 16px; }
.chart-driver-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  padding: 12px 12px 0;
  margin-bottom: 12px;
}
.chart-driver-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 10px;
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.chart-driver-btn.active {
  border-color: var(--driver-color, #888);
  background: color-mix(in srgb, var(--driver-color, #888) 12%, var(--surface2));
}
.chart-driver-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: var(--driver-color, #888);
}
.chart-driver-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chart-driver-pts  { font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--muted); }

.chart-canvas-wrap {
  position: relative;
  padding: 0 12px;
}
#pts-chart {
  width: 100%;
  border-radius: var(--r-sm);
  display: block;
}
.chart-legend-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 10px 12px 0;
}
.chart-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
}
.chart-legend-line {
  width: 20px; height: 2px; border-radius: 2px;
  background: var(--driver-color, #888);
}
.chart-legend-dash {
  width: 20px; height: 0; border-top: 2px dashed var(--driver-color, #888);
}
.chart-info {
  font-size: 11px; color: var(--muted);
  padding: 6px 12px 0;
  text-align: center;
}

/* ── PULL TO REFRESH ─────────────────────────────────────────────────────── */
.ptr-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 0;
  overflow: hidden;
  opacity: 0;
  transition: height 0.2s ease, opacity 0.2s ease;
  background: var(--bg);
}
.ptr-indicator.ptr-pulling {
  height: 52px;
  opacity: 1;
}
.ptr-indicator.ptr-refreshing {
  height: 52px;
  opacity: 1;
}
.ptr-spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
  transition: transform 0.2s ease;
}
.ptr-indicator.ptr-refreshing .ptr-spinner {
  animation: spin 0.7s linear infinite;
}
.ptr-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

/* ── BOTTOM NAV ──────────────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(62px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 300;
}
.nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: none; border: none;
  color: var(--muted); font-size: 10px; font-weight: 500;
  letter-spacing: 0.2px; padding: 8px 0;
  transition: color 0.15s;
}
.nav-icon { font-size: 22px; line-height: 1; transition: transform 0.15s; }
.nav-btn.active       { color: var(--accent); }
.nav-btn.active .nav-icon { transform: scale(1.1); }

/* ── FANTASY ─────────────────────────────────────────────────────────────── */

/* Fantasy page tabs */
.fx-page-tabs {
  display: flex; gap: 6px;
  margin: 12px 0 4px;
}
.fx-page-tab {
  flex: 1;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  padding: 9px 4px; cursor: pointer; transition: all 0.15s;
}
.fx-page-tab.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

/* Stats panel */
.fx-stats-wrap { padding: 4px 0 24px; }

.fx-stats-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 1.5px; color: var(--muted);
  margin: 16px 0 8px;
}

/* Summary stat pills */
.fx-stat-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 8px;
  margin-bottom: 4px;
}
.fx-stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 12px;
  display: flex; flex-direction: column; gap: 3px;
}
.fx-stat-value {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  color: var(--text); line-height: 1;
}
.fx-stat-value.good  { color: var(--green); }
.fx-stat-value.great { color: var(--gold); }
.fx-stat-label { font-size: 11px; color: var(--muted); }

/* Per-race bar chart */
.fx-bar-chart { display: flex; flex-direction: column; gap: 7px; }
.fx-bar-row {
  display: flex; align-items: center; gap: 8px;
}
.fx-bar-label {
  font-size: 11px; color: var(--muted); width: 34px; flex-shrink: 0; text-align: right;
}
.fx-bar-track {
  flex: 1; height: 22px; background: var(--surface2);
  border-radius: 5px; overflow: hidden; position: relative;
}
.fx-bar-fill {
  height: 100%; border-radius: 5px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 6px;
  transition: width 0.6s ease;
  min-width: 0;
}
.fx-bar-fill.best { background: var(--gold); }
.fx-bar-pts {
  font-family: 'Bebas Neue', sans-serif; font-size: 13px;
  color: #fff; white-space: nowrap;
}
.fx-bar-zero { font-size: 11px; color: var(--muted); padding-left: 8px; }

/* Favourite drivers table */
.fx-fav-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.fx-fav-row:last-child { border-bottom: none; }
.fx-fav-pos { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--muted); width:22px; }
.fx-fav-name { flex: 1; font-size: 13px; font-weight: 600; }
.fx-fav-count { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--accent); }
.fx-fav-label { font-size:10px; color:var(--muted); }

/* Player selector */
.fx-player-selector {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
}
.fx-player-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 5px 12px; cursor: pointer; transition: all 0.15s;
}
.fx-player-btn.active {
  border-color: var(--accent); color: var(--accent);
  background: rgba(var(--accent-rgb,225,6,0),0.1);
}


  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 20px;
  text-align: center;
  margin-top: 8px;
}
.fx-setup-icon  { font-size: 48px; margin-bottom: 12px; }
.fx-setup-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; margin-bottom:6px; }
.fx-setup-sub   { font-size:12px; color:var(--muted); margin-bottom:18px; }

.fx-input {
  width: 100%; box-sizing: border-box;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-size: 16px; padding: 12px 14px;
  margin-bottom: 14px; outline: none;
  font-family: 'DM Sans', sans-serif;
}
.fx-input:focus { border-color: var(--accent); }

.fx-btn-primary {
  width: 100%; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-size: 14px; font-weight: 700;
  padding: 13px; letter-spacing: 0.5px;
  cursor: pointer; font-family:'DM Sans',sans-serif;
}
.fx-btn-secondary {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600;
  padding: 10px 16px; cursor: pointer;
  font-family:'DM Sans',sans-serif;
}

.fx-share-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #0d1a0d; border: 1px solid #1e3a1e;
  border-radius: var(--r-sm); padding: 11px 14px;
  font-size: 13px; font-weight: 600; color: var(--green);
  margin-bottom: 14px; cursor: pointer;
}
.fx-share-icon { font-size: 18px; }

/* Pick panel */
.fx-pick-card {
  background: var(--surface); border: 1px solid var(--border);

RACES_2026.sort((a,b) => new Date(a.raceDate) - new Date(b.raceDate));

// ─── SESSION TEMPLATES ────────────────────────────────────────────────────────
const SESSION_TEMPLATES = {
  normal: [
    { day:0, h:5,  m:30, label:'FP1 – Fri träning 1',    key:'fp1'   },
    { day:0, h:9,  m:0,  label:'FP2 – Fri träning 2',    key:'fp2'   },
    { day:1, h:5,  m:30, label:'FP3 – Lör träning 3',    key:'fp3'   },
    { day:1, h:9,  m:0,  label:'Kval – Lördag',           key:'quali' },
    { day:2, h:7,  m:0,  label:'Race – Söndag',           key:'race'  },
  ],
  sprint: [
    { day:0, h:5,  m:30, label:'FP1 – Fredag träning',   key:'fp1'   },
    { day:0, h:9,  m:0,  label:'Sprint Kval – Fredag',    key:'sq'    },
    { day:1, h:4,  m:0,  label:'Sprint Race – Lördag',    key:'sprint'},
    { day:1, h:8,  m:0,  label:'Kval – Lördag',           key:'quali' },
    { day:2, h:7,  m:0,  label:'Race – Söndag',           key:'race'  },
  ],
};

function getSessions(race) {
  const fri = new Date(race.dates[0] + 'T00:00:00');
  return (race.sprint ? SESSION_TEMPLATES.sprint : SESSION_TEMPLATES.normal).map(s => {
    const d = new Date(fri);
    d.setDate(d.getDate() + s.day);
    d.setHours(s.h, s.m, 0, 0);
    return { ...s, dt: d };
  });
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
const WEEKDAYS_SV = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
const MONTHS_SV   = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
function fmtDate(dt) { return `${WEEKDAYS_SV[dt.getDay()]} ${dt.getDate()} ${MONTHS_SV[dt.getMonth()]}`; }
function fmtTime(dt) { return dt.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' }); }
function getMonthSV(s) { const d=new Date(s); return MONTHS_SV[d.getMonth()].toUpperCase()+' '+d.getFullYear(); }
function isLiveWeekend(race) {
  const now=new Date(), fri=new Date(race.dates[0]+'T00:00:00'), sun=new Date(race.dates[2]+'T23:59:59');
  return now>=fri && now<=sun;
}
function isPast(race) { return new Date(race.raceDate+'T23:59:59') < new Date(); }
function teamColor(name) {
  if (!name) return '#888';
  for (const [k,v] of Object.entries(TEAM_COLORS)) if (name.includes(k)) return v;
  return '#888';
}
function fmtSecs(s) {
  if (!s && s!==0) return '—';
  const m=Math.floor(s/60), r=(s%60).toFixed(3);
  return m>0 ? `${m}:${r.padStart(6,'0')}` : `${Number(s).toFixed(3)}`;
}

// ─── CLOCK + COUNTDOWN ────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleString('sv-SE',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  updateCountdown(now);
}

function updateCountdown(now) {
  const banner = document.getElementById('countdown-banner');
  if (!banner) return;

  // Find next session across all races
  let nextRace = null, nextSess = null, minDiff = Infinity;
  let liveRace = null;

  for (const race of RACES_2026) {
    if (isLiveWeekend(race)) { liveRace = race; break; }
    for (const s of getSessions(race)) {
      const diff = s.dt - now;
      if (diff > 0 && diff < minDiff) {
        minDiff = diff; nextRace = race; nextSess = s;
      }
    }
  }

  if (liveRace) {
    // Find current/next session in live weekend
    const sessions = getSessions(liveRace);
    let activeSess = null;
    for (const s of sessions) {
      if (s.dt <= now) activeSess = s;
    }
    banner.style.display = '';
    banner.innerHTML = `
      <div class="countdown-banner is-live">
        <div class="countdown-race-flag">${liveRace.flag}</div>
        <div class="countdown-info">
          <div class="countdown-label">Race-helg pågår</div>
          <div class="countdown-race-name">${liveRace.name}</div>
          <div class="countdown-session">${activeSess ? activeSess.label : 'Säsongen pågår'}</div>
        </div>
        <div class="live-pill"><div class="live-pill-dot"></div>LIVE</div>
      </div>`;
    return;
  }

  if (!nextRace) { banner.style.display = 'none'; return; }

  banner.style.display = '';
  const totalSecs = Math.floor(minDiff / 1000);
  const days  = Math.floor(totalSecs / 86400);
  const hours = Math.floor((totalSecs % 86400) / 3600);
  const mins  = Math.floor((totalSecs % 3600) / 60);
  const secs  = totalSecs % 60;

  let timerHtml, unitHtml;
  if (days > 0) {
    timerHtml = `${days}d ${String(hours).padStart(2,'0')}h`;
    unitHtml  = 'dagar kvar';
  } else if (hours > 0) {
    timerHtml = `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
    unitHtml  = 'timmar kvar';
  } else {
    timerHtml = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    unitHtml  = 'minuter kvar';
  }

  banner.innerHTML = `
    <div class="countdown-banner">
      <div class="countdown-race-flag">${nextRace.flag}</div>
      <div class="countdown-info">
        <div class="countdown-label">Nästa session</div>
        <div class="countdown-race-name">${nextRace.name}</div>
        <div class="countdown-session">${nextSess.label} · ${fmtDate(nextSess.dt)} ${fmtTime(nextSess.dt)}</div>
        <div class="banner-weather-row" id="banner-weather"></div>
      </div>
      <div class="countdown-timer">
        <div class="countdown-digits">${timerHtml}</div>
        <div class="countdown-unit">${unitHtml}</div>
      </div>
    </div>`;

  // Inject weather async (don't block clock tick)
  injectBannerWeather(nextRace);
}

setInterval(updateClock, 1000); updateClock();

async function fetchJolpica(round, type) {
  const seg = {
    race:'results', quali:'qualifying',
    fp1:'practice/1', fp2:'practice/2', fp3:'practice/3',
    sprint:'sprint', sq:'qualifying'
  }[type] || 'results';

  for (const year of [2026, 2025]) {
    const rn = year === 2026 ? round : Math.min(round, 24);
    try {
      const res = await fetch(`https://api.jolpi.ca/ergast/f1/${year}/${rn}/${seg}/`,
        { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const json = await res.json();
      if (json?.MRData?.RaceTable?.Races?.length > 0)
        return { source:'jolpica', data: json, type };
    } catch(e) {}
  }
  return null;
}

const OF1_NAMES = {
  fp1:'Practice 1', fp2:'Practice 2', fp3:'Practice 3',
  quali:'Qualifying', sprint:'Sprint', sq:'Sprint Qualifying', race:'Race',
};

async function fetchOF1(round, type) {
  const name = OF1_NAMES[type] || 'Race';
  try {
    const sessRes = await fetch(
      `https://api.openf1.org/v1/sessions?year=2026&session_name=${encodeURIComponent(name)}`,
      { signal: AbortSignal.timeout(8000) });
    if (!sessRes.ok) return null;
    const sessions = await sessRes.json();
    if (!Array.isArray(sessions) || !sessions.length) return null;
    sessions.sort((a,b) => a.session_key - b.session_key);
    const sess = sessions[round - 1];
    if (!sess) return null;
    const sk = sess.session_key;

    const [posRes, drvRes] = await Promise.all([
      fetch(`https://api.openf1.org/v1/position?session_key=${sk}`, { signal: AbortSignal.timeout(10000) }),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sk}`, { signal: AbortSignal.timeout(8000) }),
    ]);
    if (!posRes.ok || !drvRes.ok) return null;
    const [positions, drivers] = await Promise.all([posRes.json(), drvRes.json()]);
    if (!positions?.length || !drivers?.length) return null;

    const driverMap = {};
    drivers.forEach(d => { driverMap[d.driver_number] = d; });

    const finalPos = {};
    for (const p of positions) {
      if (!finalPos[p.driver_number] || p.date > finalPos[p.driver_number].date)
        finalPos[p.driver_number] = p;
    }
    const rows = Object.values(finalPos).sort((a,b) => (a.position||99) - (b.position||99));
    if (!rows.length) return null;

    const lapMap = {};
    if (['quali','sq','fp1','fp2','fp3'].includes(type)) {
      try {
        const lapRes = await fetch(`https://api.openf1.org/v1/laps?session_key=${sk}`, { signal: AbortSignal.timeout(10000) });
        if (lapRes.ok) {
          const laps = await lapRes.json();
          for (const l of laps) {
            if (!l.lap_duration) continue;
            if (!lapMap[l.driver_number] || l.lap_duration < lapMap[l.driver_number])
              lapMap[l.driver_number] = l.lap_duration;
          }
        }
      } catch(e) {}
    }
    return { source:'openf1', rows, driverMap, lapMap, type, sk };
  } catch(e) { return null; }
}

async function fetchResults(round, type) {
  const ck = `res_${round}_${type}`;
  if (CACHE[ck]) return CACHE[ck];
  const result = await fetchJolpica(round, type) || await fetchOF1(round, type);
  if (result) CACHE[ck] = result;
  return result;
}

};
function getFlag(nat) { return COUNTRY_FLAGS[nat] || '🏁'; }

async function fetchStandings(type) {
  const ck = `std_${type}`;
  if (standingsCache[ck]) return standingsCache[ck];

  // Source 1: OpenF1 championship endpoints
  try {
    const sessRes = await fetch('https://api.openf1.org/v1/sessions?year=2026&session_name=Race',
      { signal: AbortSignal.timeout(8000) });
    if (sessRes.ok) {
      const sessions = await sessRes.json();
      if (sessions?.length) {
        sessions.sort((a,b) => b.session_key - a.session_key);
        const sk = sessions[0].session_key;
        const ep = type === 'drivers' ? 'championship_drivers' : 'championship_teams';
        const res = await fetch(`https://api.openf1.org/v1/${ep}?session_key=${sk}`,
          { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const data = await res.json();
          if (data?.length) {
            standingsCache[ck] = { source:'openf1', data, type };
            return standingsCache[ck];
          }
        }
      }
    }
  } catch(e) {}

  // Source 2: Jolpica
  const seg = type === 'drivers' ? 'driverstandings' : 'constructorstandings';
  for (const year of [2026, 2025]) {
    try {
      const res = await fetch(`https://api.jolpi.ca/ergast/f1/${year}/${seg}/`,
        { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const json = await res.json();
      const lists = json?.MRData?.StandingsTable?.StandingsLists;
      if (lists?.length) {
        standingsCache[ck] = { source:'jolpica', data: lists[0], year, type };
        return standingsCache[ck];
      }
    } catch(e) {}
  }
  return null;
}

function posClass(n) { return n===1?'pos-1':n===2?'pos-2':n===3?'pos-3':'pos-other'; }

// OpenF1 results renderer (position-based)
function renderOF1(data) {
  const { rows, driverMap, lapMap, type } = data;
  const isQuali = ['quali','sq'].includes(type);
  const trs = rows.map(r => {
    const p = r.position || '—', pn = parseInt(p);
    const d = driverMap[r.driver_number] || {};
    const col = d.team_colour ? `#${d.team_colour}` : teamColor(d.team_name||'');
    const best = lapMap[r.driver_number];
    const timeCell = `<td class="time-col">${isQuali ? fmtSecs(best) : '—'}</td>`;
    return `<tr>
      <td><span class="${posClass(pn)}">${p}</span></td>
      <td><span class="driver-abbr">${d.name_acronym||''}</span><span class="driver-name">${d.full_name||'#'+r.driver_number}</span></td>
      <td><span class="team-dot" style="background:${col}"></span>${d.team_name||''}</td>
      ${timeCell}</tr>`;
  }).join('');
  const th = isQuali ? '<th>Bästa tid</th>' : '<th>Gap</th>';
  return `<div style="font-size:11px;color:#3a7a3a;padding:4px 0 10px;text-align:right">✓ OpenF1 · live positionsdata</div>
  <table class="results-table">
    <thead><tr><th>Plac</th><th>Förare</th><th>Stall</th>${th}</tr></thead>
    <tbody>${trs}</tbody></table>`;
}

// Jolpica race results
function renderJolpicaRace(d) {
  const res = d.MRData.RaceTable.Races[0].Results;
  if (!res?.length) return '<div class="error-msg">Inga resultat</div>';
  const trs = res.map(r => {
    const pn=parseInt(r.position), team=r.Constructor?.name||'';
    return `<tr>
      <td><span class="${posClass(pn)}">${r.position}</span></td>
      <td><span class="driver-abbr">${r.Driver?.code||''}</span><span class="driver-name">${r.Driver?.givenName} ${r.Driver?.familyName}</span></td>
      <td><span class="team-dot" style="background:${teamColor(team)}"></span>${team}</td>
      <td class="time-col">${r.Time?.time||r.status||'—'}</td>
      <td class="points-col">${r.points||'0'}</td></tr>`;
  }).join('');
  return `<div style="font-size:11px;color:#555;padding:4px 0 10px;text-align:right">Jolpica Ergast</div>
  <table class="results-table">
    <thead><tr><th>Plac</th><th>Förare</th><th>Stall</th><th>Tid/Status</th><th style="text-align:right">Poäng</th></tr></thead>
    <tbody>${trs}</tbody></table>`;
}

// Jolpica practice/sprint
function renderJolpicaPractice(d) {
  const rd = d.MRData.RaceTable.Races[0];

  if (!res?.length) for (const k of Object.keys(rd)) { if (Array.isArray(rd[k])&&rd[k][0]?.Driver){res=rd[k];break;} }

function renderResults(data) {
  if (data.source === 'openf1') return renderOF1(data);
  const { data:d, type } = data;
  if (type==='race'||type==='sprint') return renderJolpicaRace(d);
  if (type==='quali'||type==='sq')    return renderJolpicaQuali(d);
  return renderJolpicaPractice(d);
}

// ── Standings renderers ───────────────────────────────────────────────────────
// Shared card-based row — works perfectly on iPhone width
function stCard(pos, name, team, teamCol, flag, pts, leader, gap) {
  const pc = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-other';
  const barW = leader > 0 ? Math.round((pts / leader) * 100) : 0;
  const isLeader = pos === 1;
  return `
  <div class="st-card${isLeader?' st-card--leader':''}">
    <div class="st-pos"><span class="${pc}">${pos}</span></div>
    <div class="st-info">
      <div class="st-name">
        ${flag ? `<span class="st-flag">${flag}</span>` : `<span class="st-teambar" style="background:${teamCol}"></span>`}
        <span class="st-driver">${name}</span>
      </div>
      <div class="st-team">
        <span class="st-dot" style="background:${teamCol}"></span>
        ${team}
      </div>
      <div class="st-bar-track">
        <div class="st-bar-fill" style="width:${barW}%;background:${teamCol}"></div>
      </div>
    </div>
    <div class="st-right">
      <div class="st-pts">${pts}</div>
      <div class="st-gap">${gap}</div>
    </div>
  </div>`;
}

function renderDriverStandingsOF1(data) {
  const sorted = [...data].sort((a,b) => (a.position||99)-(b.position||99));
  if (!sorted.length) return '<div class="error-msg">Ingen data</div>';
  const leader = sorted[0].points || 0;
  const cards = sorted.map((s,i) => {
    const col = s.team_colour ? `#${s.team_colour}` : teamColor(s.team_name||'');
    const gap = i===0 ? 'Ledare' : `–${leader - s.points}`;
    return stCard(s.position||i+1, s.driver_name||'—', s.team_name||'', col, null, s.points||0, leader, gap);
  }).join('');
  return `<div class="st-source">✓ OpenF1 · uppdateras direkt</div><div class="st-list">${cards}</div>`;
}

  const sorted = [...data].sort((a,b) => (a.position||99)-(b.position||99));
  if (!sorted.length) return '<div class="error-msg">Ingen data</div>';
  const leader = sorted[0].points || 0;

    const col = s.team_colour ? `#${s.team_colour}` : teamColor(s.team_name||'');

  }).join('');
  return `<div class="st-source">✓ OpenF1 · uppdateras direkt</div><div class="st-list">${cards}</div>`;

function renderDriverStandingsJolpica(data, year) {
  const standings = data.DriverStandings;
  if (!standings?.length) return '<div class="error-msg">Inga ställningar</div>';
  const leader = parseInt(standings[0].points);
  const cards = standings.map((s,i) => {
    const team = s.Constructors?.[0]?.name || '';
    const col  = teamColor(team);
    const pts  = parseInt(s.points);
    const gap  = i===0 ? 'Ledare' : `–${leader-pts}`;
    const flag = getFlag(s.Driver?.nationality);
    const name = `${s.Driver?.givenName} ${s.Driver?.familyName}`;
    return stCard(parseInt(s.position), name, team, col, flag, pts, leader, gap);
  }).join('');
  return `<div class="st-source">Jolpica Ergast · ${year} · omgång ${data.round||'?'}</div><div class="st-list">${cards}</div>`;
}

// ─── LIVE DATA ────────────────────────────────────────────────────────────────
let liveTimer = null;
let liveSessionKey = null;

const TYRE_SHORT = { SOFT:'S', MEDIUM:'M', HARD:'H', INTERMEDIATE:'I', WET:'W' };

async function getLiveSessionKey(round) {
  if (liveSessionKey) return liveSessionKey;
  try {
    const res = await fetch(
      `https://api.openf1.org/v1/sessions?year=2026&session_name=Race`,
      { signal: AbortSignal.timeout(6000) });
    if (!res.ok) return null;
    const sessions = await res.json();
    if (!Array.isArray(sessions) || !sessions.length) return null;
    sessions.sort((a,b) => a.session_key - b.session_key);
    const sess = sessions[round - 1];
    liveSessionKey = sess?.session_key || null;
    return liveSessionKey;
  } catch(e) { return null; }
}

async function fetchLiveData(round) {
  const sk = await getLiveSessionKey(round);
  if (!sk) return null;
  try {
    const [posRes, drvRes, tyrRes, pitRes, lapRes] = await Promise.all([
      fetch(`https://api.openf1.org/v1/position?session_key=${sk}`,          { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/drivers?session_key=${sk}`,           { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/stints?session_key=${sk}`,            { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/pit?session_key=${sk}`,               { signal: AbortSignal.timeout(5000) }),
      fetch(`https://api.openf1.org/v1/laps?session_key=${sk}`,              { signal: AbortSignal.timeout(8000) }),
    ]);

    const [positions, drivers, stints, pits, laps] = await Promise.all([
      posRes.ok ? posRes.json() : [],
      drvRes.ok ? drvRes.json() : [],
      tyrRes.ok ? tyrRes.json() : [],
      pitRes.ok ? pitRes.json() : [],
      lapRes.ok ? lapRes.json() : [],
    ]);

    // Latest position per driver
    const posMap = {};
    for (const p of positions) {
      if (!posMap[p.driver_number] || p.date > posMap[p.driver_number].date)
        posMap[p.driver_number] = p;
    }

    // Driver info
    const drvMap = {};
    for (const d of drivers) drvMap[d.driver_number] = d;

    // Latest stint per driver (current tyre)
    const stintMap = {};
    for (const s of stints) {
      if (!stintMap[s.driver_number] || s.stint_number > stintMap[s.driver_number].stint_number)
        stintMap[s.driver_number] = s;
    }

    // Pit count per driver
    const pitCount = {};
    for (const p of pits) pitCount[p.driver_number] = (pitCount[p.driver_number]||0) + 1;

    // Best and last lap per driver
    const bestLap = {}, lastLap = {};
    for (const l of laps) {
      if (!l.lap_duration) continue;
      const dn = l.driver_number;
      if (!bestLap[dn] || l.lap_duration < bestLap[dn]) bestLap[dn] = l.lap_duration;
      if (!lastLap[dn] || l.lap_number > (lastLap[dn].lap_number||0)) lastLap[dn] = l;
    }

    // Current lap (max lap_number seen)
    const allLapNums = laps.map(l=>l.lap_number).filter(Boolean);
    const currentLap = allLapNums.length ? Math.max(...allLapNums) : '?';

    const rows = Object.values(posMap).sort((a,b) => (a.position||99)-(b.position||99));
    return { rows, drvMap, stintMap, pitCount, bestLap, lastLap, currentLap, sk };
  } catch(e) { return null; }
}

function renderLive(data, race) {
  if (!data) return `<div class="error-msg">⚠ Kunde inte hämta live-data<br>
    <span style="font-size:11px;color:#555;display:block;margin-top:6px">OpenF1 kontaktades – försök igen</span></div>`;

  const { rows, drvMap, stintMap, pitCount, bestLap, lastLap, currentLap } = data;
  if (!rows.length) return `<div class="error-msg">Ingen live-data ännu<br>
    <span style="font-size:11px;color:#555;display:block;margin-top:6px">Uppdateras när racet startar</span></div>`;

  // Find global fastest lap
  const allBest = Object.values(bestLap).filter(Boolean);
  const fastestTime = allBest.length ? Math.min(...allBest) : null;

  // Find leader's lap count for gap calculation
  const leader = rows[0];

  const driverRows = rows.map((r, i) => {
    const dn = r.driver_number;
    const d  = drvMap[dn] || {};
    const col = d.team_colour ? `#${d.team_colour}` : teamColor(d.team_name||'');
    const pos = r.position || i+1;
    const pc  = pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-other';

    // Tyre
    const stint = stintMap[dn];
    const tyreCompound = stint?.compound || 'UNKNOWN';
    const tyreAge = stint ? (currentLap !== '?' ? (currentLap - (stint.lap_start||1) + 1) : '?') : '?';
    const tyreClass = `tyre-${tyreCompound.toUpperCase()}`;
    const tyreLabel = TYRE_SHORT[tyreCompound] || tyreCompound[0] || '?';

    // Pits
    const stops = pitCount[dn] || 0;

    // Gap
    let gap = '—';
    if (i === 0) gap = 'Ledare';
    else if (r.date && leader?.date) gap = '+' + ((new Date(r.date) - new Date(leader.date))/1000).toFixed(1) + 's';

    // Last lap time
    const ll = lastLap[dn];
    const llTime = ll?.lap_duration ? fmtSecs(ll.lap_duration) : '—';
    const isFastest = fastestTime && bestLap[dn] === fastestTime;

    return `<div class="live-row">
      <div class="live-pos"><span class="${pc}">${pos}</span></div>
      <div class="live-driver-block">
        <div class="live-name-row">
          <div class="live-bar" style="background:${col}"></div>
          <span class="live-abbr">${d.name_acronym||''}</span>
          <span class="live-name">${d.full_name || '#'+dn}</span>
        </div>
        <div class="live-meta-row">
          <span class="tyre-chip ${tyreClass}">${tyreLabel} +${tyreAge}v</span>
          ${stops > 0 ? `<span class="live-pits">🛞 ${stops} stopp</span>` : '<span class="live-pits">Ej pitat</span>'}
        </div>
      </div>
      <div class="live-right">
        <div class="live-gap-val">${gap}</div>
        <div class="live-laptime${isFastest?' fastest':''}">${llTime}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="live-wrap">
    <div class="live-header">
      <div class="live-indicator"><div class="live-dot"></div>LIVE</div>
      <div class="live-lap">Varv <strong>${currentLap}</strong></div>
    </div>
    ${driverRows}
    <div class="live-refresh-note">Uppdateras var 5:e sekund · OpenF1</div>
  </div>`;
}

async function startLiveTab(card, race) {
  // Stop any existing timer
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }

  const content = card.querySelector('.tab-content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar live-data...</div>`;

  const update = async () => {
    // Only update if tab is still active and card is open
    if (!card.classList.contains('open')) return;
    const activeTab = card.querySelector('.tab-btn.active')?.dataset.tab;
    if (activeTab !== 'live') { clearInterval(liveTimer); liveTimer = null; return; }
    const data = await fetchLiveData(race.round);
    content.innerHTML = renderLive(data, race);
  };

  await update();
  liveTimer = setInterval(update, 5000);
}

// ─── WEATHER ──────────────────────────────────────────────────────────────────
const WEATHER_CACHE = {};
const WEATHER_MAX_DAYS = 16; // Open-Meteo forecast horizon

function wmoIcon(code, isDay=true) {
  // WMO weather code → emoji + short Swedish label
  if (code === 0)           return { icon:'☀️',  label:'Klart' };
  if (code <= 2)            return { icon:'🌤️',  label:'Mestadels klart' };
  if (code === 3)           return { icon:'☁️',  label:'Mulet' };
  if (code <= 49)           return { icon:'🌫️',  label:'Dimma' };
  if (code <= 57)           return { icon:'🌧️',  label:'Duggregn' };
  if (code <= 67)           return { icon:'🌧️',  label:'Regn' };
  if (code <= 77)           return { icon:'❄️',  label:'Snö' };
  if (code <= 82)           return { icon:'🌦️',  label:'Regnskurar' };
  if (code <= 86)           return { icon:'🌨️',  label:'Snöbyar' };
  if (code <= 99)           return { icon:'⛈️',  label:'Åska' };
  return { icon:'🌡️', label:'Okänt' };
}

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45) % 8];
}

async function fetchWeather(race) {
  const ck = `wx_${race.round}`;
  if (WEATHER_CACHE[ck]) return WEATHER_CACHE[ck];

  // Check if within forecast window
  const fri = new Date(race.dates[0]+'T00:00:00');
  const daysAway = (fri - new Date()) / 86400000;
  if (daysAway > WEATHER_MAX_DAYS) return { tooFar: true };
  if (daysAway < -3) return { past: true };

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${race.lat}&longitude=${race.lon}`
      + `&hourly=temperature_2m,weathercode,windspeed_10m,winddirection_10m,precipitation_probability,relativehumidity_2m`
      + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max`
      + `&timezone=auto&forecast_days=16`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    WEATHER_CACHE[ck] = { data: json, fetched: Date.now() };
    return WEATHER_CACHE[ck];
  } catch(e) { return null; }
}

function getHourlyForTime(wx, targetDt) {
  // Find the closest hourly slot to targetDt
  const times = wx.hourly.time; // ISO strings like "2026-03-13T05:00"
  const target = targetDt.toISOString().slice(0,13); // "2026-03-13T05"
  let best = 0;
  for (let i=0; i<times.length; i++) {
    if (times[i].startsWith(target)) { best = i; break; }
    if (times[i] < target) best = i;
  }
  return {
    temp:    Math.round(wx.hourly.temperature_2m[best]),
    code:    wx.hourly.weathercode[best],
    wind:    Math.round(wx.hourly.windspeed_10m[best]),
    windDir: windDir(wx.hourly.winddirection_10m[best]),
    rain:    wx.hourly.precipitation_probability[best] ?? 0,
    humid:   wx.hourly.relativehumidity_2m[best],
  };
}

function rainColor(pct) {
  if (pct >= 70) return '#60a5fa';
  if (pct >= 40) return '#93c5fd';
  return 'var(--muted)';
}
function tempColor(c) {
  if (c >= 35) return '#ef4444';
  if (c >= 28) return '#f97316';
  if (c >= 20) return '#facc15';
  if (c >= 10) return '#86efac';
  return '#93c5fd';
}

// ── Banner weather snippet (race-day conditions) ───────────────────────────────
let bannerWeatherRound = null;
async function injectBannerWeather(race) {
  if (bannerWeatherRound === race.round) return;
  bannerWeatherRound = race.round;

  const wx = await fetchWeather(race);
  const el = document.getElementById('banner-weather');
  if (!el) return;

  if (!wx || wx.tooFar || wx.past || !wx.data) {
    el.innerHTML = wx?.tooFar ? '<span style="color:#555;font-size:11px">Prognos ej tillgänglig ännu</span>' : '';
    return;
  }

  const raceDt = new Date(race.raceDate + 'T' + '14:00:00'); // approx race time local
  const h = getHourlyForTime(wx.data, raceDt);
  const w = wmoIcon(h.code);

  el.innerHTML = `
    <span class="bw-icon">${w.icon}</span>
    <span class="bw-temp" style="color:${tempColor(h.temp)}">${h.temp}°</span>
    <span class="bw-sep">·</span>
    <span class="bw-wind">💨 ${h.wind} km/h ${h.windDir}</span>
    <span class="bw-sep">·</span>
    <span class="bw-rain" style="color:${rainColor(h.rain)}">🌧 ${h.rain}%</span>
    <span class="bw-label">${w.label}</span>`;
}

// ── Tab weather render ─────────────────────────────────────────────────────────
async function loadWeather(content, race) {
  const ck = `wx_html_${race.round}`;
  if (WEATHER_CACHE[ck]) { content.innerHTML = WEATHER_CACHE[ck]; return; }

  content.innerHTML = '<div class="loading"><div class="spinner"></div>Hämtar väderprognos...</div>';
  const wx = await fetchWeather(race);

  if (!wx) {
    content.innerHTML = '<div class="error-msg" style="margin:16px">⚠ Kunde inte hämta väderdata.</div>';
    return;
  }
  if (wx.tooFar) {
    const fri = new Date(race.dates[0]+'T00:00:00');
    const days = Math.ceil((fri - new Date()) / 86400000);
    content.innerHTML = `
      <div class="wx-too-far">
        <div class="wx-too-far-icon">🔭</div>
        <div class="wx-too-far-title">För tidigt för prognos</div>
        <div class="wx-too-far-sub">Väderdata tillgänglig om ~${days - WEATHER_MAX_DAYS} dagar</div>
      </div>`;
    return;
  }
  if (wx.past) {
    content.innerHTML = '<div class="error-msg" style="margin:16px">Loppet är avslutat.</div>';
    return;
  }

  const sessions = getSessions(race);
  const now = new Date();

  let html = '<div class="wx-wrap">';

  // Day-by-day overview using daily data
  const daily = wx.data.daily;
  const raceFri = race.dates[0];
  const raceSun = race.dates[2];

  // Session-by-session detailed forecast
  html += '<div class="wx-section-title">📅 Session för session</div>';
  html += '<div class="wx-sessions">';

  for (const sess of sessions) {
    if (sess.dt < now) continue; // skip past sessions
    const h = getHourlyForTime(wx.data, sess.dt);
    const w = wmoIcon(h.code);
    const shortLabel = sess.label.replace(/ – .*/,'').replace(/Fre |Lör |Sön /,'');

    html += `
      <div class="wx-sess-row">
        <div class="wx-sess-left">
          <div class="wx-sess-icon">${w.icon}</div>
          <div class="wx-sess-info">
            <div class="wx-sess-name">${shortLabel}</div>
            <div class="wx-sess-time">${fmtDate(sess.dt)} ${fmtTime(sess.dt)}</div>
          </div>
        </div>
        <div class="wx-sess-right">
          <div class="wx-sess-temp" style="color:${tempColor(h.temp)}">${h.temp}°C</div>
          <div class="wx-sess-details">
            <span style="color:${rainColor(h.rain)}">🌧 ${h.rain}%</span>
            <span>💨 ${h.wind} km/h</span>
          </div>
        </div>
      </div>`;
  }
  html += '</div>';

  // 3-day overview strip
  html += '<div class="wx-section-title">🗓 Helgöversikt</div>';
  html += '<div class="wx-days">';
  const dayLabels = ['Fredag','Lördag','Söndag'];
  for (let i=0; i<3; i++) {
    const dateStr = race.dates[i];
    const di = daily.time.indexOf(dateStr);
    if (di === -1) continue;
    const code = daily.weathercode[di];
    const w    = wmoIcon(code);
    const tMax = Math.round(daily.temperature_2m_max[di]);
    const tMin = Math.round(daily.temperature_2m_min[di]);
    const rain = daily.precipitation_probability_max[di] ?? 0;
    const wind = Math.round(daily.windspeed_10m_max[di]);

    html += `
      <div class="wx-day-card${rain >= 60 ? ' wx-day-wet' : ''}">
        <div class="wx-day-label">${dayLabels[i]}</div>
        <div class="wx-day-icon">${w.icon}</div>
        <div class="wx-day-desc">${w.label}</div>
        <div class="wx-day-temps">
          <span style="color:${tempColor(tMax)}">${tMax}°</span>
          <span class="wx-day-tmin">${tMin}°</span>
        </div>
        <div class="wx-day-rain" style="color:${rainColor(rain)}">🌧 ${rain}%</div>
        <div class="wx-day-wind">💨 ${wind} km/h</div>
      </div>`;
  }
  html += '</div>';

  // Rain risk summary bar
  const maxRain = Math.max(...race.dates.map(d => {
    const di = daily.time.indexOf(d);
    return di >= 0 ? (daily.precipitation_probability_max[di] ?? 0) : 0;
  }));
  const riskLabel = maxRain >= 70 ? '🌧 Hög regnsannolikhet – strategi kan påverkas!'
    : maxRain >= 40 ? '🌦 Möjlighet till regn under helgen'
    : '☀️ Torrt väder förväntas';
  const riskColor = maxRain >= 70 ? '#60a5fa' : maxRain >= 40 ? '#facc15' : 'var(--green)';

  html += `<div class="wx-risk-bar" style="border-color:${riskColor}">
    <span style="color:${riskColor}">${riskLabel}</span>
  </div>`;

  html += '</div>'; // wx-wrap

  WEATHER_CACHE[ck] = html;
  content.innerHTML = html;
}


const HISTORIA_CACHE = {};

async function fetchHistoria(circuitId) {
  if (HISTORIA_CACHE[circuitId]) return HISTORIA_CACHE[circuitId];
  try {
    // Fetch 2025 race + qualifying for this circuit, plus all-time results for most wins
    const [res2025, quali2025, allResults] = await Promise.all([
      fetch(`https://api.jolpi.ca/ergast/f1/2025/circuits/${circuitId}/results/`, { signal: AbortSignal.timeout(10000) }).then(r=>r.ok?r.json():null),
      fetch(`https://api.jolpi.ca/ergast/f1/2025/circuits/${circuitId}/qualifying/`, { signal: AbortSignal.timeout(10000) }).then(r=>r.ok?r.json():null),
      fetch(`https://api.jolpi.ca/ergast/f1/circuits/${circuitId}/results/?limit=200`, { signal: AbortSignal.timeout(10000) }).then(r=>r.ok?r.json():null),
    ]);

    // 2025 race top 3
    const race2025 = res2025?.MRData?.RaceTable?.Races?.[0] || null;
    const top3 = race2025 ? (race2025.Results||[]).slice(0,3) : [];

    // 2025 fastest lap (from results FastestLap field)
    let fastestLap2025 = null;
    if (race2025) {
      for (const r of (race2025.Results||[])) {
        if (r.FastestLap?.rank === '1') {
          fastestLap2025 = {
            time: r.FastestLap.Time?.time || '—',
            driver: r.Driver.code || r.Driver.familyName,
            team: r.Constructor?.name || ''
          };
          break;
        }
      }
    }

    // 2025 pole time (Q3 time of P1)
    const quali2025Race = quali2025?.MRData?.RaceTable?.Races?.[0] || null;
    let pole2025 = null;
    if (quali2025Race) {
      const p1 = (quali2025Race.QualifyingResults||[]).find(x=>x.position==='1');
      if (p1) {
        pole2025 = {
          time: p1.Q3 || p1.Q2 || p1.Q1 || '—',
          driver: p1.Driver.code || p1.Driver.familyName,
          team: p1.Constructor?.name || ''
        };
      }
    }

    // All-time most wins on this circuit
    const allRaces = allResults?.MRData?.RaceTable?.Races || [];
    const winsMap = {};
    for (const r of allRaces) {
      const w = (r.Results||[]).find(x=>x.position==='1');
      if (w) {
        const key = w.Driver.givenName + ' ' + w.Driver.familyName;
        winsMap[key] = (winsMap[key]||0)+1;
      }
    }
    const topWinner = Object.entries(winsMap).sort((a,b)=>b[1]-a[1])[0] || null;

    const data = { top3, fastestLap2025, pole2025, topWinner, year2025: race2025?.season || '2025', raceName2025: race2025?.raceName || '' };
    HISTORIA_CACHE[circuitId] = data;
    return data;
  } catch(e) { return null; }
}

function renderHistoria(data, race) {
  if (!data) return `<div class="error-msg" style="margin:16px">⚠ Ingen historisk data tillgänglig.</div>`;

  const medals = ['🥇','🥈','🥉'];
  const no2025 = !data.top3?.length;

  // ── Topp 3 podium 2025 ────────────────────────────────────────────────────
  let podiumHtml = '';
  if (data.top3?.length) {
    const podium = data.top3.map((r, i) => {
      const team = r.Constructor?.name || '';
      const tc   = Object.entries(TEAM_COLORS).find(([k]) => team.includes(k))?.[1] || '#888';
      const time = i === 0 ? (r.Time?.time || r.status || '—') : (r.Time?.millis ? '+' + (parseInt(r.Time.millis)/1000).toFixed(3)+'s' : r.Time?.time || r.status || '—');
      return `
        <div class="hist-podium-card" style="border-top: 3px solid ${tc}">
          <div class="hist-podium-medal">${medals[i]}</div>
          <div class="hist-podium-name">${r.Driver.givenName} ${r.Driver.familyName}</div>
          <div class="hist-podium-team" style="color:${tc}">${team}</div>
          <div class="hist-podium-time">${time}</div>
        </div>`;
    }).join('');

    podiumHtml = `
      <div class="hist-section-title">🎖️ Podium 2025</div>
      <div class="hist-podium">${podium}</div>`;
  } else {
    podiumHtml = `
      <div class="hist-section-title">🎖️ Podium 2025</div>
      <div class="error-msg" style="margin:0 0 4px">Ingen 2025-data ännu för denna bana.</div>`;
  }

  // ── Pole + snabbaste varv 2025 ─────────────────────────────────────────────
  let statsHtml = '';
  const stats = [];

  if (data.pole2025) {
    const tc = Object.entries(TEAM_COLORS).find(([k]) => data.pole2025.team.includes(k))?.[1] || '#888';
    stats.push(`
      <div class="hist-stat-card">
        <div class="hist-stat-icon">🟣</div>
        <div class="hist-stat-info">
          <div class="hist-stat-label">Pole 2025</div>
          <div class="hist-stat-value">${data.pole2025.time}</div>
          <div class="hist-stat-driver" style="color:${tc}">${data.pole2025.driver} · ${data.pole2025.team}</div>
        </div>
      </div>`);
  }

  if (data.fastestLap2025) {
    const tc = Object.entries(TEAM_COLORS).find(([k]) => data.fastestLap2025.team.includes(k))?.[1] || '#888';
    stats.push(`
      <div class="hist-stat-card">
        <div class="hist-stat-icon" style="color:var(--purple)">⚡</div>
        <div class="hist-stat-info">
          <div class="hist-stat-label">Snabbaste varv 2025</div>
          <div class="hist-stat-value">${data.fastestLap2025.time}</div>
          <div class="hist-stat-driver" style="color:${tc}">${data.fastestLap2025.driver} · ${data.fastestLap2025.team}</div>
        </div>
      </div>`);
  }

  if (stats.length) {
    statsHtml = `
      <div class="hist-section-title">⏱️ Tider 2025</div>
      <div class="hist-stats">${stats.join('')}</div>`;
  }

  // ── Mest vunna på banan genom tiderna ──────────────────────────────────────
  let mostWinsHtml = '';
  if (data.topWinner) {
    mostWinsHtml = `
      <div class="hist-section-title">👑 Flest vinster på banan</div>
      <div class="hist-most-wins">
        <div class="hist-wins-name">${data.topWinner[0]}</div>
        <div class="hist-wins-count">${data.topWinner[1]}</div>
        <div class="hist-wins-label">vinst${data.topWinner[1] > 1 ? 'er' : ''}</div>
      </div>`;
  }

  return `<div class="hist-wrap">${podiumHtml}${statsHtml}${mostWinsHtml}</div>`;
}

async function loadHistoria(content, race) {
  const ck = `hist_${race.circuitId}`;
  if (HISTORIA_CACHE[ck+'_html']) { content.innerHTML = HISTORIA_CACHE[ck+'_html']; return; }
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Hämtar historik...</div>';
  const data = await fetchHistoria(race.circuitId);
  const html = renderHistoria(data, race);
  HISTORIA_CACHE[ck+'_html'] = html;
  content.innerHTML = html;
}

async function loadTab(card, race, tabKey) {
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabKey));
  const content = card.querySelector('.tab-content');
  const now = new Date();

  if (tabKey === 'schedule') { content.innerHTML = renderSchedule(race); return; }
  if (tabKey === 'live')     { await startLiveTab(card, race); return; }
  if (tabKey === 'historia') { await loadHistoria(content, race); return; }
  if (tabKey === 'vader')    { await loadWeather(content, race); return; }

  const sessions = getSessions(race);
  const sess = sessions.find(s => s.key === tabKey);
  const pastSession = sess ? sess.dt < now : new Date(race.raceDate+'T23:59:59') < now;

  if (!pastSession) {
    content.innerHTML = `<div class="session-schedule">
      <div class="session-row">
        <div class="session-name" style="font-size:15px">${sess?.label || tabKey}</div>
        <div class="session-time">${sess ? fmtTime(sess.dt) : '—'}</div>
        <span class="session-badge session-upcoming-s">Kommande</span>
        <div class="session-date">${sess ? fmtDate(sess.dt) : ''}</div>
      </div>
      <p style="margin-top:16px;font-size:12px;color:var(--muted)">Resultat visas efter att sessionen är klar.</p>
    </div>`;
    return;
  }

  content.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar resultat...</div>`;
  const data = await fetchResults(race.round, tabKey);

  if (!data) {
    content.innerHTML = `<div class="error-msg">⚠ Inga resultat hittades ännu.
      <br><span style="font-size:11px;color:#555;display:block;margin-top:6px">
        Jolpica &amp; OpenF1 kontaktades — försök igen om en stund
      </span></div>`;
    return;
  }
  content.innerHTML = `<div class="results-wrapper">${renderResults(data)}</div>`;
}
